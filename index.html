}

/* ---- training-load / effort trend charts: surfaces data already computed for guardrails
   (tries, ACWR) or already logged (sends vs attempts) that otherwise only ever appears as
   one-shot warning text or not at all. */
function renderSendsAttemptsChart(){
  const rows=sendsAttemptsSeries(10);
  if(rows.length<2) return `<div class="hint">Log a few climbing sessions with sends or attempts to see this chart.</div>`;
  const w=300,h=100,padL=4,padR=4,padT=6,padB=16;
  const plotW=w-padL-padR, plotH=h-padT-padB;
  const maxTotal=Math.max(1,...rows.map(r=>r.sends+r.attempts));
  const bw=plotW/rows.length*0.6, gap=plotW/rows.length;
  const bars=rows.map((r,i)=>{
    const total=r.sends+r.attempts;
    const x=padL+i*gap+(gap-bw)/2;
    const sendH=(r.sends/maxTotal)*plotH, attH=(r.attempts/maxTotal)*plotH;
    const sendY=padT+plotH-sendH, attY=sendY-attH;
    return `${r.attempts?`<rect x="${x.toFixed(1)}" y="${attY.toFixed(1)}" width="${bw.toFixed(1)}" height="${attH.toFixed(1)}" fill="var(--faint)" rx="1.5"/>`:""}
      ${r.sends?`<rect x="${x.toFixed(1)}" y="${sendY.toFixed(1)}" width="${bw.toFixed(1)}" height="${sendH.toFixed(1)}" fill="var(--accent)" rx="1.5"/>`:""}
      ${!total?`<rect x="${x.toFixed(1)}" y="${(padT+plotH-2).toFixed(1)}" width="${bw.toFixed(1)}" height="2" fill="var(--line)"/>`:""}`;
  }).join("");
  return `<div class="hint" style="margin-bottom:6px">Sends vs attempts · last ${rows.length} climbing sessions</div>
    <svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto;display:block">${bars}</svg>
    <div class="hint" style="display:flex;justify-content:space-between;margin-top:2px">
      <span>${prettyDate(rows[0].date)}</span><span>${prettyDate(rows[rows.length-1].date)}</span>
    </div>
    <div class="hint" style="margin-top:4px"><span style="color:var(--accent)">■</span> sends &nbsp; <span style="color:var(--faint)">■</span> attempts (no send)</div>`;
}
function renderWeeklyTriesChart(){
  const rows=weeklyTriesSeries(12);
  const maxTries=Math.max(1,...rows.map(r=>r.tries));
  if(!rows.some(r=>r.tries>0)) return `<div class="hint">Log climbing sessions to see weekly volume here.</div>`;
  const w=300,h=90,padL=4,padR=4,padT=6,padB=16;
  const plotW=w-padL-padR, plotH=h-padT-padB;
  const bw=plotW/rows.length*0.6, gap=plotW/rows.length;
  const bars=rows.map((r,i)=>{
    const x=padL+i*gap+(gap-bw)/2, bh=(r.tries/maxTries)*plotH, y=padT+plotH-bh;
    return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(bh,1).toFixed(1)}" fill="var(--accent)" rx="1.5"/>`;
  }).join("");
  return `<div class="hint" style="margin-bottom:6px">Tries per week (sends + attempts) · last ${rows.length} weeks</div>
    <svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto;display:block">${bars}</svg>`;
}
function renderAcwrTrend(){
  const rows=acwrSeries(12).filter(r=>r.ratio!=null);
  if(rows.length<3) return `<div class="hint">Needs a few more weeks of logged history before a load-ratio trend is meaningful.</div>`;
  const w=300,h=90,padL=4,padR=4,padT=10,padB=16;
  const plotW=w-padL-padR, plotH=h-padT-padB;
  const domainMax=Math.max(2,...rows.map(r=>r.ratio))*1.05;
  const y=v=>padT+(domainMax-v)/domainMax*plotH;
  const x=i=>padL+i*(plotW/(rows.length-1));
  const threshY=y(1.5);
  let d=`M ${x(0).toFixed(1)} ${y(rows[0].ratio).toFixed(1)}`;
  for(let i=1;i<rows.length;i++) d+=` L ${x(i).toFixed(1)} ${y(rows[i].ratio).toFixed(1)}`;
  const last=rows[rows.length-1];
  return `<div class="hint" style="margin-bottom:6px">Rolling load ratio (7d vs 28d avg) · dashed line = 1.5 danger zone</div>
    <svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto;display:block">
      <line x1="${padL}" x2="${w-padR}" y1="${threshY.toFixed(1)}" y2="${threshY.toFixed(1)}" stroke="var(--tweaky)" stroke-width="1" stroke-dasharray="3,3"/>
      <path d="${d}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="${x(rows.length-1).toFixed(1)}" cy="${y(last.ratio).toFixed(1)}" r="3" fill="var(--accent)"/>
    </svg>`;
}
function renderTrainingTrends(){
  return `<div style="margin-bottom:16px">${renderSendsAttemptsChart()}</div>
    <div style="margin-bottom:16px">${renderWeeklyTriesChart()}</div>
    <div>${renderAcwrTrend()}</div>`;
}
function stat(lab,v,color,sub){
  return `<div class="stat"><div class="lab">${lab}</div>
    <div class="v" style="${color?`color:${color}`:""}">${v}</div>
    ${sub?`<div class="sub">${sub}</div>`:""}</div>`;
}

/* ============================ interactions ============================ */
function valid(){
  const f=ui.form;
  if(f.type==="climb") return (f.grades.length>0 || Object.values(f.attempts||{}).some(v=>v>0)) && !!f.finger;
  if(f.type==="hang") return !!f.finger;
  if(f.type==="lift") return LIFT_DAY.some(L=>(f.entries[L.key]||[]).some(r=>(r.weight??"")!==""));
  return false;
}
function bumpGrade(g,d){
  const f=ui.form, c=gradeCounts(f.grades);
  c[g]=Math.max(0,(c[g]||0)+d);
  const out=[]; Object.keys(c).forEach(k=>{ for(let i=0;i<c[k];i++)out.push(Number(k)); });
  f.grades=out;
}
function loadSessionIntoForm(sess){
  const f=blankForm();
  f.type=sess.type; f.date=sess.date; f.notes=sess.notes||"";
  f.finger=sess.finger||null;
  f.sleep=sess.sleep||null; f.soreness=sess.soreness||null;
  f.effort=EFFORT.find(e=>e.rpe===sess.rpe)?.key || null;
  if(sess.type==="climb"){ f.grades=[...(sess.grades||[])]; f.attempts={...(sess.attempts||{})}; }
  if(sess.type==="hang"){
    const h=sess.hang||{};
    f.protocol=h.protocol||"repeater"; f.edge=h.edge??20; f.addedLb=h.addedLb??0; f.sets=h.sets??5; f.grip=h.grip||"half";
  }
  if(sess.type==="lift"){
    const saved=(sess.lift||{}).entries||{};
    LIFT_DAY.forEach(L=>{
      const rows=saved[L.key]||[];
      f.entries[L.key]=Array.from({length:L.sets},(_,i)=>rows[i]?{weight:rows[i].weight,reps:rows[i].reps}:{weight:"",reps:""});
    });
  }
  return f;
}
function commitSave(){
  if(!valid())return;
  const f=ui.form;
  const s={id:ui.editingId||uid(),date:f.date,type:f.type,notes:f.notes.trim()};
  if(f.effort) s.rpe=EFFORT.find(e=>e.key===f.effort)?.rpe;
  if(f.finger) s.finger=f.finger;
  if(f.sleep) s.sleep=f.sleep;
  if(f.soreness) s.soreness=f.soreness;
  if(f.type==="climb"){
    s.grades=[...f.grades];
    const att=Object.fromEntries(Object.entries(f.attempts||{}).filter(([,v])=>v>0));
    if(Object.keys(att).length) s.attempts=att;
  }
  if(f.type==="hang") s.hang={protocol:f.protocol,edge:f.edge,addedLb:f.addedLb,sets:f.sets,grip:f.grip};
  if(f.type==="lift"){
    const entries={};
    LIFT_DAY.forEach(L=>{
      const rows=(f.entries[L.key]||[]).filter(r=>(r.weight??"")!=="");
      if(rows.length) entries[L.key]=rows.map(r=>({weight:r.weight,reps:r.reps??""}));
    });
    s.lift={entries};
  }
  const editing=!!ui.editingId;
  ui.celebrate=null;
  if(editing){
    const idx=store.sessions.findIndex(x=>x.id===ui.editingId);
    if(idx>=0) store.sessions[idx]=s; else store.sessions.push(s);
  } else {
    // Compare against the slot matching what was actually logged, not the "next" pointer —
    // out-of-order logging is explicitly allowed, so those can diverge.
    const plannedTarget=findMatchingSlot(f)?.targetRpe;
    if(plannedTarget!=null && s.rpe!=null && s.rpe-plannedTarget>=2){
      s.intensityFlag={target:plannedTarget, actual:s.rpe};
    }
    // Celebration detection — only on a genuinely new log, never on an edit, so backfilling/
    // correcting old sessions never triggers a fake "new PR" moment.
    let priorHardestEver=-1;
    store.sessions.forEach(x=>(x.grades||[]).forEach(g=>{ if(g>priorHardestEver) priorHardestEver=g; }));
    store.sessions.push(s); advanceProgress();
    const newMax = (s.grades||[]).length ? Math.max(...s.grades) : -1;
    if(newMax>priorHardestEver && newMax>=0) ui.celebrate={...ui.celebrate, pr:newMax};
    if(MILESTONES.includes(store.sessions.length)) ui.celebrate={...ui.celebrate, milestone:store.sessions.length};
  }
  save();
  const keepType=f.type, keepDate=f.date;
  ui.editingId=null;
  ui.form=freshForm(keepType); ui.form.date=keepDate;
  ui.gradeExpanded=false; ui.logMoreOpen=false;
  ui.flash=true; render();
  setTimeout(()=>{ ui.flash=false; ui.celebrate=null; render(); },ui.celebrate?2800:2000);
}

function wire(){
  // nav
  $nav.querySelectorAll("[data-tab]").forEach(b=>b.onclick=()=>{
    const t=b.dataset.tab;
    if(t==="log" && ui.editingId){ ui.editingId=null; ui.form=freshForm(); ui.gradeExpanded=false; ui.logMoreOpen=false; }
    if(t!=="plan") ui.progressUndo=null;
    ui.tab=t; render();
  });

  // segmented (type / protocol / day)
  $main.querySelectorAll("[data-seg]").forEach(seg=>{
    seg.querySelectorAll("button").forEach(b=>b.onclick=()=>{
      const key=seg.dataset.seg, val=b.dataset.val;
      if(key==="type"){ ui.form.type=val; ui.gradeExpanded=false; if(!ui.editingId) applySuggestions(ui.form); }
      else {
        ui.form[key]=val;
        if((key==="protocol"||key==="grip") && !ui.editingId) ui.form.addedLb=suggestHangLoad(ui.form.protocol,ui.form.grip);
      }
      render();
    });
  });
  // date
  const d=$main.querySelector("#date"); if(d) d.onchange=e=>{ ui.form.date=e.target.value; render(); };
  // per-grade sends/attempts steppers (left arrow decreases, right arrow increases,
  // count shown in the middle) — one row per grade V0-V11, no tap-grid/list to keep in sync.
  $main.querySelectorAll("[data-gstep]").forEach(b=>b.onclick=()=>{
    const f=ui.form, g=+b.dataset.grade, dir=+b.dataset.dir, kind=b.dataset.gstep;
    if(kind==="sends") bumpGrade(g,dir);
    else { f.attempts=f.attempts||{}; f.attempts[g]=Math.max(0,(f.attempts[g]||0)+dir); }
    render();
  });
  // steppers
  $main.querySelectorAll("[data-step]").forEach(b=>b.onclick=()=>{
    const key=b.dataset.step, dir=+b.dataset.dir; const f=ui.form;
    if(key==="edge") f.edge=Math.max(4,f.edge+2*dir);
    else if(key==="addedLb") f.addedLb=f.addedLb+5*dir;
    else if(key==="sets") f.sets=Math.max(1,f.sets+dir);
    render();
  });
  // lift inputs (no re-render — preserve focus)
  $main.querySelectorAll("[data-lift]").forEach(inp=>{
    inp.oninput=e=>{
      const k=inp.dataset.lift, idx=+inp.dataset.idx, fld=inp.dataset.fld;
      const v=e.target.value.replace(/[^0-9.]/g,""); e.target.value=v;
      const arr=[...(ui.form.entries[k]||[])]; arr[idx]={...arr[idx],[fld]:v};
      ui.form.entries[k]=arr;
      updateSaveBtn();
    };
  });
  // finger / effort
  $main.querySelectorAll("[data-finger]").forEach(b=>b.onclick=()=>{ ui.form.finger=b.dataset.finger; render(); });
  $main.querySelectorAll("[data-effort]").forEach(b=>b.onclick=()=>{
    const v=b.dataset.effort; ui.form.effort=ui.form.effort===v?null:v; render(); });
  $main.querySelectorAll("[data-sleep]").forEach(b=>b.onclick=()=>{
    const v=b.dataset.sleep; ui.form.sleep=ui.form.sleep===v?null:v; render(); });
  $main.querySelectorAll("[data-soreness]").forEach(b=>b.onclick=()=>{
    const v=b.dataset.soreness; ui.form.soreness=ui.form.soreness===v?null:v; render(); });
  // notes (no re-render)
  const nt=$main.querySelector("#notes"); if(nt) nt.oninput=e=>{ ui.form.notes=e.target.value; saveDraft(); };
  // grade card range / optional-details disclosures
  const get=$main.querySelector("#gradeExpandToggle"); if(get) get.onclick=()=>{ ui.gradeExpanded=!ui.gradeExpanded; render(); };
  const lmt=$main.querySelector("#logMoreToggle"); if(lmt) lmt.onclick=()=>{ ui.logMoreOpen=!ui.logMoreOpen; render(); };
  const cl=$main.querySelector("#copyLast"); if(cl) cl.onclick=()=>{
    const f=ui.form, last=[...store.sessions].filter(s=>s.type===f.type).sort((a,b)=>a.date<b.date?1:-1)[0];
    if(!last) return;
    const loaded=loadSessionIntoForm(last); loaded.date=todayStr();
    ui.form=loaded; ui.gradeExpanded=false; render();
  };
  // save
  const sv=$main.querySelector("#save"); if(sv) sv.onclick=commitSave;
  const ce=$main.querySelector("#cancelEdit"); if(ce) ce.onclick=()=>{ ui.editingId=null; ui.form=freshForm(); ui.gradeExpanded=false; ui.logMoreOpen=false; render(); };
  // history delete — two-tap confirm (iOS standalone PWAs suppress window.confirm)
  $main.querySelectorAll("[data-del]").forEach(b=>b.onclick=(e)=>{
    e.stopPropagation();
    const id=b.dataset.del;
    if(ui.confirmDel===id){
      store.sessions=store.sessions.filter(x=>x.id!==id); ui.confirmDel=null; save(); render();
    } else {
      ui.confirmDel=id; render();
      clearTimeout(ui._delTimer);
      ui._delTimer=setTimeout(()=>{ if(ui.confirmDel===id){ ui.confirmDel=null; render(); } },4000);
    }
  });
  $main.querySelectorAll("[data-delbench]").forEach(b=>b.onclick=()=>{
    const id=b.dataset.delbench;
    if(ui.confirmDel===id){
      store.benchmarks=(store.benchmarks||[]).filter(x=>x.id!==id); ui.confirmDel=null; save(); render();
    } else {
      ui.confirmDel=id; render();
      clearTimeout(ui._delTimer);
      ui._delTimer=setTimeout(()=>{ if(ui.confirmDel===id){ ui.confirmDel=null; render(); } },4000);
    }
  });
  // history card tap -> edit
  $main.querySelectorAll("[data-edit]").forEach(card=>card.onclick=()=>{
    const s=store.sessions.find(x=>x.id===card.dataset.edit); if(!s)return;
    ui.editingId=s.id; ui.form=loadSessionIntoForm(s); ui.tab="log"; ui.gradeExpanded=false; ui.logMoreOpen=false; render();
  });
  // plan tab
  const lt=$main.querySelector("#logToday"); if(lt) lt.onclick=()=>{
    const next=currentProgress().next;
    ui.editingId=null;
    ui.form=freshForm(next.type, next.protocol, next.gradeRole);
    ui.gradeExpanded=false; ui.logMoreOpen=false;
    ui.tab="log"; render();
  };
  const ut=$main.querySelector("#upNextTap"); if(ut) ut.onclick=()=>{ ui.planDetailOpen=!ui.planDetailOpen; render(); };
  const pst=$main.querySelector("#planSlotsToggle"); if(pst) pst.onclick=()=>{ ui.planSlotsOpen=!ui.planSlotsOpen; render(); };
  const pit=$main.querySelector("#phaseInfoTap"); if(pit) pit.onclick=()=>{ ui.phaseInfoOpen=!ui.phaseInfoOpen; render(); };
  $main.querySelectorAll("[data-setslot]").forEach(row=>row.onclick=()=>{
    const i=+row.dataset.setslot, cur=currentProgress();
    setProgressUndo();
    store.progress={phaseIdx:cur.phaseIdx, weekInPhase:cur.weekInPhase, slot:i};
    ui.planDetailOpen=false; save(); render();
  });
  // manual phase/week override
  const pp=$main.querySelector('[data-planpos="toggle"]'); if(pp) pp.onclick=()=>{ ui.planPosOpen=true; render(); };
  const ppc=$main.querySelector('[data-planpos="close"]'); if(ppc) ppc.onclick=()=>{ ui.planPosOpen=false; render(); };
  $main.querySelectorAll("[data-phasestep]").forEach(b=>b.onclick=()=>{
    const dir=+b.dataset.phasestep, cur=currentProgress();
    const newIdx=Math.max(0,Math.min(PHASES.length-1,cur.phaseIdx+dir));
    setProgressUndo();
    store.progress={phaseIdx:newIdx, weekInPhase:1, slot:0}; save(); render();
  });
  $main.querySelectorAll("[data-weekstep]").forEach(b=>b.onclick=()=>{
    const dir=+b.dataset.weekstep, cur=currentProgress();
    const newWk=Math.max(1,Math.min(cur.phase.weeks,cur.weekInPhase+dir));
    setProgressUndo();
    store.progress={phaseIdx:cur.phaseIdx, weekInPhase:newWk, slot:0}; save(); render();
  });
  const up=$main.querySelector("#undoProgress"); if(up) up.onclick=()=>{
    if(ui.progressUndo){ store.progress={...ui.progressUndo.progress}; ui.progressUndo=null; save(); render(); }
  };
  const cc=$main.querySelector("#copyCorrupt"); if(cc) cc.onclick=()=>{
    const text=localStorage.getItem(KEY+"-corrupt-backup")||"";
    const done=()=>{ cc.textContent="Copied"; setTimeout(()=>{ cc.textContent="Copy backup"; },1800); };
    if(navigator.clipboard?.writeText) navigator.clipboard.writeText(text).then(done).catch(()=>fallbackCopy(text,done));
    else fallbackCopy(text,done);
  };
  // progress buttons
  const ex=$main.querySelector("#export"); if(ex) ex.onclick=doExport;
  const bk=$main.querySelector("#backup"); if(bk) bk.onclick=doBackup;
  const rs=$main.querySelector("#restore"); if(rs) rs.onclick=()=>document.getElementById("importer").click();
  const ci=$main.querySelector("#confirmImport"); if(ci) ci.onclick=()=>{
    store=deepMerge(DEFAULTS, ui.pendingImport.data); ui.pendingImport=null; save(); render();
  };
  const xi=$main.querySelector("#cancelImport"); if(xi) xi.onclick=()=>{ ui.pendingImport=null; render(); };
  // raw data editor — in-place JSON edit as an alternative to file export/import
  const rt=$main.querySelector("#rawToggle"); if(rt) rt.onclick=()=>{
    if(!ui.rawEditOpen){ ui.rawEditText=JSON.stringify(store,null,2); ui.rawEditError=null; ui.rawEditSaved=false; }
    ui.rawEditOpen=!ui.rawEditOpen; render();
  };
  const rj=$main.querySelector("#rawJson"); if(rj) rj.oninput=e=>{ ui.rawEditText=e.target.value; };
  const rc=$main.querySelector("#rawCancel"); if(rc) rc.onclick=()=>{
    ui.rawEditOpen=false; ui.rawEditText=null; ui.rawEditError=null; render();
  };
  const ra=$main.querySelector("#rawApply"); if(ra) ra.onclick=()=>{
    let parsed;
    try{ parsed=JSON.parse(ui.rawEditText); }
    catch(err){ ui.rawEditError="Invalid JSON — "+(err.message||"couldn't parse."); render(); return; }
    if(!parsed||typeof parsed!=="object"||Array.isArray(parsed)){ ui.rawEditError="Top level must be a JSON object."; render(); return; }
    if(parsed.sessions!=null && !Array.isArray(parsed.sessions)){ ui.rawEditError="'sessions' must be an array."; render(); return; }
    const rawSessions=parsed.sessions||[];
    const cleanSessions=rawSessions.filter(validSession);
    const skipped=rawSessions.length-cleanSessions.length;
    store=deepMerge(DEFAULTS,{...parsed,sessions:cleanSessions});
    save();
    ui.rawEditError=null; ui.rawEditText=null;
    ui.rawEditSaved=skipped>0?`Applied (${skipped} invalid session${skipped===1?"":"s"} skipped)`:"Applied";
    render();
    setTimeout(()=>{ ui.rawEditSaved=false; render(); },2200);
  };
  // benchmarks
  const bw=$main.querySelector("#bw"); if(bw) bw.onchange=e=>{
    const v=e.target.value===""?null:Number(e.target.value);
    store.settings.bodyweight=v;
    if(v!=null){ store.benchmarks=store.benchmarks||[]; store.benchmarks.push({id:uid(),date:todayStr(),metric:"bodyweight",value:v}); }
    save(); render();
  };
  const bht=$main.querySelector("#benchHistToggle"); if(bht) bht.onclick=()=>{ ui.benchHistoryOpen=!ui.benchHistoryOpen; render(); };
  const lb=$main.querySelector("#logBench"); if(lb) lb.onclick=()=>{
    const hv=$main.querySelector("#benchHang").value, pv=$main.querySelector("#benchPull").value;
    store.benchmarks=store.benchmarks||[];
    const d=todayStr();
    if(hv!=="") store.benchmarks.push({id:uid(),date:d,metric:"hang",value:Number(hv)});
    if(pv!=="") store.benchmarks.push({id:uid(),date:d,metric:"pull",value:Number(pv)});
    save(); render();
  };
  // target grade
  $main.querySelectorAll("[data-tstep]").forEach(b=>b.onclick=()=>{
    const dir=+b.dataset.tstep;
    store.settings.targetGrade=Math.max(4,Math.min(14,(store.settings.targetGrade??8)+dir));
    save(); render();
  });
  $main.querySelectorAll("[data-cstep]").forEach(b=>b.onclick=()=>{
    const dir=+b.dataset.cstep;
    store.settings.comfortableGrade=Math.max(0,Math.min(16,effectiveComfortableGrade()+dir));
    save(); render();
  });
  // grade chart tap
  $main.querySelectorAll("[data-chartpt]").forEach(c=>c.onclick=()=>{ ui.chartTap=+c.dataset.chartpt; render(); });
  // progress tab section disclosures
  $main.querySelectorAll("[data-progtoggle]").forEach(b=>b.onclick=()=>{
    const k=b.dataset.progtoggle; ui.progOpen[k]=!ui.progOpen[k]; render();
  });
}

function updateSaveBtn(){
  const sv=$main.querySelector("#save"); if(!sv)return;
  const ok=valid();
  sv.className="save"+(ok?" ready":"");
}

/* ---- export / backup / restore ---- */
function doExport(){
  const cur=currentProgress();
  const rows=[["date","type","detail","finger","rpe","notes"]];
  [...store.sessions].sort((a,b)=>a.date<b.date?-1:1).forEach(s=>{
    rows.push([s.date,s.type,detailOf(s).replace(/\s+/g," "),s.finger||"",s.rpe??"",(s.notes||"").replace(/[\n,]/g," ")]);
  });
  const csv=rows.map(r=>r.map(c=>/[",]/.test(String(c))?`"${c}"`:c).join(",")).join("\n");
  const text=`CruxLog export · today ${todayStr()} (Plan wk ${cur.absWeek}/${TOTAL_WEEKS}, ${cur.phase.name})\n${csv}`;
  const done=()=>{ ui.copied=true; render(); setTimeout(()=>{ ui.copied=false; render(); },1800); };
  if(navigator.clipboard?.writeText){ navigator.clipboard.writeText(text).then(done).catch(()=>fallbackCopy(text,done)); }
  else fallbackCopy(text,done);
}
function fallbackCopy(text,done){
  const ta=document.createElement("textarea"); ta.value=text; ta.style.position="fixed"; ta.style.opacity="0";
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand("copy"); }catch{}
  document.body.removeChild(ta); done();
}
function doBackup(){
  const blob=new Blob([JSON.stringify(store,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download=`cruxlog-backup-${todayStr()}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  ui.backed=true; render(); setTimeout(()=>{ ui.backed=false; render(); },1800);
}
function validSession(s){
  if(!s||typeof s!=="object") return false;
  if(!s.id||!s.date||!["climb","hang","lift"].includes(s.type)) return false;
  if(s.type==="climb" && !Array.isArray(s.grades)) return false;
  if(s.attempts!=null && (typeof s.attempts!=="object" || Array.isArray(s.attempts))) return false;
  if(s.type==="hang" && (!s.hang||typeof s.hang!=="object")) return false;
  if(s.type==="lift" && (!s.lift||typeof s.lift!=="object")) return false;
  return true;
}
document.getElementById("importer").onchange=e=>{
  const file=e.target.files[0]; if(!file)return;
  const r=new FileReader();
  r.onload=()=>{ try{
      const data=JSON.parse(r.result);
      if(!data||!Array.isArray(data.sessions)) throw 0;
      const validSessions=data.sessions.filter(validSession);
      const skipped=data.sessions.length-validSessions.length;
      ui.pendingImport={count:validSessions.length, skipped, data:{...data,sessions:validSessions}};
      ui.importError=null; render();
    }catch{ ui.importError="That doesn't look like a CruxLog backup file."; render();
      setTimeout(()=>{ ui.importError=null; render(); },3000); } };
  r.readAsText(file); e.target.value="";
};

/* ============================ boot ============================ */
load(); loadDraft(); render();
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));
}
</script>
