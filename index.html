<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#14181C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CruxLog">
<title>CruxLog</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-192.png">
<style>
  :root{
    --bg:#14181C; --panel:#1B2127; --panel2:#232B33; --line:#2E3842;
    --ink:#EAF0F2; --sub:#8B9AA6; --faint:#5C6B76; --accent:#6FB3C9;
    --good:#3FB68B; --tweaky:#E0A63C; --pain:#D9503F;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;}
  body{max-width:480px; margin:0 auto; min-height:100vh;}
  .mono{font-family:ui-monospace,Menlo,monospace;}
  button{font-family:inherit; cursor:pointer;}
  input,textarea{font-family:inherit;}
  input[type=date]{-webkit-appearance:none;}
  @media (prefers-reduced-motion: reduce){*{transition:none !important; animation:none !important;}}
  @keyframes savePop{0%{transform:scale(1)} 45%{transform:scale(1.045)} 100%{transform:scale(1)}}
  @keyframes heroIn{from{opacity:0; transform:translateY(-4px)} to{opacity:1; transform:translateY(0)}}

  /* header */
  header{position:sticky; top:0; z-index:5; background:var(--bg);
    border-bottom:1px solid var(--line);
    padding:calc(12px + env(safe-area-inset-top)) 16px 12px;
    display:flex; align-items:center; gap:10px;}
  .ladder{display:flex; gap:2px;}
  .ladder span{width:4px; height:18px; border-radius:2px;}
  .wordmark{font-weight:800; letter-spacing:1.5px; font-size:15px;}
  .wordmark .ver{font-weight:600; letter-spacing:0; font-size:10px; color:var(--faint); margin-left:6px; vertical-align:middle;}
  .goal{margin-left:auto; color:var(--faint); font-size:11px;}

  main{padding:18px 16px 130px;}

  /* segmented */
  .seg{display:flex; gap:4px; background:var(--panel2); padding:4px; border-radius:12px;}
  .seg button{flex:1; border:none; border-radius:9px; padding:10px 4px;
    font-size:14px; font-weight:700; background:transparent; color:var(--sub);
    display:flex; align-items:center; justify-content:center; gap:6px; transition:background .15s;}
  .seg button.on{background:var(--accent); color:#0E1418;}
  .seg svg{width:16px; height:16px;}

  .daterow{display:flex; align-items:center; justify-content:space-between; margin:16px 2px 4px;}
  .daterow input{background:transparent; border:none; color:var(--ink);
    font-size:15px; padding:0; font-family:ui-monospace,monospace;}
  .wk{color:var(--faint); font-size:12px; font-family:ui-monospace,monospace;}
  .rule{height:1px; background:var(--line); margin:8px 0 20px;}

  .field{margin-bottom:18px;}
  .flabel{color:var(--faint); font-size:12px; font-weight:700; letter-spacing:1px;
    text-transform:uppercase; margin-bottom:10px;}

  /* grade cards (compact sends/attempts steppers) */
  .gcards{display:grid; grid-template-columns:repeat(3,1fr); gap:8px;}
  .gcard{border-radius:12px; border:1.5px solid var(--line); background:var(--panel);
    padding:8px 4px 10px; display:flex; flex-direction:column; align-items:center; gap:6px;}
  .gcard .glab{font-family:ui-monospace,monospace; font-weight:800; font-size:13px; color:var(--ink);}
  .gcard .gctl{display:flex; align-items:center; gap:4px;}
  .gcard .gval{font-family:ui-monospace,monospace; font-size:15px; font-weight:700;
    min-width:20px; text-align:center; color:var(--ink);}
  .gstepbtn{width:36px; height:36px; border-radius:8px; border:1px solid var(--line);
    background:var(--panel2); color:var(--ink); display:flex; align-items:center; justify-content:center;}
  .gstepbtn svg{width:13px; height:13px;}
  .hint{color:var(--faint); font-size:12px; margin-top:8px;}

  /* stepper block */
  .stack{display:flex; flex-direction:column; gap:16px; background:var(--panel);
    border-radius:12px; padding:16px 14px;}
  .stepper{display:flex; align-items:center; justify-content:space-between;}
  .stepper .lab{color:var(--sub); font-size:14px;}
  .stepper .ctl{display:flex; align-items:center; gap:10px;}
  .stepper .val{font-family:ui-monospace,monospace; font-size:18px; font-weight:700;
    min-width:58px; text-align:center; color:var(--ink);}
  .stepbtn{width:44px; height:44px; border-radius:10px; border:1px solid var(--line);
    background:var(--panel2); color:var(--ink); display:flex; align-items:center; justify-content:center;}
  .stepbtn svg{width:16px; height:16px;}

  /* lift rows */
  .liftrow{background:var(--panel); border-radius:12px; padding:12px 14px;
    display:flex; align-items:center; gap:10px;}
  .liftrow .name{width:52px; color:var(--ink); font-weight:800; font-size:14px;}
  .liftrow .x{color:var(--faint);}
  .numin{box-sizing:border-box; background:var(--panel2); border:1px solid var(--line);
    border-radius:9px; color:var(--ink); text-align:center; padding:13px 6px;
    font-family:ui-monospace,monospace; font-size:15px; font-weight:700;}

  /* finger / effort / sleep / soreness — one shared chip component, optional 2nd-line sublabel */
  .row3{display:flex; gap:8px;}
  .chip{flex:1; border-radius:12px; padding:12px 4px; border:1.5px solid var(--line);
    background:var(--panel); color:var(--sub); font-weight:700; font-size:14px;
    display:flex; flex-direction:column; align-items:center; gap:5px;}
  .chip .dot{width:12px; height:12px; border-radius:6px;}
  .chip .sub{font-size:10px; font-weight:600; color:var(--faint);}
  .chip.on{border-color:var(--accent); background:rgba(111,179,201,.13); color:var(--ink);}
  .chip.on .sub{color:var(--accent);}

  textarea.notes{width:100%; resize:none; background:var(--panel); border:1px solid var(--line);
    border-radius:12px; color:var(--ink); font-size:15px; padding:12px 14px;}

  .save{width:100%; border:none; border-radius:14px; padding:16px; font-size:16px;
    font-weight:800; letter-spacing:.3px; background:var(--panel2); color:var(--faint);
    display:flex; align-items:center; justify-content:center; gap:8px; transition:background .2s;}
  .save.ready{background:var(--accent); color:#0E1418;}
  .save.flash{background:var(--good); color:#0E1418; animation:savePop .4s cubic-bezier(.34,1.56,.64,1);}
  .save svg{width:18px; height:18px;}

  /* history */
  .hcard{background:var(--panel); border-radius:14px; padding:14px; margin-bottom:10px;
    border:1px solid var(--line);}
  .hhead{display:flex; align-items:center; gap:10px; margin-bottom:8px;}
  .hhead .type{color:var(--ink); font-weight:700; font-size:14px; text-transform:capitalize;}
  .hhead .fdot{width:9px; height:9px; border-radius:5px;}
  .hhead .date{margin-left:auto; color:var(--faint); font-size:12px; font-family:ui-monospace,monospace;}
  .hhead .del{background:var(--panel2); border:1px solid var(--line); color:var(--sub);
    padding:6px 10px; border-radius:8px; display:flex; align-items:center; gap:5px;
    flex-shrink:0; font-size:12px; font-weight:700; min-height:30px;}
  .hhead .del svg{width:14px; height:14px; flex-shrink:0;}
  .hhead .del.confirm{background:rgba(217,80,63,.15); border-color:var(--pain); color:var(--pain);}
  .hdetail{font-family:ui-monospace,monospace; font-size:14px; color:var(--ink); letter-spacing:-.2px;}
  .hnotes{color:var(--sub); font-size:13px; margin-top:6px;}
  .hicon{color:var(--accent); display:flex;}
  .hicon svg{width:16px; height:16px;}

  /* progress */
  .cur{background:linear-gradient(160deg, var(--panel), #202A33); border-radius:16px; padding:18px 16px;
    margin-bottom:14px; box-shadow:0 8px 24px rgba(0,0,0,.35); animation:heroIn .25s ease-out;}
  .cur .lab{color:var(--faint); font-size:12px; font-weight:700; letter-spacing:1px; text-transform:uppercase;}
  .cur .big{display:flex; align-items:baseline; gap:10px; margin-top:6px;}
  .cur .wknum{font-family:ui-monospace,monospace; font-size:34px; font-weight:800; color:var(--ink);}
  .cur .phase{color:var(--accent); font-size:15px; font-weight:700;}
  .statgrid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px;}
  .stat{background:var(--panel); border-radius:14px; padding:16px 14px; border:1px solid var(--line); box-shadow:0 4px 12px rgba(0,0,0,.25);}
  .stat .lab{color:var(--faint); font-size:12px; font-weight:700; letter-spacing:.5px; text-transform:uppercase;}
  .stat .v{font-family:ui-monospace,monospace; font-size:26px; font-weight:800; margin-top:4px; color:var(--ink);}
  .stat .sub{font-size:11px; color:var(--faint); margin-top:2px;}
  .streak{display:flex; align-items:center; gap:6px; margin-top:4px; color:var(--faint);}
  .streak svg{width:13px; height:13px; flex-shrink:0;}
  .streak .txt{font-size:12px; color:var(--faint); font-weight:600;}
  .streak .txt small{color:var(--faint); font-weight:600;}
  .btn2{width:100%; border-radius:14px; padding:16px; background:var(--panel2); color:var(--ink);
    font-size:15px; font-weight:800; display:flex; align-items:center; justify-content:center; gap:8px;
    border:1px solid var(--line); transition:background .2s; margin-bottom:10px;}
  .btn2.flash{background:var(--good); color:#0E1418; border-color:var(--good); animation:savePop .4s cubic-bezier(.34,1.56,.64,1);}
  .btn2.danger{background:transparent; color:var(--pain); border-color:var(--pain);}
  .btn2 svg{width:18px; height:18px;}
  .note{color:var(--faint); font-size:12px; margin-top:2px; text-align:center; line-height:1.5;}

  /* empty */
  .empty{padding:80px 32px; text-align:center; color:var(--sub);}
  .empty .icon{color:var(--faint); display:flex; justify-content:center; margin-bottom:16px;}
  .empty .icon svg{width:30px; height:30px;}
  .empty .t{color:var(--ink); font-size:17px; font-weight:700; margin-bottom:8px;}
  .empty .b{font-size:14px; line-height:1.5;}

  /* info tab: rendered training plan markdown */
  .mdwrap{padding:4px 2px 24px; line-height:1.55; font-size:14px; color:var(--sub);}
  .mdwrap .mdh1{font-size:20px; color:var(--ink); font-weight:800; margin:4px 0 14px;}
  .mdwrap .mdh2{font-size:16px; color:var(--ink); font-weight:800; margin:24px 0 8px; padding-top:16px; border-top:1px solid var(--line);}
  .mdwrap .mdh2:first-child{border-top:none; padding-top:0; margin-top:0;}
  .mdwrap .mdh3{font-size:14px; color:var(--accent); font-weight:800; margin:16px 0 6px;}
  .mdwrap .mdh4{font-size:13px; color:var(--ink); font-weight:700; margin:12px 0 4px;}
  .mdwrap p{margin:0 0 10px;}
  .mdwrap strong{color:var(--ink);}
  .mdwrap em{font-style:italic;}
  .mdwrap ul, .mdwrap ol{margin:0 0 10px; padding-left:20px;}
  .mdwrap li{margin:0 0 6px;}
  .mdwrap li ul, .mdwrap li ol{margin:6px 0 0;}
  .mdtable{width:100%; border-collapse:collapse; margin:0 0 14px; font-size:12.5px;}
  .mdtable th, .mdtable td{border:1px solid var(--line); padding:6px 8px; text-align:left; vertical-align:top;}
  .mdtable th{background:var(--panel2); color:var(--ink); font-weight:700;}

  /* nav */
  nav{position:fixed; bottom:0; left:50%; transform:translateX(-50%);
    width:100%; max-width:480px; background:var(--panel); border-top:1px solid var(--line);
    display:flex; padding:8px 8px calc(8px + env(safe-area-inset-bottom));}
  nav button{flex:1; background:none; border:none; color:var(--faint); padding:8px 0;
    display:flex; flex-direction:column; align-items:center; gap:4px; font-size:11px; font-weight:700;}
  nav button.on{color:var(--accent);}
  nav svg{width:20px; height:20px;}
</style>
</head>
<body>
<header>
  <div class="ladder" id="ladder"></div>
  <span class="wordmark">CRUXLOG<span class="ver" id="verTag"></span></span>
  <span class="goal mono" id="goalTag">&rarr; V8</span>
</header>
<main id="main"></main>
<nav id="nav"></nav>

<input type="file" id="importer" accept="application/json" style="display:none">

<script>
"use strict";
/* ============================ constants ============================ */
// Bump alongside sw.js's CACHE string on every deploy — shown in the header so it's
// obvious at a glance (e.g. after a force-close/reopen) which build is actually running.
const APP_VERSION = "v25";
const KEY = "climb-tracker-v1";
const DRAFT_KEY = "climb-tracker-v1-draft";
/* V0-V16 — extended past the V10 "typical" ceiling so target/comfortable-grade settings
   (clamped up to V14-V16 elsewhere) never index past the end of this array. */
const GRADE_COLORS = ["#5E8A96","#5E9689","#5F9C7E","#79A066","#A3A055","#C0983F",
  "#CE8B44","#D57947","#D0603F","#C24F45","#B04343",
  "#9F3C56","#8C3568","#792E7A","#66278C","#53209E","#4019B0"];
/* One lift day/week, every phase — see TRAINING_PLAN.md "Lift Day Protocol". */
const LIFT_DAY = [
  {key:"pullup",    name:"Weighted pull-up",         short:"Pull-up",    sets:4, repTarget:"3-5",  bw:true},
  {key:"ohp",       name:"Overhead press",           short:"OHP",        sets:3, repTarget:"5"},
  {key:"squat",     name:"Squat (or leg press)",     short:"Squat",      sets:3, repTarget:"8-10"},
  {key:"pullapart", name:"Band pull-apart / face pull", short:"Pull-apart", sets:3, repTarget:"15"},
  {key:"wristext",  name:"Wrist extensor curl",      short:"Wrist ext",  sets:3, repTarget:"12"},
  {key:"hlr",       name:"Hanging leg raise",        short:"Leg raise",  sets:3, repTarget:"8-10"},
];
function blankLiftEntries(){
  const o={}; LIFT_DAY.forEach(L=>{ o[L.key]=Array.from({length:L.sets},()=>({weight:"",reps:""})); });
  return o;
}
const FINGER = {
  good:{label:"Good",dot:"var(--good)"},
  tweaky:{label:"Tweaky",dot:"var(--tweaky)"},
  pain:{label:"Pain",dot:"var(--pain)"},
};
const EFFORT = [
  {key:"easy",label:"Easy",rpe:5},{key:"solid",label:"Solid",rpe:7},
  {key:"hard",label:"Hard",rpe:9},{key:"max",label:"Max",rpe:10},
];
const SLEEP = {
  poor:{label:"Poor",dot:"var(--pain)"},
  ok:{label:"OK",dot:"var(--tweaky)"},
  good:{label:"Good",dot:"var(--good)"},
};
const SORENESS = {
  fresh:{label:"Fresh",dot:"var(--good)"},
  tired:{label:"Tired",dot:"var(--tweaky)"},
  sore:{label:"Sore",dot:"var(--pain)"},
};
const MILESTONES = [10,25,50,75,100,150,200]; // session-count round numbers worth a one-time celebration
const SCHEMA_VERSION = 1; // bump + add a migration step in load() when the stored shape changes
const DEFAULTS = {
  version: SCHEMA_VERSION,
  sessions:[],
  liftTargets:{chin:0,ohp:null,squat:null,row:null,bench:null,dl:null},
  lastLiftDay:null, dailyChecks:{},
  settings:{targetGrade:8, bodyweight:null, comfortableGrade:null},
  benchmarks:[], // {id,date,metric:'hang'|'pull',value}
  progress:{phaseIdx:0, weekInPhase:1, slot:0}, // advances only when a session is logged — never tied to the calendar
};

/* ---- program: phases + weekly templates, from TRAINING_PLAN.md ----
   Progress through this is driven entirely by logged sessions, not dates.
   Miss a day, take a week off, whatever — the plan just waits at the same slot. */
const PHASES = [
  {key:"recon",    name:"Reconditioning",          weeks:4,
    note:"Rebuild tendon tolerance & volume. No limit bouldering, no max hangs."},
  {key:"strength", name:"Strength Base",            weeks:8,
    note:"Max hangs + weighted pull-ups build the strength ceiling."},
  {key:"power",    name:"Power & Power-Endurance",  weeks:8,
    note:"Convert strength into hard moves and links."},
  {key:"perform",  name:"Performance / Send",       weeks:6,
    note:"Project V6–V8. Taper training volume, chase sends."},
];
const TOTAL_WEEKS = PHASES.reduce((a,p)=>a+p.weeks,0);

// ordered session slots per phase — exactly one lift slot/week in every phase (see TRAINING_PLAN.md).
// "full" is the longer coaching note shown when you tap the Up Next card for detail.
const LIFT_FULL = {
  recon:    "6 lifts. Load: bodyweight / very light. Reps: clean, full range.",
  strength: "6 lifts. Pull-up/OHP/squat: add load when reps clean. Others: steady, non-maxing load.",
  power:    "6 lifts. Pull-up/OHP/squat: hold current load, no new PRs. Others: steady load, every week.",
  perform:  "6 lifts. Reduced volume. Maintenance load only.",
};
/* {{grade}} is resolved at render time from your logged send history (see gradeRangeFor). */
const WEEKLY_TEMPLATES = {
  recon:[
    {type:"climb",label:"Climb — volume (mileage/footwork)", detail:"{{grade}} · high volume · footwork", targetRpe:5, gradeRole:"volume",
      full:"Grade: {{grade}}. Volume: high. Angle: easy-moderate. Constraint: footwork precision, not difficulty. No limit attempts."},
    {type:"hang", label:"Hangboard — repeaters (endurance)", detail:"20mm · {{load}} · 7s/3s×6",protocol:"repeater", targetRpe:6,
      full:"Edge: 20mm. Load: {{load}}. Protocol: 7s hang / 3s rest × 6 reps, 3min rest between sets, 2 sets/grip type (open + half-crimp)."},
    {type:"climb",label:"Climb — volume (mileage/footwork)", detail:"{{grade}} · high volume · footwork", targetRpe:5, gradeRole:"volume",
      full:"Same as other volume day. Grade: {{grade}}. Mileage + footwork, not difficulty."},
    {type:"hang", label:"Hangboard — repeaters (endurance)", detail:"20mm · {{load}} · 7s/3s×6",protocol:"repeater", targetRpe:6,
      full:"2nd repeater session this week. Same protocol as prior session. Edge: 20mm. Load: {{load}}."},
    {type:"lift", label:"Lift — light",  detail:"6 lifts · light load", targetRpe:5,
      full:LIFT_FULL.recon},
    {type:"climb",label:"Climb — ARC / easy (active recovery)", detail:"{{grade}} · 20–30min continuous", targetRpe:4, gradeRole:"arc",
      full:"Grade: {{grade}}. Duration: 20-30min continuous movement, minimal rest. No pump."},
  ],
  strength:[
    {type:"climb",label:"Climb — volume (mileage/footwork)", detail:"{{grade}} · footwork drills", targetRpe:6, gradeRole:"volume",
      full:"Grade: {{grade}}. Volume: moderate. Include 2-3 footwork-drill problems. Warm up before harder attempts."},
    {type:"hang", label:"Hangboard — max hangs (raw strength)", detail:"20mm · {{load}} · 10s/3min×5–6",protocol:"max", targetRpe:9,
      full:"Edge: 20mm. Load: {{load}} (near-max). Protocol: 10s hang / 3min rest × 5-6 sets. Full rest required, no shortcuts."},
    {type:"climb",label:"Climb — volume / ARC (mileage)", targetRpe:5, gradeRole:"volume",
      full:"Grade: {{grade}}. Active recovery / mileage."},
    {type:"hang", label:"Hangboard — repeaters (endurance)", detail:"{{load}} · repeaters + core",protocol:"repeater", targetRpe:6,
      full:"Load: {{load}}. Repeaters + core. Intensity: moderate — maintenance, not primary stimulus."},
    {type:"lift", label:"Lift — build",  detail:"6 lifts · progressive overload", targetRpe:7,
      full:LIFT_FULL.strength},
    {type:"climb",label:"Climb — project/limit (your hardest attempts)", detail:"{{grade}} · low volume · full rest", targetRpe:9, gradeRole:"limit",
      full:"Grade: {{grade}}. Volume: low. Rest: full (3-5min) between attempts. Movement quality not required. Scheduled last, after both volume days, so it lands on fresher tissue."},
  ],
  power:[
    {type:"climb",label:"Climb — limit (your hardest attempts)", detail:"{{grade}} · low volume · full rest", targetRpe:9, gradeRole:"limit",
      full:"Grade: {{grade}}. Volume: low. Rest: full between attempts."},
    {type:"hang", label:"Hangboard — maintenance (hold current strength)", detail:"1×/week · {{load}}",protocol:"max", targetRpe:7,
      full:"Frequency: 1×/week. Load: {{load}}. Sets: 3-4. Maintenance only, no new PRs."},
    {type:"climb",label:"Climb — power-endurance (linking hard moves)", detail:"4x4s · {{grade}}", targetRpe:8, gradeRole:"powerEnd",
      full:"Grade: {{grade}}. Protocol: 4x4s or linked circuits. Rest: minimal between attempts."},
    {type:"lift", label:"Lift — maintain",  detail:"6 lifts · hold current load", targetRpe:6,
      full:LIFT_FULL.power},
    {type:"climb",label:"Climb — volume / campus (mileage)", targetRpe:5, gradeRole:"volume",
      full:"Grade: {{grade}} volume, or campus (basic ladders, matching only)."},
  ],
  perform:[
    {type:"climb",label:"Climb — project (chasing the send)", detail:"{{grade}} · full rest", targetRpe:9, gradeRole:"project",
      full:"Grade: {{grade}}. Rest: full between burns."},
    {type:"hang", label:"Hangboard — maintenance (hold current strength)", detail:"{{load}} · short session",protocol:"max", targetRpe:6,
      full:"Load: {{load}}. Duration: short. Maintenance only, no grinding."},
    {type:"climb",label:"Climb — project (chasing the send)", detail:"{{grade}} · full rest", targetRpe:9, gradeRole:"project",
      full:"2nd project session this week. Grade: {{grade}}. Rest: full between burns."},
    {type:"lift", label:"Lift — maintain",  detail:"6 lifts · reduced volume", targetRpe:5,
      full:LIFT_FULL.perform},
    {type:"climb",label:"Climb — volume / technique (mileage)", targetRpe:5, gradeRole:"volume",
      full:"Grade: {{grade}}. Volume or technique review (film footwork/hips on project crux)."},
  ],
};
function slotsOf(phaseKey){ return WEEKLY_TEMPLATES[phaseKey]||WEEKLY_TEMPLATES.strength; }

/* ---- dynamic grade prescription ----
   "Comfortable grade" is the highest grade with 3+ logged sends — a real, evidence-based
   floor rather than a guess, and it ratchets up automatically as you log more climbs.
   Falls back to (targetGrade - 4) only when there's no send history yet to compute it. */
function computeComfortableGrade(){
  const counts={};
  store.sessions.forEach(s=>{ if(s.type==="climb") (s.grades||[]).forEach(g=>{ counts[g]=(counts[g]||0)+1; }); });
  let best=null;
  for(let g=0; g<=16; g++){ if((counts[g]||0)>=3) best=g; }
  return best;
}
/* Layoff decay: detraining literature (Mujika & Padilla, cited in TRAINING_PLAN.md) says
   capacity regresses after an extended gap. 1 grade back per 4-week block beyond a 3-week
   grace period. New evidence (3+ sends at the old grade) overrides this immediately via
   computeComfortableGrade(), so decay only affects the window before you've re-proven it. */
function effectiveComfortableGrade(){
  const stored=store.settings.comfortableGrade;
  const computed=computeComfortableGrade();
  let cg = (computed!=null && (stored==null || computed>stored)) ? computed : (stored ?? Math.max(0,(store.settings.targetGrade??8)-4));
  const lastClimb=[...store.sessions].filter(s=>s.type==="climb").sort((a,b)=>a.date<b.date?1:-1)[0];
  if(lastClimb){
    const gapDays=dayDiff(todayStr(),lastClimb.date);
    if(gapDays>21){
      const decay=Math.floor((Math.floor(gapDays/7)-3)/4)+1;
      cg=Math.max(0,cg-decay);
    }
  }
  return cg;
}
function gradeRangeFor(role){
  const cg=effectiveComfortableGrade();
  const target=store.settings.targetGrade??8;
  switch(role){
    case "volume": return [Math.max(0,cg-3), cg];
    case "arc": return [Math.max(0,cg-4), Math.max(0,cg-2)];
    case "limit": return [cg+1, cg+2];
    case "powerEnd": return [cg, cg+1];
    case "project": return [Math.max(cg+1,target-2), target];
    default: return [Math.max(0,cg-2), cg];
  }
}
function gradeRangeText(role){
  const [lo,hi]=gradeRangeFor(role);
  return lo>=hi ? `V${hi}` : `V${lo}–V${hi}`;
}
function resolveSlotText(slot){
  const grade = slot.gradeRole ? gradeRangeText(slot.gradeRole) : "";
  const load = slot.type==="hang" ? loadText(suggestHangLoad(slot.protocol)) : "";
  const sub=(s)=> s ? s.replace(/\{\{grade\}\}/g,grade).replace(/\{\{load\}\}/g,load) : s;
  return {...slot, detail:sub(slot.detail), full:sub(slot.full)};
}
/* Finds the plan slot (in the current phase) that best matches whatever the Log form is
   currently set to, so the Log tab can always show full protocol detail — not just when
   you arrived there via the Plan tab's "Log this session" button. */
function findMatchingSlot(f){
  const slots=currentProgress().slots;
  if(f.type==="hang") return slots.find(s=>s.type==="hang"&&s.protocol===f.protocol) || slots.find(s=>s.type==="hang");
  if(f.type==="climb") return slots.find(s=>s.type==="climb"&&s.gradeRole===(f.gradeRole||"volume")) || slots.find(s=>s.type==="climb");
  if(f.type==="lift") return slots.find(s=>s.type==="lift");
  return null;
}

/* ---- dynamic load prescription ----
   Autoregulated progressive overload: hold/deload after a hard or painful session, add load
   after an easy/solid one, halve suggested load outright during a deload week. */
function loadText(lb){ return lb>0?`+${lb}lb`:lb<0?`${lb}lb`:"bodyweight"; }
/* Half-crimp and open-hand loads aren't comparable — default to whichever grip you most
   recently logged for this protocol, so load suggestions/trends aren't averaging apples
   and oranges. */
function latestGripFor(protocol){
  const s=[...store.sessions].filter(x=>x.type==="hang"&&x.hang&&x.hang.protocol===protocol).sort((a,b)=>a.date<b.date?1:-1)[0];
  return s?.hang?.grip || "half";
}
function suggestHangLoad(protocol,grip){
  grip = grip || latestGripFor(protocol);
  const hist=[...store.sessions].filter(s=>s.type==="hang"&&s.hang&&s.hang.protocol===protocol&&(s.hang.grip||"half")===grip).sort((a,b)=>a.date<b.date?1:-1);
  const cur=currentProgress();
  if(!hist.length){
    if(protocol==="max"){ const bench=latestBenchmark("hang"); return bench?Math.round(bench.value):0; }
    return 0;
  }
  const last=hist[0];
  const base=last.hang.addedLb??0;
  if(cur.isDeload) return Math.round(base*0.5);
  if(last.finger==="pain"||last.finger==="tweaky") return base;
  if(last.rpe!=null && last.rpe<=7) return base+5;
  return base;
}
const PROGRESSABLE_LIFTS = new Set(["pullup","ohp","squat"]); // per plan doc — the other 3 are prehab/maintenance, not progressive-overload targets
function suggestLiftWeight(key){
  const hist=[...store.sessions].filter(s=>s.type==="lift"&&s.lift&&s.lift.entries&&s.lift.entries[key]&&s.lift.entries[key].length)
    .sort((a,b)=>a.date<b.date?1:-1);
  if(!hist.length) return null;
  const rows=hist[0].lift.entries[key];
  const topWeight=Math.max(...rows.map(r=>Number(r.weight)||0));
  const cur=currentProgress();
  if(cur.isDeload) return Math.round(topWeight*0.5);
  if(!PROGRESSABLE_LIFTS.has(key) || cur.phase.key!=="strength") return topWeight;
  const targetReps = key==="pullup" ? 3 : key==="squat" ? 8 : 5;
  const topSet=rows.find(r=>Number(r.weight)===topWeight);
  const repsHit = topSet && Number(topSet.reps)>=targetReps;
  const painFlag = hist[0].finger==="pain"||hist[0].finger==="tweaky";
  if(painFlag) return topWeight;
  return repsHit ? topWeight+5 : topWeight;
}

/* Benchmark-gated phase exit. Reconditioning and Performance are intentionally NOT gated:
   tendon adaptation runs on a timeline strength numbers can't shortcut (recon), and Performance's
   "exit" is just plan completion, not a strength target. Strength Base and Power DO have a
   measurable exit signal, so those are held open past their nominal length (up to 1.5x) until met. */
function benchmarkGateStatus(phaseKey){
  if(phaseKey==="strength"){
    const bw=store.settings.bodyweight;
    if(!bw) return {applies:true, met:null, text:"Bodyweight required for benchmark gate. Set in Progress tab."};
    const hang=latestBenchmark("hang"), pull=latestBenchmark("pull");
    const hangPct = hang ? (hang.value/bw)*100 : 0;
    const pullPct = pull ? (pull.value/bw)*100 : 0;
    return {applies:true, met: hangPct>=20 && pullPct>=30,
      text:`Exit target: max hang ≥20% BW (now ${hangPct.toFixed(0)}%), weighted pull-up ≥30% BW (now ${pullPct.toFixed(0)}%).`};
  }
  if(phaseKey==="power"){
    const target=store.settings.targetGrade??8;
    let hardest=-1; store.sessions.forEach(s=>(s.grades||[]).forEach(g=>{ if(g>hardest) hardest=g; }));
    return {applies:true, met: hardest>=target-3,
      text:`Exit target: a send of V${Math.max(0,target-3)}+ this phase (hardest so far: ${hardest>=0?"V"+hardest:"none yet"}).`};
  }
  return {applies:false, met:true, text:""};
}
function currentProgress(){
  const p = store.progress || DEFAULTS.progress;
  const phaseIdx = Math.min(p.phaseIdx, PHASES.length-1);
  const phase = PHASES[phaseIdx];
  const slots = slotsOf(phase.key);
  const cap = Math.ceil(phase.weeks*1.5);
  const weekInPhase = Math.min(Math.max(p.weekInPhase,1), cap);
  const slot = Math.min(Math.max(p.slot,0), slots.length-1);
  const donePhaseWeeks = PHASES.slice(0,phaseIdx).reduce((a,ph)=>a+ph.weeks,0);
  const absWeek = donePhaseWeeks + Math.min(weekInPhase,phase.weeks);
  const gate = benchmarkGateStatus(phase.key);
  const held = gate.applies && gate.met===false && weekInPhase>phase.weeks;
  // Deload every 4th week, PLUS the moment a phase confirms as held past its nominal length —
  // an unmet benchmark after the full phase duration is itself a signal to back off before continuing.
  const heldEntry = held && weekInPhase===phase.weeks+1;
  return {phaseIdx,phase,slots,weekInPhase,slot,absWeek,cap,gate,held,next:slots[slot],
    isDeload:(phase.key==="strength"||phase.key==="power") && (weekInPhase%4===0 || heldEntry)};
}
function advanceProgress(){
  const cur=currentProgress();
  let {phaseIdx,weekInPhase,slot}=cur;
  const slots=cur.slots;
  slot++;
  if(slot>=slots.length){
    slot=0; weekInPhase++;
    if(weekInPhase>cur.phase.weeks){
      const gate=benchmarkGateStatus(cur.phase.key);
      const blocked = gate.applies && gate.met===false && weekInPhase<=cur.cap;
      if(!blocked){
        weekInPhase=1;
        if(phaseIdx<PHASES.length-1) phaseIdx++;
        else { store.progress={phaseIdx,weekInPhase:cur.phase.weeks,slot:slots.length-1,completedCycle:true}; return; }
      }
      // else: held — stay in this phase past its nominal length until the benchmark is met or the cap is hit
    }
  }
  store.progress={phaseIdx,weekInPhase,slot};
}

const FINGER_INTENSITY_TYPES = s => s.type==="hang" || (s.type==="climb" && (s.rpe>=9));
function computeGuardrails(store){
  const out=[];
  const sessions=[...store.sessions].sort((a,b)=>a.date<b.date?1:-1);
  const fingerSessions=sessions.filter(FINGER_INTENSITY_TYPES);

  // Scan all adjacent pairs in recent finger-intensity history, not just the single most recent —
  // catches a violation buried a few sessions back (e.g. after a backfilled/edited entry).
  const recentFinger=fingerSessions.slice(0,10);
  const has48hViolation=recentFinger.some((s,i)=> i<recentFinger.length-1 && Math.abs(dayDiff(s.date,recentFinger[i+1].date))<=1);
  if(has48hViolation){
    out.push({level:"bad",text:"Add a rest day — two finger-intensity sessions landed on consecutive days (48h rule)."});
  }
  const rollingCutoff=dayDiff(todayStr(),"1970-01-01")-7;
  const last7dFinger=fingerSessions.filter(s=>dayDiff(s.date,"1970-01-01")>rollingCutoff);
  if(last7dFinger.length>3){
    out.push({level:"warn",text:`Reduce finger-intensity frequency — ${last7dFinger.length} sessions this week, cap is 3.`});
  }
  // Widened pain-trend: catches alternating pain/tweaky patterns (e.g. pain -> good -> tweaky),
  // not just two identical consecutive flags, since that's still a recurring-issue signal.
  const recentFlags=sessions.filter(s=>s.finger).slice(0,3).map(s=>s.finger);
  if(recentFlags[0]==="pain" && recentFlags[1]==="pain"){
    out.push({level:"bad",text:"Take a deload — pain flagged 2 sessions in a row."});
  } else if(recentFlags.filter(f=>f==="pain"||f==="tweaky").length>=2){
    out.push({level:"warn",text:"Ease off intensity — pain or tweaky fingers in 2 of your last 3 sessions."});
  }

  // acute:chronic workload ratio — overall session-count spike detection, not just finger sessions.
  // ACWR = last 7 days' session count / (last 28 days' average weekly count). >1.5 is the commonly
  // cited danger zone (Gabbett 2016) where sudden load jumps correlate with higher injury risk.
  // Caveat: Gabbett's threshold was validated on team-sport athletes at 2-4 sessions/week; this
  // plan runs 5-6/week baseline, so require >=2 chronic weeks of data (not 1) before evaluating,
  // reducing false positives from thin history — the ratio itself still self-calibrates to your
  // own baseline since chronicWeekly is computed from your actual logged pace, not an assumption.
  const nowEpoch=dayDiff(todayStr(),"1970-01-01");
  const acuteCount=sessions.filter(s=>dayDiff(s.date,"1970-01-01")>nowEpoch-7).length;
  const chronicCount=sessions.filter(s=>dayDiff(s.date,"1970-01-01")>nowEpoch-28).length;
  const chronicWeekly=chronicCount/4;
  if(chronicWeekly>=2){
    const acwr=acuteCount/chronicWeekly;
    if(acwr>1.5){
      out.push({level:"warn",text:`Reduce volume — you're training much more than usual this week (${acuteCount} sessions vs your ${chronicWeekly.toFixed(1)}/wk average, load ratio ${acwr.toFixed(1)}, threshold 1.5).`});
    }
  }

  // volume ACWR (tries = sends + failed attempts) — session-count ACWR above only catches
  // frequency spikes; this catches within-session load spikes (e.g. same session count but
  // triple the tries), which matter more for finger/tendon loading than session count alone.
  const {acuteTries,chronicTriesWeekly}=triesLoadAt(todayStr());
  if(chronicTriesWeekly>=10){
    const triesAcwr=acuteTries/chronicTriesWeekly;
    if(triesAcwr>1.5){
      out.push({level:"warn",text:`Reduce volume — a single session's climbing load spiked this week (${acuteTries} sends+attempts vs your ${chronicTriesWeekly.toFixed(0)}/wk average, load ratio ${triesAcwr.toFixed(1)}, threshold 1.5).`});
    }
  }

  // single-session hard-attempt cap — quality-over-quantity for limit bouldering: past
  // ~10-15 true-limit tries in one session, technique breaks down under fatigue faster than
  // strength is gained, and tendon loading keeps accruing without matching benefit.
  const hardCap=hardAttemptsCheck();
  if(hardCap) out.push({level:"info",text:hardCap});

  const cur=currentProgress();
  if(cur.isDeload){
    out.push({level:"info",text:"Deload week: halve hangboard/lift volume."});
  }

  // progressive-overload plateau check — only meaningful where the plan expects steady load increases.
  if(cur.phase.key==="strength"){
    const hangP=plateauCheck("hang","Max hang load");
    if(hangP) out.push({level:"info",text:hangP});
    const pullP=plateauCheck("pull","Pull-up load");
    if(pullP) out.push({level:"info",text:pullP});
    // positive counterpart to the plateau check — every other branch in this function only ever
    // fires on a problem, so surface it explicitly when the same metrics are actually climbing.
    const hangR=risingCheck("hang","Max hang load");
    if(hangR) out.push({level:"good",text:hangR});
    const pullR=risingCheck("pull","Pull-up load");
    if(pullR) out.push({level:"good",text:pullR});
  }

  // stalled-grade check — the plan doc's own rule: 3+ stuck project sessions means cycle back to strength work.
  if(cur.phase.key==="perform"){
    const stalled=stalledGradeCheck();
    if(stalled) out.push({level:"warn",text:stalled});
  }

  // RPE/intensity-mismatch — flags intensity creep: logging a much harder effort than the day called for.
  if(sessions[0] && sessions[0].intensityFlag){
    const {target,actual}=sessions[0].intensityFlag;
    out.push({level:"warn",text:`That last session ran harder than planned — logged effort was RPE ${actual}, this slot targets around RPE ${target}. Ease off on the next easy day.`});
  }

  // readiness caution — if the most recent readiness log was poor and the next session is high-intensity.
  const lastReadiness=sessions.find(s=>s.sleep||s.soreness);
  if(lastReadiness && (lastReadiness.sleep==="poor" || lastReadiness.soreness==="sore") && (cur.next?.targetRpe??0)>=8){
    out.push({level:"warn",text:`Consider swapping in something lighter — you logged ${lastReadiness.sleep==="poor"?"poor sleep":"soreness"} last time, and the next session (${cur.next.label}) is high-intensity.`});
  }

  return out;
}
/* Tiny deterministic string hash — used to pick a stable-per-day copy variation without
   persisting anything or needing a real RNG (same input always picks the same option). */
function hashCode(str){
  let h=0;
  for(let i=0;i<str.length;i++){ h=(h*31+str.charCodeAt(i))|0; }
  return Math.abs(h);
}
function pick(seed,options){ return options[hashCode(seed)%options.length]; }

const ONTRACK_LINES=[
  "No flags — steady as planned.",
  "Nothing to report. Keep stacking sessions.",
  "Load looks right for where you are in the plan.",
];
/* Collapses the guardrail levels already computed above into one glanceable word+color+line —
   the "hero" state for the Plan tab, reusing computeGuardrails' output rather than re-deriving. */
function loadVerdict(warnings,isDeload){
  if(isDeload) return {label:"Deload",color:"var(--accent)",detail:"Recovery week — lighter load by design."};
  const bad=warnings.find(w=>w.level==="bad");
  if(bad) return {label:"Ease up",color:"var(--pain)",detail:bad.text};
  const warn=warnings.find(w=>w.level==="warn");
  if(warn) return {label:"Caution",color:"var(--tweaky)",detail:warn.text};
  const good=warnings.find(w=>w.level==="good");
  return {label:"On track",color:"var(--good)",detail: good ? good.text : pick(todayStr()+"ontrack",ONTRACK_LINES)};
}
/* One contextual line for the "Up next" card, composed entirely from data already computed
   elsewhere (trend/tries helpers) — replaces the old standalone next-grade card. */
function sessionInsight(next){
  if(next.type==="climb"){
    if(next.gradeRole==="limit" || next.gradeRole==="project"){
      const t=triesAtNextGrade();
      if(t) return t.tries>0
        ? `${t.tries} ${t.tries===1?"try":"tries"} logged at V${t.projectGrade} so far.`
        : `No tries logged yet at V${t.projectGrade} — first crack today.`;
    }
    const recent=sendsAttemptsSeries(3);
    if(recent.length){
      const sends=recent.reduce((a,r)=>a+r.sends,0), att=recent.reduce((a,r)=>a+r.attempts,0);
      return `Last ${recent.length} climbing session${recent.length===1?"":"s"}: ${sends} sends, ${att} attempts.`;
    }
    return "First climb session logged sets your baseline.";
  }
  if(next.type==="hang"){
    const protocol=next.protocol||"repeater";
    const grip=latestGripFor(protocol);
    const t=hangTrend(protocol,grip);
    if(t.length>=2){
      const dir = t[t.length-1]>t[0] ? "climbing" : t[t.length-1]<t[0] ? "down" : "holding steady";
      return `Load ${dir} — last ${t.length}: ${t.join("→")}lb.`;
    }
    return `First ${protocol==="max"?"max hang":"repeater"} session — establishing baseline load.`;
  }
  if(next.type==="lift"){
    const t=liftTrend("pullup");
    if(t.length>=2) return `Pull-up top set: ${t.slice(-3).join("→")}lb.`;
    return "Lift day — same six exercises, every week.";
  }
  return null;
}
function climbTries(s){
  if(s.type!=="climb") return 0;
  const sends=(s.grades||[]).length;
  const attempts=Object.values(s.attempts||{}).reduce((a,b)=>a+b,0);
  return sends+attempts;
}
/* Tries-based acute:chronic load, as of a given date — shared by the live guardrail check
   (asOf today) and the rolling ACWR trend chart (asOf each of the last N week-endings). */
function triesLoadAt(dateStr){
  const asOf=dayDiff(dateStr,"1970-01-01");
  const inWindow=(days)=> store.sessions.filter(s=>{ const d=dayDiff(s.date,"1970-01-01"); return d<=asOf && d>asOf-days; });
  const acuteTries=inWindow(7).reduce((a,s)=>a+climbTries(s),0);
  const chronicTries=inWindow(28).reduce((a,s)=>a+climbTries(s),0);
  return {acuteTries, chronicTriesWeekly:chronicTries/4};
}
function hardAttemptsCheck(){
  const lastClimb=[...store.sessions].filter(s=>s.type==="climb").sort((a,b)=>a.date<b.date?1:-1)[0];
  if(!lastClimb) return null;
  const cg=effectiveComfortableGrade();
  const hardSends=(lastClimb.grades||[]).filter(g=>g>cg).length;
  const hardAttempts=Object.entries(lastClimb.attempts||{}).filter(([g])=>Number(g)>cg).reduce((a,[,v])=>a+v,0);
  const hard=hardSends+hardAttempts;
  if(hard>12){
    return `Quality over quantity next limit session — ${hard} hard tries above V${cg} last time. Past ~10-15, technique degrades faster than strength is gained.`;
  }
  return null;
}
function plateauCheck(metric,label){
  const vals=benchTrend(metric);
  if(vals.length<3) return null;
  const last3=vals.slice(-3);
  if(last3[1]<=last3[0] && last3[2]<=last3[1]){
    return `${label} has plateaued — flat for 3 sessions (${last3.join("→")}lb). Check technique, recovery, sleep, or nutrition before assuming it's a real ceiling.`;
  }
  return null;
}
/* Positive counterpart to plateauCheck — 2 consecutive increases across the last 3 logged values. */
function risingCheck(metric,label){
  const vals=benchTrend(metric);
  if(vals.length<3) return null;
  const last3=vals.slice(-3);
  if(last3[1]>last3[0] && last3[2]>last3[1]){
    return `${label} is climbing — up in your last 2 sessions (${last3.join("→")}lb). Keep it up.`;
  }
  return null;
}
/* Tries logged at the next grade up from your all-time hardest send, across your last 3 climbing
   sessions. Shared by stalledGradeCheck (only meaningful once truly stalled) and a standalone
   Plan-tab counter (visible in Performance phase regardless of stalled status, so the effort
   toward the next grade is visible before it's been stalled long enough to warrant a warning). */
function triesAtNextGrade(){
  const climbs=[...store.sessions].filter(s=>s.type==="climb"&&(s.grades||[]).length).sort((a,b)=>a.date<b.date?1:-1);
  let hardestEver=-1; store.sessions.forEach(s=>(s.grades||[]).forEach(g=>{ if(g>hardestEver) hardestEver=g; }));
  if(hardestEver<0) return null;
  const projectGrade=hardestEver+1;
  const last3=climbs.slice(0,3);
  const tries=last3.reduce((sum,s)=>{
    const sends=(s.grades||[]).filter(g=>g===projectGrade).length;
    const attempts=(s.attempts||{})[projectGrade]||0;
    return sum+sends+attempts;
  },0);
  return {projectGrade, tries, hardestEver, climbSessions:last3.length};
}
function stalledGradeCheck(){
  const climbs=[...store.sessions].filter(s=>s.type==="climb"&&(s.grades||[]).length).sort((a,b)=>a.date<b.date?1:-1);
  if(climbs.length<3) return null;
  const {projectGrade,tries:triesAtProject,hardestEver}=triesAtNextGrade();
  const last3=climbs.slice(0,3);
  const noPR=last3.every(s=>Math.max(...s.grades)<hardestEver);
  if(!noPR) return null;
  // Distinguish "not even trying the next grade" (a logging/engagement gap, not a physiological
  // plateau) from "grinding at it with real volume and still not sending" (the actual signal
  // the plan doc's cycle-back rule is meant to catch) — attempts data is what makes this possible.
  if(triesAtProject===0){
    return `Log attempts at V${projectGrade}, even without a send — you haven't logged any tries there in your last 3 sessions, so "stalled" can't be told apart from "not tried yet".`;
  }
  return `Cycle back to a Strength Base block (6-8 session-weeks) — V${hardestEver} has been your ceiling for 3 sessions despite ${triesAtProject} tries at V${projectGrade} with no send.`;
}
/* ---- momentum/consistency: streaks, heatmap, and trend series (all derived, nothing persisted) ---- */
/* Weeks are indexed relative to the first ever logged session, not a fixed calendar grid, so
   "week 1" always means your actual first training week rather than an arbitrary Monday. */
function trainingStreak(){
  const sessions=[...store.sessions].sort((a,b)=>a.date<b.date?-1:1);
  if(!sessions.length) return {current:0, best:0};
  const start=dayDiff(sessions[0].date,"1970-01-01");
  const weekIdx=s=>Math.floor((dayDiff(s.date,"1970-01-01")-start)/7);
  const weeksWithSessions=new Set(sessions.map(weekIdx));
  const todayWeek=Math.floor((dayDiff(todayStr(),"1970-01-01")-start)/7);
  // Grace for the still-open current week: don't drop to 0 just because you haven't logged yet
  // today — only count it broken once a full week has passed with nothing logged.
  let w = weeksWithSessions.has(todayWeek) ? todayWeek : todayWeek-1;
  let current=0;
  for(; w>=0 && weeksWithSessions.has(w); w--) current++;
  let best=0, run=0;
  for(let i=0;i<=todayWeek;i++){
    if(weeksWithSessions.has(i)){ run++; best=Math.max(best,run); } else run=0;
  }
  return {current, best:Math.max(best,current)};
}
function heatmapData(weeks=18){
  const days=weeks*7;
  const counts={}, fingerDays={};
  store.sessions.forEach(s=>{
    counts[s.date]=(counts[s.date]||0)+1;
    if(FINGER_INTENSITY_TYPES(s)) fingerDays[s.date]=true;
  });
  const todayEpoch=dayDiff(todayStr(),"1970-01-01");
  const out=[];
  for(let i=days-1;i>=0;i--){
    const epoch=todayEpoch-i;
    // reconstruct a date string from epoch days since 1970-01-01
    const d=new Date(epoch*86400000);
    const date=`${d.getUTCFullYear()}-${pad(d.getUTCMonth()+1)}-${pad(d.getUTCDate())}`;
    out.push({date, count:counts[date]||0, fingerIntensity:!!fingerDays[date]});
  }
  return out;
}
function sendsAttemptsSeries(n=10){
  return [...store.sessions].filter(s=>s.type==="climb"&&((s.grades||[]).length||Object.values(s.attempts||{}).some(v=>v>0)))
    .sort((a,b)=>a.date<b.date?-1:1).slice(-n)
    .map(s=>({date:s.date, sends:(s.grades||[]).length, attempts:Object.values(s.attempts||{}).reduce((a,b)=>a+b,0)}));
}
function weeklyTriesSeries(weeks=12){
  const todayEpoch=dayDiff(todayStr(),"1970-01-01");
  const out=[];
  for(let w=weeks-1;w>=0;w--){
    const end=todayEpoch-w*7, start=end-6;
    const tries=store.sessions.filter(s=>{ const d=dayDiff(s.date,"1970-01-01"); return d>=start && d<=end; })
      .reduce((a,s)=>a+climbTries(s),0);
    out.push({weekEnd:end, tries});
  }
  return out;
}
function acwrSeries(weeks=12){
  const todayEpoch=dayDiff(todayStr(),"1970-01-01");
  const out=[];
  for(let w=weeks-1;w>=0;w--){
    const end=todayEpoch-w*7;
    const d=new Date(end*86400000);
    const dateStr=`${d.getUTCFullYear()}-${pad(d.getUTCMonth()+1)}-${pad(d.getUTCDate())}`;
    const {acuteTries,chronicTriesWeekly}=triesLoadAt(dateStr);
    out.push({weekEnd:end, ratio: chronicTriesWeekly>0 ? acuteTries/chronicTriesWeekly : null});
  }
  return out;
}

const pad = n => String(n).padStart(2,"0");
const todayStr = () => { const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; };
const dayDiff = (a,b) => Math.floor((new Date(a+"T12:00:00")-new Date(b+"T12:00:00"))/86400000);
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const esc = s => String(s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function prettyDate(s){ return new Date(s+"T12:00:00").toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric"}); }
function gradeCounts(arr){ const c={}; (arr||[]).forEach(g=>c[g]=(c[g]||0)+1); return c; }

function detailOf(s){
  if(s.type==="climb"){
    const c=gradeCounts(s.grades);
    const sendsStr=Object.keys(c).sort((a,b)=>b-a).map(g=>`V${g}×${c[g]}`).join("  ")||"—";
    const attTotal=Object.values(s.attempts||{}).reduce((a,b)=>a+b,0);
    return sendsStr+(attTotal?`  · +${attTotal} attempt${attTotal===1?"":"s"}`:"");
  }
  if(s.type==="hang"){
    const h=s.hang||{}; const load=h.addedLb>0?`+${h.addedLb}lb`:h.addedLb<0?`${h.addedLb}lb`:"BW";
    const grip=h.grip==="open"?"open":"half-crimp";
    return `${h.protocol==="max"?"Max hang":"Repeaters"} · ${grip} · ${h.edge}mm · ${load} · ${h.sets}×`;
  }
  if(s.type==="lift"){
    const l=s.lift||{};
    const parts=LIFT_DAY.map(L=>{
      const rows=(l.entries||{})[L.key]; if(!rows||!rows.length) return null;
      const setsStr=rows.map(r=>{
        const w=L.bw?(Number(r.weight)?`+${r.weight}`:"BW"):r.weight;
        return `${w}×${r.reps||"?"}`;
      }).join(",");
      return `${L.short} ${setsStr}`;
    }).filter(Boolean);
    return `Lift · ${parts.join("  ")||"—"}`;
  }
  return"—";
}

/* Applies data-driven suggestions to a form — only safe to call once `store` is loaded. */
function applySuggestions(f){
  if(f.type==="hang") f.addedLb=suggestHangLoad(f.protocol,f.grip);
  if(f.type==="lift"){
    LIFT_DAY.forEach(L=>{
      const sug=suggestLiftWeight(L.key);
      const targetReps=parseInt(L.repTarget,10);
      f.entries[L.key]=f.entries[L.key].map(r=>({...r,
        weight: sug!=null?String(sug):r.weight,
        reps: r.reps===""?String(targetReps):r.reps}));
    });
  }
  if(f.type==="climb" && !f.gradeRole) f.gradeRole="volume";
  return f;
}
function freshForm(type,protocol,gradeRole){
  const f=blankForm();
  if(type) f.type=type;
  if(protocol) f.protocol=protocol;
  if(gradeRole) f.gradeRole=gradeRole;
  return applySuggestions(f);
}
function deepMerge(base,override){
  const out={...base};
  for(const k in override){
    const bv=base[k], ov=override[k];
    if(ov && typeof ov==="object" && !Array.isArray(ov) && bv && typeof bv==="object" && !Array.isArray(bv)) out[k]=deepMerge(bv,ov);
    else out[k]=ov;
  }
  return out;
}
function load(){
  const raw=localStorage.getItem(KEY);
  try{
    store=deepMerge(DEFAULTS, raw?JSON.parse(raw):{});
  }catch{
    // Preserve the unreadable data instead of silently discarding it, so it can still be
    // recovered (e.g. pasted to Claude for manual reconstruction) rather than just lost.
    try{ if(raw) localStorage.setItem(KEY+"-corrupt-backup", raw); }catch{}
    store={...DEFAULTS};
    loadError=true;
  }
}
function save(){
  try{ localStorage.setItem(KEY, JSON.stringify(store)); saveError=false; }
  catch{ saveError=true; }
}
/* Keeps an in-progress (unsaved) Log form across tab switches / app close, so leaving
   mid-entry doesn't mean refilling everything from scratch. Cleared implicitly once
   commitSave() resets the form back to blank. */
function saveDraft(){
  try{ localStorage.setItem(DRAFT_KEY, JSON.stringify({form:ui.form, editingId:ui.editingId})); }
  catch{}
}
function loadDraft(){
  try{
    const raw=localStorage.getItem(DRAFT_KEY);
    if(!raw) return;
    const d=JSON.parse(raw);
    if(d && d.form){ ui.form=deepMerge(blankForm(), d.form); ui.editingId=d.editingId||null; }
  }catch{}
}

function renderLog(){

  let body="";

    const [lo,hi]=gradeRangeFor(role);
    const maxG=Math.max(11,(store.settings.targetGrade??8)+3);
    // Default to a narrow window around today's target band so you're not scanning 24 cards —
    // but never hide a grade that already has a logged count, and let "show all" override.
    const used=[...Object.keys(gc).filter(g=>gc[g]>0),...Object.keys(att).filter(g=>att[g]>0)].map(Number);
    const padLo=Math.max(0,lo-2), padHi=Math.min(maxG,hi+2);
    const visLo = ui.gradeExpanded?0:Math.min(padLo, used.length?Math.min(...used):padLo);
    const visHi = ui.gradeExpanded?maxG:Math.max(padHi, used.length?Math.max(...used):padHi);
    const range=Array.from({length:visHi-visLo+1},(_,i)=>visLo+i);

/* ---- Info tab: renders TRAINING_PLAN.md in-app, fetched once and cached in memory.
   Single source of truth stays the .md file — no separate copy to keep in sync by hand. */
let planMdCache=null, planMdError=null, planMdLoading=false;
function loadPlanMd(){
  if(planMdCache!=null || planMdLoading) return;
  planMdLoading=true;
  fetch("./TRAINING_PLAN.md").then(r=>{ if(!r.ok) throw new Error("HTTP "+r.status); return r.text(); })
    .then(txt=>{ planMdCache=txt; planMdLoading=false; if(ui.tab==="info") render(); })
    .catch(err=>{ planMdError=err.message||"couldn't load"; planMdLoading=false; if(ui.tab==="info") render(); });
}
function mdInline(s){
  s=esc(s);
  s=s.replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>");
  s=s.replace(/\*(.+?)\*/g,"<em>$1</em>");
  return s;
}
function mdBuildList(items){
  const baseIndent=items[0].indent, ordered=items[0].ordered, tag=ordered?"ol":"ul";
  let html=`<${tag}>`, i=0;
  while(i<items.length){
    let liHtml=mdInline(items[i].text); i++;
    if(i<items.length && items[i].indent>baseIndent){
      const nested=[]; while(i<items.length && items[i].indent>baseIndent){ nested.push(items[i]); i++; }
      liHtml+=mdBuildList(nested);
    }
    html+=`<li>${liHtml}</li>`;
  }
  return html+`</${tag}>`;
}
function mdToHtml(md){
  const lines=md.replace(/\r\n/g,"\n").split("\n");
  const n=lines.length;
  let html="", i=0;
  const listRe=/^(\s*)([-*]|\d+\.)\s+(.*)$/;
  while(i<n){
    const line=lines[i];
    if(!line.trim()){ i++; continue; }
    if(/^\|/.test(line)){
      const rows=[]; while(i<n && /^\|/.test(lines[i])){ rows.push(lines[i]); i++; }
      const cells=r=>r.trim().replace(/^\||\|$/g,"").split("|").map(c=>c.trim());
      const header=cells(rows[0]), body=rows.slice(2);
      html+=`<table class="mdtable"><thead><tr>${header.map(h=>`<th>${mdInline(h)}</th>`).join("")}</tr></thead><tbody>`;
      body.forEach(r=>{ html+=`<tr>${cells(r).map(c=>`<td>${mdInline(c)}</td>`).join("")}</tr>`; });
      html+="</tbody></table>";
      continue;
    }
    const hm=/^(#{1,4})\s+(.*)$/.exec(line);
    if(hm){ const lvl=hm[1].length; html+=`<h${lvl} class="mdh${lvl}">${mdInline(hm[2])}</h${lvl}>`; i++; continue; }
    if(listRe.test(line)){
      const items=[];
      while(i<n && listRe.test(lines[i])){
        const mm=listRe.exec(lines[i]);
        items.push({indent:mm[1].length, ordered:/\d+\./.test(mm[2]), text:mm[3]});
        i++;
      }
      html+=mdBuildList(items);
      continue;
    }
    const buf=[line]; i++;
    while(i<n && lines[i].trim() && !/^\|/.test(lines[i]) && !/^#{1,4}\s/.test(lines[i]) && !listRe.test(lines[i])){
      buf.push(lines[i]); i++;
    }
    html+=`<p>${mdInline(buf.join(" "))}</p>`;
  }
  return html;
}
function renderInfo(){
  if(planMdError) return `<div class="empty"><div class="icon">${I.info}</div>
    <div class="t">Couldn't load</div><div class="b">${esc(planMdError)}. Check connection and try again.</div></div>`;
  if(planMdCache==null){ loadPlanMd(); return `<div class="empty"><div class="icon">${I.info}</div><div class="t">Loading…</div></div>`; }
  return `<div class="mdwrap">${mdToHtml(planMdCache)}</div>`;

/* ---- small inline charts (no deps) ---- */
function sparkline(values,opts={}){
  if(!values||values.length<2) return "";
  const w=opts.width||90, h=opts.height||28;
  const min=opts.min??Math.min(...values), max=opts.max??Math.max(...values);
  const range=(max-min)||1;
  const stepX=w/(values.length-1);
  const pts=values.map((v,i)=>[+(i*stepX).toFixed(1), +(h-((v-min)/range)*h).toFixed(1)]);
  const d="M"+pts.map(p=>p.join(",")).join(" L");
  const last=pts[pts.length-1];
  return `<svg viewBox="0 0 ${w} ${h}" style="width:${w}px;height:${h}px;overflow:visible;flex-shrink:0">
    <path d="${d}" fill="none" stroke="${opts.color||"var(--accent)"}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${last[0]}" cy="${last[1]}" r="2.5" fill="${opts.color||"var(--accent)"}"/>
  </svg>`;
}
function dotStrip(values,colorMap){
  if(!values.length) return "";
  const r=4, gap=4, w=values.length*(r*2+gap)-gap, h=r*2;
  const circles=values.map((v,i)=>`<circle cx="${r+i*(r*2+gap)}" cy="${r}" r="${r}" fill="${colorMap[v]||"var(--line)"}"/>`).join("");
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:${h}px;display:block" preserveAspectRatio="xMinYMid meet">${circles}</svg>`;
}
function gradeHistory(){
  const climbs=[...store.sessions].filter(s=>s.type==="climb"&&(s.grades||[]).length)
    .sort((a,b)=>a.date<b.date?-1:1);
  let running=-1; const pts=[];
  climbs.forEach(s=>{
    const mx=Math.max(...s.grades);
    if(mx>running) running=mx;
    pts.push({date:s.date, grade:running});
  });
  return pts;
}
function renderGradeChart(){
  const pts=gradeHistory();
  const target=store.settings.targetGrade??8;
  if(pts.length<2) return `<div class="field"><div class="flabel">Progress toward V${target}</div>
    <div class="stack"><div class="hint">Log a few more climbing sessions with grades to see your progression here.</div></div></div>`;
  const w=300,h=120,padL=22,padR=10,padT=10,padB=18;
  const plotW=w-padL-padR, plotH=h-padT-padB;
  const domainMax=Math.max(10,target);
  const y=v=> padT + (domainMax-v)/domainMax*plotH;
  const x=i=> padL + i*(plotW/(pts.length-1));
  let d=`M ${x(0).toFixed(1)} ${y(pts[0].grade).toFixed(1)}`;
  for(let i=1;i<pts.length;i++){ d+=` H ${x(i).toFixed(1)} V ${y(pts[i].grade).toFixed(1)}`; }
  const grid=[0,2,4,6,8,10].filter(v=>v<=domainMax).map(v=>
    `<line x1="${padL}" x2="${w-padR}" y1="${y(v).toFixed(1)}" y2="${y(v).toFixed(1)}" stroke="var(--line)" stroke-width="1"/>
     <text x="2" y="${(y(v)+3).toFixed(1)}" font-size="8" fill="var(--faint)">V${v}</text>`).join("");
  const targetY=y(target);
  const last=pts[pts.length-1];
  const tapCircles=pts.map((p,i)=>
    `<circle cx="${x(i).toFixed(1)}" cy="${y(p.grade).toFixed(1)}" r="9" fill="transparent" data-chartpt="${i}" style="cursor:pointer"/>`).join("");
  const tapInfo = (ui.chartTap!=null && pts[ui.chartTap])
    ? `<div class="hint" style="margin-top:6px">${prettyDate(pts[ui.chartTap].date)} · hardest so far V${pts[ui.chartTap].grade}</div>` : "";
  return `<div class="field"><div class="flabel">Progress toward V${target} · tap a point</div>
    <div class="stack">
      <svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto;display:block">
        ${grid}
        <line x1="${padL}" x2="${w-padR}" y1="${targetY.toFixed(1)}" y2="${targetY.toFixed(1)}" stroke="var(--faint)" stroke-width="1" stroke-dasharray="3,3"/>
        <text x="${w-padR}" y="${(targetY-4).toFixed(1)}" font-size="8" fill="var(--faint)" text-anchor="end">Target V${target}</text>
        <path d="${d}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="${x(pts.length-1).toFixed(1)}" cy="${y(last.grade).toFixed(1)}" r="3" fill="var(--accent)"/>
        <text x="${x(pts.length-1).toFixed(1)}" y="${(y(last.grade)-8).toFixed(1)}" font-size="10" font-weight="800" fill="var(--ink)" text-anchor="end">V${last.grade}</text>
        ${tapCircles}
      </svg>
      <div class="hint" style="display:flex;justify-content:space-between">
        <span>${prettyDate(pts[0].date)}</span><span>${prettyDate(last.date)}</span>
      </div>
      ${tapInfo}
    </div></div>`;
}

/* GitHub-contribution-style grid — columns are weeks (oldest left, newest right), rows are
   days. Grade breakthroughs are rare and can be flat for weeks; this makes plain "did I show
   up" consistency visible at a glance, which the grade chart structurally can't. */
function renderHeatmap(){
  const weeks=18;
  const days=heatmapData(weeks);
  const cell=12, gap=3;
  const cols=weeks, rows=7;
  const w=cols*(cell+gap)-gap, h=rows*(cell+gap)-gap;
  const rects=days.map((d,i)=>{
    const col=Math.floor(i/7), row=i%7;
    const fill = d.count>=2 ? "var(--accent)" : d.count===1 ? "rgba(111,179,201,.45)" : "var(--panel2)";
    const stroke = d.fingerIntensity ? "var(--tweaky)" : "none";
    return `<rect x="${col*(cell+gap)}" y="${row*(cell+gap)}" width="${cell}" height="${cell}" rx="3"
      fill="${fill}" ${stroke!=="none"?`stroke="${stroke}" stroke-width="1.5"`:""}><title>${d.date}: ${d.count} session${d.count===1?"":"s"}</title></rect>`;
  }).join("");
  return `<div class="field"><div class="flabel">Consistency · last ${weeks} weeks</div>
    <div class="stack">
      <svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto;display:block">${rects}</svg>
      <div class="hint" style="display:flex;justify-content:space-between">
        <span>${prettyDate(days[0].date)}</span><span>${prettyDate(days[days.length-1].date)}</span>
      </div>
      <div class="hint">Outlined cells: finger-intensity sessions (hangboard or hard climbing).</div>
    </div></div>`;
}

/* ---- benchmarks: grip strength / pull-up ratios vs plan targets ---- */

}
function benchTrend(metric){

function renderRecoveryTrends(){
  const withFinger=[...store.sessions].filter(s=>s.finger).sort((a,b)=>a.date<b.date?-1:1).slice(-20);
  const withSleep=[...store.sessions].filter(s=>s.sleep).sort((a,b)=>a.date<b.date?-1:1).slice(-20);

function rpeTrend(){ return [...store.sessions].filter(s=>s.rpe!=null).sort((a,b)=>a.date<b.date?-1:1).map(s=>s.rpe); }
function liftTrend(key){
  return [...store.sessions].filter(s=>s.type==="lift"&&s.lift&&s.lift.entries&&s.lift.entries[key]&&s.lift.entries[key].length)
    .sort((a,b)=>a.date<b.date?-1:1)
    .map(s=>Math.max(...s.lift.entries[key].map(r=>Number(r.weight)||0)));
}
function hangTrend(protocol,grip){
  grip = grip || latestGripFor(protocol);
  return [...store.sessions].filter(s=>s.type==="hang"&&s.hang&&s.hang.protocol===protocol&&(s.hang.grip||"half")===grip)
    .sort((a,b)=>a.date<b.date?-1:1).map(s=>s.hang.addedLb??0);
}
function renderStrengthTrends(){
  const parts=[];
  const rpe=rpeTrend();
  if(rpe.length>=2) parts.push(`<div style="margin-bottom:10px"><div class="hint" style="margin-bottom:4px">RPE trend</div>${sparkline(rpe,{color:"var(--accent)"})}</div>`);
  LIFT_DAY.filter(L=>PROGRESSABLE_LIFTS.has(L.key)).forEach(L=>{
    const t=liftTrend(L.key);
    if(t.length>=2) parts.push(`<div style="margin-bottom:10px"><div class="hint" style="margin-bottom:4px">${esc(L.name)} top set</div>${sparkline(t)}</div>`);
  });
  const maxGrip=latestGripFor("max"), repGrip=latestGripFor("repeater");
  const maxT=hangTrend("max",maxGrip), repT=hangTrend("repeater",repGrip);
