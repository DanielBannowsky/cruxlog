<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#14181C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CruxLog">
<title>CruxLog</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-192.png">
<style>
  :root{
    --bg:#14181C; --panel:#1B2127; --panel2:#232B33; --line:#2E3842;
    --ink:#EAF0F2; --sub:#8B9AA6; --faint:#5C6B76; --accent:#6FB3C9;
    --good:#3FB68B; --tweaky:#E0A63C; --pain:#D9503F;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;}
  body{max-width:480px; margin:0 auto; min-height:100vh;}
  .mono{font-family:ui-monospace,Menlo,monospace;}
  button{font-family:inherit; cursor:pointer;}
  input,textarea{font-family:inherit;}
  input[type=date]{-webkit-appearance:none;}
  @media (prefers-reduced-motion: reduce){*{transition:none !important;}}

  /* header */
  header{position:sticky; top:0; z-index:5; background:var(--bg);
    border-bottom:1px solid var(--line);
    padding:calc(12px + env(safe-area-inset-top)) 16px 12px;
    display:flex; align-items:center; gap:10px;}
  .ladder{display:flex; gap:2px;}
  .ladder span{width:4px; height:18px; border-radius:2px;}
  .wordmark{font-weight:800; letter-spacing:1.5px; font-size:15px;}
  .goal{margin-left:auto; color:var(--faint); font-size:11px;}

  main{padding:18px 16px 130px;}

  /* segmented */
  .seg{display:flex; gap:4px; background:var(--panel2); padding:4px; border-radius:12px;}
  .seg button{flex:1; border:none; border-radius:9px; padding:10px 4px;
    font-size:14px; font-weight:700; background:transparent; color:var(--sub);
    display:flex; align-items:center; justify-content:center; gap:6px; transition:background .15s;}
  .seg button.on{background:var(--accent); color:#0E1418;}
  .seg svg{width:16px; height:16px;}

  .daterow{display:flex; align-items:center; justify-content:space-between; margin:16px 2px 4px;}
  .daterow input{background:transparent; border:none; color:var(--ink);
    font-size:15px; padding:0; font-family:ui-monospace,monospace;}
  .wk{color:var(--faint); font-size:12px; font-family:ui-monospace,monospace;}
  .rule{height:1px; background:var(--line); margin:8px 0 20px;}

  .field{margin-bottom:18px;}
  .flabel{color:var(--faint); font-size:12px; font-weight:700; letter-spacing:1px;
    text-transform:uppercase; margin-bottom:10px;}

  /* grade grid */
  .grades{display:grid; grid-template-columns:repeat(4,1fr); gap:8px;}
  .grade{position:relative; border-radius:12px; border:1.5px solid var(--line);
    background:var(--panel); color:var(--sub); padding:12px 0;
    font-family:ui-monospace,monospace; font-weight:800; font-size:16px;}
  .grade .badge{position:absolute; top:-7px; right:-7px; min-width:22px; height:22px;
    border-radius:11px; color:#0E1418; font-size:12px; font-weight:800;
    display:flex; align-items:center; justify-content:center; padding:0 5px;}
  .hint{color:var(--faint); font-size:11px; margin-top:8px;}

  /* stepper block */
  .stack{display:flex; flex-direction:column; gap:16px; background:var(--panel);
    border-radius:12px; padding:16px 14px;}
  .stepper{display:flex; align-items:center; justify-content:space-between;}
  .stepper .lab{color:var(--sub); font-size:14px;}
  .stepper .ctl{display:flex; align-items:center; gap:10px;}
  .stepper .val{font-family:ui-monospace,monospace; font-size:18px; font-weight:700;
    min-width:58px; text-align:center; color:var(--ink);}
  .stepbtn{width:38px; height:38px; border-radius:10px; border:1px solid var(--line);
    background:var(--panel2); color:var(--ink); display:flex; align-items:center; justify-content:center;}
  .stepbtn svg{width:16px; height:16px;}

  /* lift rows */
  .liftrow{background:var(--panel); border-radius:12px; padding:12px 14px;
    display:flex; align-items:center; gap:10px;}
  .liftrow .name{width:52px; color:var(--ink); font-weight:800; font-size:14px;}
  .liftrow .x{color:var(--faint);}
  .numin{box-sizing:border-box; background:var(--panel2); border:1px solid var(--line);
    border-radius:9px; color:var(--ink); text-align:center; padding:10px 6px;
    font-family:ui-monospace,monospace; font-size:15px; font-weight:700;}
  .amrap{margin-left:auto; width:40px; height:40px; border-radius:10px;
    border:1px solid var(--line); background:var(--panel2); color:var(--faint);
    font-weight:800; font-size:12px;}
  .amrap.on{border-color:var(--accent); background:rgba(111,179,201,.13); color:var(--accent);}

  /* finger / effort row */
  .row3{display:flex; gap:8px;}
  .chip{flex:1; border-radius:12px; padding:12px 4px; border:1.5px solid var(--line);
    background:var(--panel); color:var(--sub); font-weight:700; font-size:14px;
    display:flex; flex-direction:column; align-items:center; gap:5px;}
  .chip .dot{width:12px; height:12px; border-radius:6px;}
  .effortchip{flex:1; border-radius:10px; padding:10px 4px; border:1px solid var(--line);
    background:var(--panel); color:var(--sub); font-weight:700; font-size:13px;}
  .effortchip.on{border-color:var(--accent); background:rgba(111,179,201,.13); color:var(--ink);}

  textarea.notes{width:100%; resize:none; background:var(--panel); border:1px solid var(--line);
    border-radius:12px; color:var(--ink); font-size:15px; padding:12px 14px;}

  .save{width:100%; border:none; border-radius:14px; padding:16px; font-size:16px;
    font-weight:800; letter-spacing:.3px; background:var(--panel2); color:var(--faint);
    display:flex; align-items:center; justify-content:center; gap:8px; transition:background .2s;}
  .save.ready{background:var(--accent); color:#0E1418;}
  .save.flash{background:var(--good); color:#0E1418;}
  .save svg{width:18px; height:18px;}

  /* history */
  .hcard{background:var(--panel); border-radius:14px; padding:14px; margin-bottom:10px;
    border:1px solid var(--line);}
  .hhead{display:flex; align-items:center; gap:10px; margin-bottom:8px;}
  .hhead .type{color:var(--ink); font-weight:700; font-size:14px; text-transform:capitalize;}
  .hhead .fdot{width:9px; height:9px; border-radius:5px;}
  .hhead .date{margin-left:auto; color:var(--faint); font-size:12px; font-family:ui-monospace,monospace;}
  .hhead .del{background:var(--panel2); border:1px solid var(--line); color:var(--sub);
    padding:6px 10px; border-radius:8px; display:flex; align-items:center; gap:5px;
    flex-shrink:0; font-size:12px; font-weight:700; min-height:30px;}
  .hhead .del svg{width:14px; height:14px; flex-shrink:0;}
  .hhead .del.confirm{background:rgba(217,80,63,.15); border-color:var(--pain); color:var(--pain);}
  .hdetail{font-family:ui-monospace,monospace; font-size:14px; color:var(--ink); letter-spacing:-.2px;}
  .hnotes{color:var(--sub); font-size:13px; margin-top:6px;}
  .hicon{color:var(--accent); display:flex;}
  .hicon svg{width:16px; height:16px;}

  /* progress */
  .cur{background:var(--panel); border-radius:16px; padding:18px 16px; margin-bottom:14px; border:1px solid var(--line);}
  .cur .lab{color:var(--faint); font-size:12px; font-weight:700; letter-spacing:1px; text-transform:uppercase;}
  .cur .big{display:flex; align-items:baseline; gap:10px; margin-top:6px;}
  .cur .wknum{font-family:ui-monospace,monospace; font-size:34px; font-weight:800; color:var(--ink);}
  .cur .phase{color:var(--accent); font-size:15px; font-weight:700;}
  .statgrid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px;}
  .stat{background:var(--panel); border-radius:14px; padding:16px 14px; border:1px solid var(--line);}
  .stat .lab{color:var(--faint); font-size:12px; font-weight:700; letter-spacing:.5px; text-transform:uppercase;}
  .stat .v{font-family:ui-monospace,monospace; font-size:26px; font-weight:800; margin-top:4px; color:var(--ink);}
  .btn2{width:100%; border-radius:14px; padding:16px; background:var(--panel2); color:var(--ink);
    font-size:15px; font-weight:800; display:flex; align-items:center; justify-content:center; gap:8px;
    border:1px solid var(--line); transition:background .2s; margin-bottom:10px;}
  .btn2.flash{background:var(--good); color:#0E1418; border-color:var(--good);}
  .btn2 svg{width:18px; height:18px;}
  .note{color:var(--faint); font-size:12px; margin-top:2px; text-align:center; line-height:1.5;}

  /* empty */
  .empty{padding:80px 32px; text-align:center; color:var(--sub);}
  .empty .icon{color:var(--faint); display:flex; justify-content:center; margin-bottom:16px;}
  .empty .icon svg{width:30px; height:30px;}
  .empty .t{color:var(--ink); font-size:17px; font-weight:700; margin-bottom:8px;}
  .empty .b{font-size:14px; line-height:1.5;}

  /* nav */
  nav{position:fixed; bottom:0; left:50%; transform:translateX(-50%);
    width:100%; max-width:480px; background:var(--panel); border-top:1px solid var(--line);
    display:flex; padding:8px 8px calc(8px + env(safe-area-inset-bottom));}
  nav button{flex:1; background:none; border:none; color:var(--faint); padding:8px 0;
    display:flex; flex-direction:column; align-items:center; gap:4px; font-size:11px; font-weight:700;}
  nav button.on{color:var(--accent);}
  nav svg{width:20px; height:20px;}
</style>
</head>
<body>
<header>
  <div class="ladder" id="ladder"></div>
  <span class="wordmark">CRUXLOG</span>
  <span class="goal mono">&rarr; V8</span>
</header>
<main id="main"></main>
<nav id="nav"></nav>

<input type="file" id="importer" accept="application/json" style="display:none">

<script>
"use strict";
/* ============================ constants ============================ */
const KEY = "climb-tracker-v1";
const GRADE_COLORS = ["#5E8A96","#5E9689","#5F9C7E","#79A066","#A3A055","#C0983F",
  "#CE8B44","#D57947","#D0603F","#C24F45","#B04343"];
/* One lift day/week, every phase — see TRAINING_PLAN.md "Lift Day Protocol". */
const LIFT_DAY = [
  {key:"pullup",    name:"Weighted pull-up",         short:"Pull-up",    sets:4, repTarget:"3-5",  bw:true},
  {key:"ohp",       name:"Overhead press",           short:"OHP",        sets:3, repTarget:"5"},
  {key:"pullapart", name:"Band pull-apart / face pull", short:"Pull-apart", sets:3, repTarget:"15"},
  {key:"wristext",  name:"Wrist extensor curl",      short:"Wrist ext",  sets:3, repTarget:"12"},
  {key:"hlr",       name:"Hanging leg raise",        short:"Leg raise",  sets:3, repTarget:"8-10"},
];
function blankLiftEntries(){
  const o={}; LIFT_DAY.forEach(L=>{ o[L.key]=Array.from({length:L.sets},()=>({weight:"",reps:"",amrap:false})); });
  return o;
}
const FINGER = {
  good:{label:"Good",dot:"var(--good)"},
  tweaky:{label:"Tweaky",dot:"var(--tweaky)"},
  pain:{label:"Pain",dot:"var(--pain)"},
};
const EFFORT = [
  {key:"easy",label:"Easy",rpe:5},{key:"solid",label:"Solid",rpe:7},
  {key:"hard",label:"Hard",rpe:9},{key:"max",label:"Max",rpe:10},
];
const DEFAULTS = {
  sessions:[],
  liftTargets:{chin:0,ohp:null,squat:null,row:null,bench:null,dl:null},
  lastLiftDay:null, dailyChecks:{},
  settings:{targetGrade:8, bodyweight:null},
  benchmarks:[], // {id,date,metric:'hang'|'pull',value}
  progress:{phaseIdx:0, weekInPhase:1, slot:0}, // advances only when a session is logged — never tied to the calendar
};

/* ---- program: phases + weekly templates, from TRAINING_PLAN.md ----
   Progress through this is driven entirely by logged sessions, not dates.
   Miss a day, take a week off, whatever — the plan just waits at the same slot. */
const PHASES = [
  {key:"recon",    name:"Reconditioning",          weeks:4,
    note:"Rebuild tendon tolerance & volume. No limit bouldering, no max hangs."},
  {key:"strength", name:"Strength Base",            weeks:8,
    note:"Max hangs + weighted pull-ups build the strength ceiling."},
  {key:"power",    name:"Power & Power-Endurance",  weeks:8,
    note:"Convert strength into hard moves and links."},
  {key:"perform",  name:"Performance / Send",       weeks:6,
    note:"Project V6–V8. Taper training volume, chase sends."},
];
const TOTAL_WEEKS = PHASES.reduce((a,p)=>a+p.weeks,0);

// ordered session slots per phase — exactly one lift slot/week in every phase (see TRAINING_PLAN.md).
// "full" is the longer coaching note shown when you tap the Up Next card for detail.
const LIFT_FULL = {
  recon:    "One session, all 5 lifts: weighted pull-up 4×3-5 (bodyweight or very light added weight), overhead press 3×5, band pull-apart 3×15, wrist extensor curl 3×12, hanging leg raise 3×8-10. Keep everything light-moderate — you're re-grooving patterns, not chasing numbers yet.",
  strength: "Same 5 lifts, same set/rep targets — but this is where you progressively add weight to the pull-up and OHP, session over session, as long as reps stay clean. Antagonist and wrist work stay at a steady, non-maxing effort; they're prehab, not the point of the session.",
  power:    "Maintain your current pull-up and OHP loads — don't chase new numbers this phase, your climbing sessions are the priority now. Keep antagonist/wrist work in every week without fail; it's what's protecting your elbows through the higher pulling intensity elsewhere.",
  perform:  "Light maintenance only. Enough load to keep the signal alive, nothing that leaves you sore for a project day. Antagonist and wrist work still count — skipping them is how overuse injuries creep in during a send phase.",
};
const WEEKLY_TEMPLATES = {
  recon:[
    {type:"climb",label:"Climb — volume",  detail:"V0–V3, high volume, footwork focus",
      full:"Stay in the V0–V3 range even though it feels easy — the goal is movement volume and footwork precision, not difficulty. Slow, quiet feet, full extension between moves. This rebuilds general work capacity before you load fingers hard again."},
    {type:"hang", label:"Hangboard — repeaters", detail:"20mm edge, bodyweight, 7s/3s×6",protocol:"repeater",
      full:"Bodyweight only, ~20mm edge. 7s hang / 3s rest × 6 reps, 3 min rest between sets, 2 sets per grip type (open + half-crimp). This is tendon reconditioning — moderate load, not max effort."},
    {type:"climb",label:"Climb — volume",  detail:"V0–V3, high volume, footwork focus",
      full:"Same as your other volume day — mileage and footwork, not difficulty. If it feels too easy, that's the point right now."},
    {type:"hang", label:"Hangboard — repeaters", detail:"20mm edge, bodyweight, 7s/3s×6",protocol:"repeater",
      full:"Second repeater session of the week. Same protocol as before — this frequency is what rebuilds tendon tolerance without risking a flare-up."},
    {type:"lift", label:"Lift — light",  detail:"Full 5-lift session, light load",
      full:LIFT_FULL.recon},
    {type:"climb",label:"Climb — ARC / easy", detail:"20–30 min continuous easy movement",
      full:"20–30 minutes of continuous, easy movement — traversing or repeating easy problems back to back with minimal rest. You should never get pumped. This builds aerobic capacity in the forearms, which speeds recovery between hard sessions later."},
  ],
  strength:[
    {type:"climb",label:"Climb — volume",  detail:"V0–V4 + footwork drills",
      full:"V0–V4, moderate volume, with 2-3 problems where you deliberately drill footwork (quiet feet, no smearing scrambles). Warm up thoroughly before any harder attempts today."},
    {type:"hang", label:"Hangboard — max hangs", detail:"20mm, near-max load, 10s/3min×5–6",protocol:"max",
      full:"20mm edge, near-max effort. 10s hang / 3min rest × 5-6 sets. Add or remove weight so the last 2-3 seconds of the hang are genuinely hard — this is neural/max-strength work, not conditioning. Full 3-minute rests, no shortcuts."},
    {type:"climb",label:"Climb — limit",   detail:"V4–V5, low volume, full rest between goes",
      full:"V4–V5, low volume. Full rest (3-5 min) between attempts. Ugly movement is fine — you're exposing yourself to harder holds and steeper angles, not sending clean."},
    {type:"hang", label:"Hangboard — repeaters", detail:"Repeaters + core",protocol:"repeater",
      full:"Repeaters + core work. Keep this at a moderate edge/load — this session maintains tendon durability while your max-hang day does the heavy lifting."},
    {type:"lift", label:"Lift — build",  detail:"Full 5-lift session, add weight",
      full:LIFT_FULL.strength},
    {type:"climb",label:"Climb — volume / ARC",
      full:"Volume or ARC — whichever your body wants. Use this as an active recovery / mileage day."},
  ],
  power:[
    {type:"climb",label:"Climb — limit",   detail:"V5–V6, low volume, full rest",
      full:"V5–V6, low volume, full rest between attempts. This is where the strength you built converts into harder single moves."},
    {type:"hang", label:"Hangboard — maintenance", detail:"1×/week, maintain max-hang strength",protocol:"max",
      full:"1x/week is enough here — you're not trying to add new max-hang strength, just hold onto what you built. Same near-max load, 3-4 sets is fine."},
    {type:"climb",label:"Climb — power-endurance", detail:"4x4s / linked circuits, V3–V4",
      full:"4x4s or linked boulder circuits at V3–V4, minimal rest between attempts/problems. This trains your ability to link hard moves without falling apart — think 'V6 crux, 4 times in a row.'"},
    {type:"lift", label:"Lift — maintain",  detail:"Full 5-lift session, hold current weight",
      full:LIFT_FULL.power},
    {type:"climb",label:"Climb — volume / campus",
      full:"Volume day, or light campus board work (basic ladders, matching moves only) if shoulders/elbows feel good."},
  ],
  perform:[
    {type:"climb",label:"Climb — project",  detail:"V6–V8 attempts",
      full:"V6–V8 attempts. Full rest between burns. This is what everything else has been building toward — treat sends as data, not judgment."},
    {type:"hang", label:"Hangboard — maintenance", detail:"short max-hang session",protocol:"max",
      full:"Short max-hang session, just enough to keep the signal alive. Don't grind — this phase is about projecting, not building new strength."},
    {type:"climb",label:"Climb — project",  detail:"V6–V8 attempts",
      full:"Second project session of the week — same approach, full rest between burns."},
    {type:"lift", label:"Lift — maintain",  detail:"Full 5-lift session, reduced volume",
      full:LIFT_FULL.perform},
    {type:"climb",label:"Climb — volume / technique",
      full:"Volume or technique-focused day — film yourself, look at footwork and hip positioning on your project's crux."},
  ],
};
function slotsOf(phaseKey){ return WEEKLY_TEMPLATES[phaseKey]||WEEKLY_TEMPLATES.strength; }

function currentProgress(){
  const p = store.progress || DEFAULTS.progress;
  const phaseIdx = Math.min(p.phaseIdx, PHASES.length-1);
  const phase = PHASES[phaseIdx];
  const slots = slotsOf(phase.key);
  const weekInPhase = Math.min(Math.max(p.weekInPhase,1), phase.weeks);
  const slot = Math.min(Math.max(p.slot,0), slots.length-1);
  const donePhaseWeeks = PHASES.slice(0,phaseIdx).reduce((a,ph)=>a+ph.weeks,0);
  const absWeek = donePhaseWeeks + weekInPhase;
  return {phaseIdx,phase,slots,weekInPhase,slot,absWeek,next:slots[slot],
    isDeload:(phase.key==="strength"||phase.key==="power") && weekInPhase%4===0};
}
function advanceProgress(){
  const cur=currentProgress();
  let {phaseIdx,weekInPhase,slot}=cur;
  const slots=cur.slots;
  slot++;
  if(slot>=slots.length){
    slot=0; weekInPhase++;
    if(weekInPhase>cur.phase.weeks){
      weekInPhase=1;
      if(phaseIdx<PHASES.length-1) phaseIdx++;
      else { store.progress={phaseIdx,weekInPhase:cur.phase.weeks,slot:slots.length-1,completedCycle:true}; return; }
    }
  }
  store.progress={phaseIdx,weekInPhase,slot};
}

const FINGER_INTENSITY_TYPES = s => s.type==="hang" || (s.type==="climb" && (s.rpe>=9));
function computeGuardrails(store){
  const out=[];
  const sessions=[...store.sessions].sort((a,b)=>a.date<b.date?1:-1);
  const fingerSessions=sessions.filter(FINGER_INTENSITY_TYPES);

  if(fingerSessions.length>=2){
    const d0=dayDiff(fingerSessions[0].date, fingerSessions[1].date);
    if(Math.abs(d0)<=1){
      out.push({level:"bad",text:"Finger-intensity sessions on back-to-back days — rest 48h+ between max hangs / limit bouldering."});
    }
  }
  const rollingCutoff=dayDiff(todayStr(),"1970-01-01")-7;
  const last7dFinger=fingerSessions.filter(s=>dayDiff(s.date,"1970-01-01")>rollingCutoff);
  if(last7dFinger.length>3){
    out.push({level:"warn",text:`${last7dFinger.length} finger-intensity sessions in the last 7 days — plan caps this at 3/week.`});
  }
  const painTrail=sessions.filter(s=>s.finger).slice(0,2);
  if(painTrail.length===2 && painTrail.every(s=>s.finger==="pain")){
    out.push({level:"bad",text:"Pain flagged in back-to-back sessions — back off finger loading and consider a deload."});
  } else if(painTrail.length===2 && painTrail.every(s=>s.finger==="tweaky")){
    out.push({level:"warn",text:"Tweaky twice in a row — ease intensity on the next finger session."});
  }
  const cur=currentProgress();
  if(cur.isDeload){
    out.push({level:"info",text:"Deload week — halve hangboard/lift volume, keep climbing light."});
  }
  return out;
}

/* icons (inline svg) */
const I = {
  climb:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m8 3 4 8 5-5 5 15H2L8 3z"/></svg>',
  hang:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 11.5V9a2 2 0 0 0-2-2 2 2 0 0 0-2 2v1.4"/><path d="M14 10V8a2 2 0 0 0-2-2 2 2 0 0 0-2 2v2"/><path d="M10 9.9V9a2 2 0 0 0-2-2 2 2 0 0 0-2 2v5"/><path d="M6 14a2 2 0 0 0-2-2 2 2 0 0 0-2 2"/><path d="M18 11a2 2 0 1 1 4 0v3a8 8 0 0 1-8 8h-4a8 8 0 0 1-7-4"/></svg>',
  lift:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6.5 6.5 11 11"/><path d="m21 21-1-1"/><path d="m3 3 1 1"/><path d="m18 22 4-4"/><path d="m2 6 4-4"/><path d="m3 10 7-7"/><path d="m14 21 7-7"/></svg>',

/* ============================ helpers ============================ */
const pad = n => String(n).padStart(2,"0");
const todayStr = () => { const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; };
const dayDiff = (a,b) => Math.floor((new Date(a+"T12:00:00")-new Date(b+"T12:00:00"))/86400000);
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const esc = s => String(s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function prettyDate(s){ return new Date(s+"T12:00:00").toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric"}); }
function gradeCounts(arr){ const c={}; (arr||[]).forEach(g=>c[g]=(c[g]||0)+1); return c; }

function detailOf(s){
  if(s.type==="climb"){
    const c=gradeCounts(s.grades);
    return Object.keys(c).sort((a,b)=>b-a).map(g=>`V${g}×${c[g]}`).join("  ")||"—";
  }
  if(s.type==="hang"){
    const h=s.hang||{}; const load=h.addedLb>0?`+${h.addedLb}lb`:h.addedLb<0?`${h.addedLb}lb`:"BW";
    return `${h.protocol==="max"?"Max hang":"Repeaters"} · ${h.edge}mm · ${load} · ${h.sets}×`;
  }
  if(s.type==="lift"){
    const l=s.lift||{};
    const parts=LIFT_DAY.map(L=>{
      const rows=(l.entries||{})[L.key]; if(!rows||!rows.length) return null;
      const setsStr=rows.map(r=>{
        const w=L.bw?(Number(r.weight)?`+${r.weight}`:"BW"):r.weight;
        return `${w}×${r.reps||"?"}${r.amrap?"+":""}`;
      }).join(",");
      return `${L.short} ${setsStr}`;
    }).filter(Boolean);
    return `Lift · ${parts.join("  ")||"—"}`;
  }
  return"—";
}

/* ============================ state ============================ */
let store, saveError=false;
const ui = { tab:"plan", form:blankForm(), flash:false, copied:false, backed:false, confirmDel:null, pendingImport:null, importError:null, planDetailOpen:false };

function blankForm(){
  return { type:"climb", date:todayStr(), grades:[], protocol:"repeater", edge:20,
    addedLb:0, sets:5, entries:blankLiftEntries(), finger:null, effort:null, notes:"" };
}
function load(){
  try{ const raw=localStorage.getItem(KEY); store={...DEFAULTS,...(raw?JSON.parse(raw):{})}; }
  catch{ store={...DEFAULTS}; }
}
function save(){
  try{ localStorage.setItem(KEY, JSON.stringify(store)); saveError=false; }
  catch{ saveError=true; }
}

/* ============================ render ============================ */
const $main=document.getElementById("main");
const $nav=document.getElementById("nav");
document.getElementById("ladder").innerHTML =
  GRADE_COLORS.map(c=>`<span style="background:${c}"></span>`).join("");

function render(){
  if(ui.tab==="plan") $main.innerHTML=renderPlan();
  else if(ui.tab==="log") $main.innerHTML=renderLog();
  else if(ui.tab==="history") $main.innerHTML=renderHistory();
  else $main.innerHTML=renderProgress();
  renderNav();
  wire();
}

function renderNav(){
  const tabs=[["plan","Plan",I.cal],["log","Log",I.plus],["history","History",I.hist],["progress","Progress",I.bars]];
  $nav.innerHTML=tabs.map(([k,l,ic])=>
    `<button data-tab="${k}" class="${ui.tab===k?"on":""}">${ic}${l}</button>`).join("");
}

function errBanner(){
  return saveError ? `<div style="background:#3A2622;color:#F0C6BE;padding:10px 16px;font-size:13px;">
    ⚠︎ Couldn't save to this device's storage. Your log may not persist here.</div>` : "";
}

function renderPlan(){
  const cur=currentProgress();
  const {phase,slots,slot,weekInPhase,absWeek,next,isDeload}=cur;
  const warnings=computeGuardrails(store);
  const pct=Math.min(100,Math.round((absWeek/TOTAL_WEEKS)*100));
  const complete = (store.progress||{}).completedCycle;

  const typeIcon={climb:I.climb,hang:I.hang,lift:I.lift};

  const warnBlock = warnings.length ? `<div class="field">${warnings.map(w=>{
    const bg = w.level==="bad" ? "#3A2622" : w.level==="warn" ? "#3A3122" : "var(--panel)";
    const fg = w.level==="bad" ? "#F0C6BE" : w.level==="warn" ? "#F0DFA6" : "var(--sub)";
    return `<div style="background:${bg};color:${fg};border-radius:12px;padding:12px 14px;font-size:13px;margin-bottom:8px;line-height:1.4;">${esc(w.text)}</div>`;
  }).join("")}</div>` : "";

  const detailOpen = ui.planDetailOpen;
  const upNextCard = complete ? `<div class="field"><div class="flabel">Up next</div>
      <div class="stack"><div class="hint">26-week cycle complete. Reassess your limiter and consider starting a fresh strength block.</div></div></div>`
    : `<div class="field"><div class="flabel">Up next · tap for detail</div>
      <div class="stack">
        <div id="upNextTap" style="display:flex;align-items:center;gap:12px;cursor:pointer">
          <span class="hicon">${typeIcon[next.type]}</span>
          <div style="flex:1">
            <div style="font-weight:800;font-size:15px">${esc(next.label)}</div>
            ${next.detail?`<div class="hint" style="margin-top:4px">${esc(next.detail)}</div>`:""}
          </div>
          <span style="color:var(--faint);transform:rotate(${detailOpen?90:0}deg);transition:transform .15s">${I.chev}</span>
        </div>
        ${detailOpen&&next.full?`<div class="hint" style="background:var(--panel2);border-radius:10px;padding:12px;line-height:1.5">${esc(next.full)}</div>`:""}
        <button class="btn2" id="logToday" style="margin:0">${I.plus}Log this session</button>
      </div>
    </div>`;

  return errBanner()+`
    <div class="cur">
      <div class="lab">Week ${weekInPhase} of ${phase.weeks} · ${phase.name} (plan wk ${absWeek}/${TOTAL_WEEKS})</div>
      <div class="big"><span class="phase" style="font-size:20px">${phase.name}</span></div>
      <div style="height:6px;background:var(--panel2);border-radius:4px;margin-top:12px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:var(--accent);border-radius:4px"></div></div>
      <div class="hint" style="margin-top:10px">${esc(phase.note)}</div>
    </div>
    ${isDeload?`<div class="field"><div style="background:#22303A;color:var(--accent);border-radius:12px;padding:12px 14px;font-size:13px;">Deload week — halve hangboard/lift volume, keep climbing light.</div></div>`:""}
    ${warnBlock}
    ${upNextCard}
    <div class="field"><div class="flabel">${phase.name} — session order</div>
      <div class="stack" style="gap:0;padding:6px 14px">
        ${slots.map((s,i)=>{
          const state = i<slot?"done":i===slot?"next":"upcoming";
          const border=i<slots.length-1?"border-bottom:1px solid var(--line);":"";
          const color = state==="next"?"var(--accent)":state==="done"?"var(--sub)":"var(--faint)";
          return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;${border}">
            <span style="width:22px;color:${color}">${state==="done"?I.check:""}</span>
            <span style="flex:1;font-size:13px;color:${state==="upcoming"?"var(--faint)":"var(--ink)"}">${esc(s.label)}</span>
            ${state==="next"?`<span class="hint" style="color:var(--accent)">next</span>`:""}
          </div>`;
        }).join("")}
      </div>
      <div class="hint" style="margin-top:8px">This cycles once per week's worth of sessions — no calendar deadlines. Log whatever you did and the plan moves forward; miss a day, rest an extra one, whatever. Order is a guide, not a hard sequence.</div>
    </div>`;
}

function renderLog(){
  const f=ui.form;
  const gc=gradeCounts(f.grades);

  let body="";
  if(f.type==="climb"){
    body=`<div class="field"><div class="flabel">Sends by grade</div>
      <div class="grades">${GRADE_COLORS.map((col,g)=>{
        const n=gc[g]||0;
        return `<button class="grade" data-grade="${g}"
          style="border-color:${n?col:"var(--line)"};background:${n?col+"26":"var(--panel)"};color:${n?"var(--ink)":"var(--sub)"}">
          V${g}${n?`<span class="badge" style="background:${col}">${n}</span>`:""}</button>`;
      }).join("")}</div>
      <div class="hint">Tap to add a send · long-press or right-click to remove one</div></div>`;
  } else if(f.type==="hang"){
    body=`<div class="field"><div class="flabel">Hangboard</div>
      <div class="seg" style="margin-bottom:16px" data-seg="protocol">
        <button data-val="repeater" class="${f.protocol==="repeater"?"on":""}">Repeaters</button>
        <button data-val="max" class="${f.protocol==="max"?"on":""}">Max hang</button></div>
      <div class="stack">
        ${stepper("Edge","edge",f.edge,"mm")}
        ${stepper("Added load","addedLb",f.addedLb,"lb")}
        ${stepper("Sets","sets",f.sets,"")}
      </div></div>`;
  } else {
    body=LIFT_DAY.map(L=>liftBlock(L,f.entries[L.key]||[])).join("");
  }

  const finger = f.type!=="lift" ? `<div class="field"><div class="flabel">Finger status</div>
    <div class="row3">${Object.entries(FINGER).map(([k,x])=>{
      const on=f.finger===k;
      return `<button class="chip" data-finger="${k}"
        style="border-color:${on?x.dot:"var(--line)"};background:${on?"rgba(255,255,255,.05)":"var(--panel)"};color:${on?"var(--ink)":"var(--sub)"}">
        <span class="dot" style="background:${x.dot}"></span>${x.label}</button>`;
    }).join("")}</div></div>` : "";

  const effort = `<div class="field"><div class="flabel">Effort (optional)</div>
    <div class="row3">${EFFORT.map(e=>
      `<button class="effortchip ${f.effort===e.key?"on":""}" data-effort="${e.key}">${e.label}</button>`).join("")}</div></div>`;

  const notes = `<div class="field"><div class="flabel">Notes (optional)</div>
    <textarea class="notes" id="notes" rows="2" placeholder="beta, conditions, how it felt…">${esc(f.notes)}</textarea></div>`;

  const ok=valid();
  const saveBtn=`<button class="save ${ui.flash?"flash":ok?"ready":""}" id="save">
    ${ui.flash?I.check+"Logged":"Save session"}</button>`;

  return errBanner()+`
    <div class="seg" data-seg="type">
      <button data-val="climb" class="${f.type==="climb"?"on":""}">${I.climb}Climb</button>
      <button data-val="hang" class="${f.type==="hang"?"on":""}">${I.hang}Hang</button>
      <button data-val="lift" class="${f.type==="lift"?"on":""}">${I.lift}Lift</button>
    </div>
    <div class="daterow">
      <input type="date" id="date" value="${f.date}">
    </div>
    <div class="rule"></div>
    ${body}${finger}${effort}${notes}${saveBtn}`;
}

function stepper(lab,key,val,suf){
  return `<div class="stepper"><span class="lab">${lab}</span>
    <div class="ctl">
      <button class="stepbtn" data-step="${key}" data-dir="-1">${I.minus}</button>
      <span class="val">${val}${suf}</span>
      <button class="stepbtn" data-step="${key}" data-dir="1">${I.plus}</button>
    </div></div>`;
}
function liftBlock(L,rows){
  return `<div class="field"><div class="flabel" style="display:flex;justify-content:space-between;align-items:center">
      <span>${esc(L.name)}</span>
      <span style="color:var(--faint);text-transform:none;font-weight:600;letter-spacing:0">${L.sets}×${L.repTarget}${L.bw?" (+lb)":""}</span>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px">
      ${rows.map((r,i)=>liftSetRow(L,i,r)).join("")}
    </div></div>`;
}
function liftSetRow(L,i,r){
  return `<div class="liftrow"><div class="name">Set ${i+1}</div>
    <input class="numin" style="width:64px" inputmode="decimal" data-lift="${L.key}" data-idx="${i}" data-fld="weight"
      value="${r.weight??""}" placeholder="${L.bw?"+lb":"lb"}">
    <span class="x">×</span>
    <input class="numin" style="width:56px" inputmode="decimal" data-lift="${L.key}" data-idx="${i}" data-fld="reps"
      value="${r.reps??""}" placeholder="reps">
    <button class="amrap ${r.amrap?"on":""}" data-amrap-lift="${L.key}" data-amrap-idx="${i}" title="AMRAP">+</button></div>`;
}

function renderHistory(){
  const list=[...store.sessions].sort((a,b)=> a.date<b.date?1:a.date>b.date?-1:(a.id<b.id?1:-1));
  if(!list.length) return errBanner()+`<div class="empty">
    <div class="icon">${I.hist}</div>
    <div class="t">No sessions yet</div>
    <div class="b">Log your first climb, hang, or lift on the Log tab. It'll show up here and survive a close-and-reopen.</div></div>`;
  const icon={climb:I.climb,hang:I.hang,lift:I.lift};
  return errBanner()+list.map(s=>{
    const f=s.finger?FINGER[s.finger]:null;
    return `<div class="hcard">
      <div class="hhead">
        <span class="hicon">${icon[s.type]}</span>
        <span class="type">${s.type}</span>
        ${f?`<span class="fdot" style="background:${f.dot}" title="${f.label}"></span>`:""}
        <span class="date">${prettyDate(s.date)}</span>
        ${ui.confirmDel===s.id
          ? `<button class="del confirm" data-del="${s.id}">${I.trash}Confirm?</button>`
          : `<button class="del" data-del="${s.id}">${I.trash}Delete</button>`}
      </div>
      <div class="hdetail">${esc(detailOf(s))}</div>
      ${s.notes?`<div class="hnotes">${esc(s.notes)}</div>`:""}
    </div>`;
  }).join("");
}

function renderProgress(){
  const s=store.sessions;
  const cutoff=dayDiff(todayStr(),"1970-01-01")-7;
  const last7d=s.filter(x=>dayDiff(x.date,"1970-01-01")>cutoff).length;
  let hardest=-1; s.forEach(x=>(x.grades||[]).forEach(g=>{ if(g>hardest)hardest=g; }));
  const climbs=s.filter(x=>x.type==="climb").length;
  const cur=currentProgress();
  const wknum=`Plan wk ${cur.absWeek}/${TOTAL_WEEKS}`;
  const hv = hardest>=0?`V${hardest}`:"—";
  const hc = hardest>=0?GRADE_COLORS[hardest]:"var(--ink)";

  return errBanner()+`
    <div class="cur"><div class="lab">Current</div>
      <div class="big"><span class="wknum">${wknum}</span><span class="phase">${cur.phase.name}</span></div></div>
    <div class="statgrid">
      ${stat("Sessions",s.length)}
      ${stat("Last 7 days",last7d)}
      ${stat("Climbs logged",climbs)}
      ${stat("Hardest send",hv,hc)}
    </div>
    ${renderBenchmarks()}
    <button class="btn2 ${ui.copied?"flash":""}" id="export">
      ${ui.copied?I.check+"Copied to clipboard":I.copy+"Export for Claude"}</button>
    <button class="btn2 ${ui.backed?"flash":""}" id="backup">
      ${ui.backed?I.check+"Backup downloaded":I.down+"Back up data (JSON)"}</button>
    <button class="btn2" id="restore">${I.up}Restore from backup</button>
    ${ui.pendingImport?`<div style="background:#22303A;border-radius:12px;padding:14px;margin-bottom:10px;">
      <div style="font-size:13px;color:var(--ink);margin-bottom:10px">Restore ${ui.pendingImport.count} sessions? This replaces what's currently on this device.</div>
      <div style="display:flex;gap:8px">
        <button class="btn2" id="cancelImport" style="margin:0;flex:1">Cancel</button>
        <button class="btn2" id="confirmImport" style="margin:0;flex:1;background:var(--good);color:#0E1418;border-color:var(--good)">Restore</button>
      </div></div>`:""}
    ${ui.importError?`<div style="background:#3A2622;color:#F0C6BE;border-radius:12px;padding:12px 14px;font-size:13px;margin-bottom:10px;">${esc(ui.importError)}</div>`:""}
    <div class="note">Export copies a compact CSV to paste into a chat for check-ins. Backup saves a full copy of your log to Files — keep one now and then, since app data lives only on this device.</div>`;
}

/* ---- benchmarks: grip strength / pull-up ratios vs plan targets ---- */
const BENCH_TARGETS = {
  hang:[["V3–V4","0–10%"],["V6","20–30%"],["V8","40–50%+"]],
  pull:[["V3–V4","10–20%"],["V6","30–40%"],["V8","50%+"]],
};
function latestBenchmark(metric){
  const list=(store.benchmarks||[]).filter(b=>b.metric===metric).sort((a,b)=>a.date<b.date?1:-1);
  return list[0]||null;
}
function renderBenchmarks(){
  const bw=store.settings.bodyweight;
  const hang=latestBenchmark("hang"), pull=latestBenchmark("pull");
  const ratio=(v)=> bw&&v!=null ? Math.round((v/bw)*100)+"%" : "—";
  return `<div class="field"><div class="flabel">Benchmarks</div>
    <div class="stack" style="margin-bottom:10px">
      <div class="stepper"><span class="lab">Bodyweight (lb)</span>
        <input class="numin" id="bw" style="width:70px" inputmode="decimal" value="${bw??""}" placeholder="lb"></div>
      <div class="stepper"><span class="lab">Max hang add (20mm,10s)</span>
        <div class="ctl"><input class="numin" id="benchHang" style="width:70px" inputmode="decimal"
          placeholder="lb" value="${hang?hang.value:""}"><span class="val" style="min-width:40px">${ratio(hang?.value)}</span></div></div>
      <div class="stepper"><span class="lab">Max weighted pull-up</span>
        <div class="ctl"><input class="numin" id="benchPull" style="width:70px" inputmode="decimal"
          placeholder="lb" value="${pull?pull.value:""}"><span class="val" style="min-width:40px">${ratio(pull?.value)}</span></div></div>
      <button class="btn2" id="logBench" style="margin:4px 0 0">Log today's numbers</button>
    </div>
    <div class="hint">Target ranges (% bodyweight): hang V3-4 ${BENCH_TARGETS.hang[0][1]} · V6 ${BENCH_TARGETS.hang[1][1]} · V8 ${BENCH_TARGETS.hang[2][1]}. Pull-up V3-4 ${BENCH_TARGETS.pull[0][1]} · V6 ${BENCH_TARGETS.pull[1][1]} · V8 ${BENCH_TARGETS.pull[2][1]}. Approximate, from Lattice/Bechtel norms — not a hard gate.</div>
  </div>`;
}
function stat(lab,v,color){
  return `<div class="stat"><div class="lab">${lab}</div>
    <div class="v" style="${color?`color:${color}`:""}">${v}</div></div>`;
}

/* ============================ interactions ============================ */
function valid(){
  const f=ui.form;
  if(f.type==="climb") return f.grades.length>0 && !!f.finger;
  if(f.type==="hang") return !!f.finger;
  if(f.type==="lift") return LIFT_DAY.some(L=>(f.entries[L.key]||[]).some(r=>(r.weight??"")!==""));
  return false;
}
function bumpGrade(g,d){
  const f=ui.form, c=gradeCounts(f.grades);
  c[g]=Math.max(0,(c[g]||0)+d);
  const out=[]; Object.keys(c).forEach(k=>{ for(let i=0;i<c[k];i++)out.push(Number(k)); });
  f.grades=out;
}
function commitSave(){
  if(!valid())return;
  const f=ui.form;
  const s={id:uid(),date:f.date,type:f.type,notes:f.notes.trim()};
  if(f.effort) s.rpe=EFFORT.find(e=>e.key===f.effort)?.rpe;
  if(f.type!=="lift") s.finger=f.finger;
  if(f.type==="climb") s.grades=[...f.grades];
  if(f.type==="hang") s.hang={protocol:f.protocol,edge:f.edge,addedLb:f.addedLb,sets:f.sets};
  if(f.type==="lift"){
    const entries={};
    LIFT_DAY.forEach(L=>{
      const rows=(f.entries[L.key]||[]).filter(r=>(r.weight??"")!=="");
      if(rows.length) entries[L.key]=rows.map(r=>({weight:r.weight,reps:r.reps??"",amrap:!!r.amrap}));
    });
    s.lift={entries};
  }
  store.sessions.push(s); advanceProgress(); save();
  const keepType=f.type, keepDate=f.date;
  ui.form=blankForm(); ui.form.type=keepType; ui.form.date=keepDate;
  ui.flash=true; render();
  setTimeout(()=>{ ui.flash=false; render(); },1400);
}

function wire(){
  // nav
  $nav.querySelectorAll("[data-tab]").forEach(b=>b.onclick=()=>{ ui.tab=b.dataset.tab; render(); });

  // segmented (type / protocol / day)
  $main.querySelectorAll("[data-seg]").forEach(seg=>{
    seg.querySelectorAll("button").forEach(b=>b.onclick=()=>{
      const key=seg.dataset.seg, val=b.dataset.val;
      if(key==="type") ui.form.type=val;
      else ui.form[key]=val;
      render();
    });
  });
  // date
  const d=$main.querySelector("#date"); if(d) d.onchange=e=>{ ui.form.date=e.target.value; render(); };
  // grades
  $main.querySelectorAll("[data-grade]").forEach(b=>{
    const g=+b.dataset.grade;
    b.onclick=()=>{ bumpGrade(g,1); render(); };
    b.oncontextmenu=e=>{ e.preventDefault(); bumpGrade(g,-1); render(); };
    let t; b.ontouchstart=()=>{ t=setTimeout(()=>{ bumpGrade(g,-1); render(); },500); };
    b.ontouchend=()=>clearTimeout(t); b.ontouchmove=()=>clearTimeout(t);
  });
  // steppers
  $main.querySelectorAll("[data-step]").forEach(b=>b.onclick=()=>{
    const key=b.dataset.step, dir=+b.dataset.dir; const f=ui.form;
    if(key==="edge") f.edge=Math.max(4,f.edge+2*dir);
    else if(key==="addedLb") f.addedLb=f.addedLb+5*dir;
    else if(key==="sets") f.sets=Math.max(1,f.sets+dir);
    render();
  });
  // lift inputs (no re-render — preserve focus)
  $main.querySelectorAll("[data-lift]").forEach(inp=>{
    inp.oninput=e=>{
      const k=inp.dataset.lift, idx=+inp.dataset.idx, fld=inp.dataset.fld;
      const v=e.target.value.replace(/[^0-9.]/g,""); e.target.value=v;
      const arr=[...(ui.form.entries[k]||[])]; arr[idx]={...arr[idx],[fld]:v};
      ui.form.entries[k]=arr;
      updateSaveBtn();
    };
  });
  $main.querySelectorAll("[data-amrap-lift]").forEach(b=>b.onclick=()=>{
    const k=b.dataset.amrapLift, idx=+b.dataset.amrapIdx;
    const arr=[...(ui.form.entries[k]||[])]; arr[idx]={...arr[idx],amrap:!arr[idx]?.amrap};
    ui.form.entries[k]=arr; render();
  });
  // finger / effort
  $main.querySelectorAll("[data-finger]").forEach(b=>b.onclick=()=>{ ui.form.finger=b.dataset.finger; render(); });
  $main.querySelectorAll("[data-effort]").forEach(b=>b.onclick=()=>{
    const v=b.dataset.effort; ui.form.effort=ui.form.effort===v?null:v; render(); });
  // notes (no re-render)
  const nt=$main.querySelector("#notes"); if(nt) nt.oninput=e=>{ ui.form.notes=e.target.value; };
  // save
  const sv=$main.querySelector("#save"); if(sv) sv.onclick=commitSave;
  // history delete — two-tap confirm (iOS standalone PWAs suppress window.confirm)
  $main.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>{
    const id=b.dataset.del;
    if(ui.confirmDel===id){
      store.sessions=store.sessions.filter(x=>x.id!==id); ui.confirmDel=null; save(); render();
    } else {
      ui.confirmDel=id; render();
      clearTimeout(ui._delTimer);
      ui._delTimer=setTimeout(()=>{ if(ui.confirmDel===id){ ui.confirmDel=null; render(); } },4000);
    }
  });
  // plan tab
  const lt=$main.querySelector("#logToday"); if(lt) lt.onclick=()=>{
    const next=currentProgress().next;
    ui.form=blankForm(); ui.form.type=next.type;
    if(next.protocol) ui.form.protocol=next.protocol;
    ui.tab="log"; render();
  };
  const ut=$main.querySelector("#upNextTap"); if(ut) ut.onclick=()=>{ ui.planDetailOpen=!ui.planDetailOpen; render(); };
  // progress buttons
  const ex=$main.querySelector("#export"); if(ex) ex.onclick=doExport;
  const bk=$main.querySelector("#backup"); if(bk) bk.onclick=doBackup;
  const rs=$main.querySelector("#restore"); if(rs) rs.onclick=()=>document.getElementById("importer").click();
  const ci=$main.querySelector("#confirmImport"); if(ci) ci.onclick=()=>{
    store={...DEFAULTS,...ui.pendingImport.data}; ui.pendingImport=null; save(); render();
  };
  const xi=$main.querySelector("#cancelImport"); if(xi) xi.onclick=()=>{ ui.pendingImport=null; render(); };
  // benchmarks
  const bw=$main.querySelector("#bw"); if(bw) bw.onchange=e=>{
    const v=e.target.value===""?null:Number(e.target.value);
    store.settings.bodyweight=v; save(); render();
  };
  const lb=$main.querySelector("#logBench"); if(lb) lb.onclick=()=>{
    const hv=$main.querySelector("#benchHang").value, pv=$main.querySelector("#benchPull").value;
    store.benchmarks=store.benchmarks||[];
    const d=todayStr();
    if(hv!=="") store.benchmarks.push({id:uid(),date:d,metric:"hang",value:Number(hv)});
    if(pv!=="") store.benchmarks.push({id:uid(),date:d,metric:"pull",value:Number(pv)});
    save(); render();
  };
}

function updateSaveBtn(){
  const sv=$main.querySelector("#save"); if(!sv)return;
  const ok=valid();
  sv.className="save"+(ok?" ready":"");
}

/* ---- export / backup / restore ---- */
function doExport(){
  const cur=currentProgress();
  const rows=[["date","type","detail","finger","rpe","notes"]];
  [...store.sessions].sort((a,b)=>a.date<b.date?-1:1).forEach(s=>{
    rows.push([s.date,s.type,detailOf(s).replace(/\s+/g," "),s.finger||"",s.rpe??"",(s.notes||"").replace(/[\n,]/g," ")]);
  });
  const csv=rows.map(r=>r.map(c=>/[",]/.test(String(c))?`"${c}"`:c).join(",")).join("\n");
  const text=`CruxLog export · today ${todayStr()} (Plan wk ${cur.absWeek}/${TOTAL_WEEKS}, ${cur.phase.name})\n${csv}`;
  const done=()=>{ ui.copied=true; render(); setTimeout(()=>{ ui.copied=false; render(); },1800); };
  if(navigator.clipboard?.writeText){ navigator.clipboard.writeText(text).then(done).catch(()=>fallbackCopy(text,done)); }
  else fallbackCopy(text,done);
}
function fallbackCopy(text,done){
  const ta=document.createElement("textarea"); ta.value=text; ta.style.position="fixed"; ta.style.opacity="0";
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand("copy"); }catch{}
  document.body.removeChild(ta); done();
}
function doBackup(){
  const blob=new Blob([JSON.stringify(store,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download=`cruxlog-backup-${todayStr()}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  ui.backed=true; render(); setTimeout(()=>{ ui.backed=false; render(); },1800);
}
document.getElementById("importer").onchange=e=>{
  const file=e.target.files[0]; if(!file)return;
  const r=new FileReader();
  r.onload=()=>{ try{
      const data=JSON.parse(r.result);
      if(!data||!Array.isArray(data.sessions)) throw 0;
      ui.pendingImport={count:data.sessions.length,data}; ui.importError=null; render();
    }catch{ ui.importError="That doesn't look like a CruxLog backup file."; render();
      setTimeout(()=>{ ui.importError=null; render(); },3000); } };
  r.readAsText(file); e.target.value="";
};

/* ============================ boot ============================ */
load(); render();
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));
}
</script>
