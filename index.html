<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#14181C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CruxLog">
<title>CruxLog</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-192.png">
<style>
  :root{
    --bg:#14181C; --panel:#1B2127; --panel2:#232B33; --line:#2E3842;
    --ink:#EAF0F2; --sub:#8B9AA6; --faint:#5C6B76; --accent:#6FB3C9;
    --good:#3FB68B; --tweaky:#E0A63C; --pain:#D9503F;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;}
  body{max-width:480px; margin:0 auto; min-height:100vh;}
  .mono{font-family:ui-monospace,Menlo,monospace;}
  button{font-family:inherit; cursor:pointer;}
  input,textarea{font-family:inherit;}
  input[type=date]{-webkit-appearance:none;}
  @media (prefers-reduced-motion: reduce){*{transition:none !important;}}

  /* header */
  header{position:sticky; top:0; z-index:5; background:var(--bg);
    border-bottom:1px solid var(--line);
    padding:calc(12px + env(safe-area-inset-top)) 16px 12px;
    display:flex; align-items:center; gap:10px;}
  .ladder{display:flex; gap:2px;}
  .ladder span{width:4px; height:18px; border-radius:2px;}
  .wordmark{font-weight:800; letter-spacing:1.5px; font-size:15px;}
  .goal{margin-left:auto; color:var(--faint); font-size:11px;}

  main{padding:18px 16px 130px;}

  /* segmented */
  .seg{display:flex; gap:4px; background:var(--panel2); padding:4px; border-radius:12px;}
  .seg button{flex:1; border:none; border-radius:9px; padding:10px 4px;
    font-size:14px; font-weight:700; background:transparent; color:var(--sub);
    display:flex; align-items:center; justify-content:center; gap:6px; transition:background .15s;}
  .seg button.on{background:var(--accent); color:#0E1418;}
  .seg svg{width:16px; height:16px;}

  .daterow{display:flex; align-items:center; justify-content:space-between; margin:16px 2px 4px;}
  .daterow input{background:transparent; border:none; color:var(--ink);
    font-size:15px; padding:0; font-family:ui-monospace,monospace;}
  .wk{color:var(--faint); font-size:12px; font-family:ui-monospace,monospace;}
  .rule{height:1px; background:var(--line); margin:8px 0 20px;}

  .field{margin-bottom:18px;}
  .flabel{color:var(--faint); font-size:12px; font-weight:700; letter-spacing:1px;
    text-transform:uppercase; margin-bottom:10px;}

  /* grade grid */
  .grades{display:grid; grid-template-columns:repeat(4,1fr); gap:8px;}
  .grade{position:relative; border-radius:12px; border:1.5px solid var(--line);
    background:var(--panel); color:var(--sub); padding:12px 0;
    font-family:ui-monospace,monospace; font-weight:800; font-size:16px;}
  .grade .badge{position:absolute; top:-9px; right:-9px; min-width:26px; height:26px;
    border-radius:13px; color:#0E1418; font-size:12px; font-weight:800; z-index:1;
    display:flex; align-items:center; justify-content:center; padding:0 6px;
    -webkit-touch-callout:none; -webkit-user-select:none; user-select:none;}
  .hint{color:var(--faint); font-size:11px; margin-top:8px;}

  /* stepper block */
  .stack{display:flex; flex-direction:column; gap:16px; background:var(--panel);
    border-radius:12px; padding:16px 14px;}
  .stepper{display:flex; align-items:center; justify-content:space-between;}
  .stepper .lab{color:var(--sub); font-size:14px;}
  .stepper .ctl{display:flex; align-items:center; gap:10px;}
  .stepper .val{font-family:ui-monospace,monospace; font-size:18px; font-weight:700;
    min-width:58px; text-align:center; color:var(--ink);}
  .stepbtn{width:38px; height:38px; border-radius:10px; border:1px solid var(--line);
    background:var(--panel2); color:var(--ink); display:flex; align-items:center; justify-content:center;}
  .stepbtn svg{width:16px; height:16px;}

  /* lift rows */
  .liftrow{background:var(--panel); border-radius:12px; padding:12px 14px;
    display:flex; align-items:center; gap:10px;}
  .liftrow .name{width:52px; color:var(--ink); font-weight:800; font-size:14px;}
  .liftrow .x{color:var(--faint);}
  .numin{box-sizing:border-box; background:var(--panel2); border:1px solid var(--line);
    border-radius:9px; color:var(--ink); text-align:center; padding:10px 6px;
    font-family:ui-monospace,monospace; font-size:15px; font-weight:700;}
  .amrap{margin-left:auto; width:40px; height:40px; border-radius:10px;
    border:1px solid var(--line); background:var(--panel2); color:var(--faint);
    font-weight:800; font-size:12px;}
  .amrap.on{border-color:var(--accent); background:rgba(111,179,201,.13); color:var(--accent);}

  /* finger / effort row */
  .row3{display:flex; gap:8px;}
  .chip{flex:1; border-radius:12px; padding:12px 4px; border:1.5px solid var(--line);
    background:var(--panel); color:var(--sub); font-weight:700; font-size:14px;
    display:flex; flex-direction:column; align-items:center; gap:5px;}
  .chip .dot{width:12px; height:12px; border-radius:6px;}
  .effortchip{flex:1; border-radius:10px; padding:10px 4px; border:1px solid var(--line);
    background:var(--panel); color:var(--sub); font-weight:700; font-size:13px;}
  .effortchip.on{border-color:var(--accent); background:rgba(111,179,201,.13); color:var(--ink);}

  textarea.notes{width:100%; resize:none; background:var(--panel); border:1px solid var(--line);
    border-radius:12px; color:var(--ink); font-size:15px; padding:12px 14px;}

  .save{width:100%; border:none; border-radius:14px; padding:16px; font-size:16px;
    font-weight:800; letter-spacing:.3px; background:var(--panel2); color:var(--faint);
    display:flex; align-items:center; justify-content:center; gap:8px; transition:background .2s;}
  .save.ready{background:var(--accent); color:#0E1418;}
  .save.flash{background:var(--good); color:#0E1418;}
  .save svg{width:18px; height:18px;}

  /* history */
  .hcard{background:var(--panel); border-radius:14px; padding:14px; margin-bottom:10px;
    border:1px solid var(--line);}
  .hhead{display:flex; align-items:center; gap:10px; margin-bottom:8px;}
  .hhead .type{color:var(--ink); font-weight:700; font-size:14px; text-transform:capitalize;}
  .hhead .fdot{width:9px; height:9px; border-radius:5px;}
  .hhead .date{margin-left:auto; color:var(--faint); font-size:12px; font-family:ui-monospace,monospace;}
  .hhead .del{background:var(--panel2); border:1px solid var(--line); color:var(--sub);
    padding:6px 10px; border-radius:8px; display:flex; align-items:center; gap:5px;
    flex-shrink:0; font-size:12px; font-weight:700; min-height:30px;}
  .hhead .del svg{width:14px; height:14px; flex-shrink:0;}
  .hhead .del.confirm{background:rgba(217,80,63,.15); border-color:var(--pain); color:var(--pain);}
  .hdetail{font-family:ui-monospace,monospace; font-size:14px; color:var(--ink); letter-spacing:-.2px;}
  .hnotes{color:var(--sub); font-size:13px; margin-top:6px;}
  .hicon{color:var(--accent); display:flex;}
  .hicon svg{width:16px; height:16px;}

  /* progress */
  .cur{background:var(--panel); border-radius:16px; padding:18px 16px; margin-bottom:14px; border:1px solid var(--line);}
  .cur .lab{color:var(--faint); font-size:12px; font-weight:700; letter-spacing:1px; text-transform:uppercase;}
  .cur .big{display:flex; align-items:baseline; gap:10px; margin-top:6px;}
  .cur .wknum{font-family:ui-monospace,monospace; font-size:34px; font-weight:800; color:var(--ink);}
  .cur .phase{color:var(--accent); font-size:15px; font-weight:700;}
  .statgrid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px;}
  .stat{background:var(--panel); border-radius:14px; padding:16px 14px; border:1px solid var(--line);}
  .stat .lab{color:var(--faint); font-size:12px; font-weight:700; letter-spacing:.5px; text-transform:uppercase;}
  .stat .v{font-family:ui-monospace,monospace; font-size:26px; font-weight:800; margin-top:4px; color:var(--ink);}
  .btn2{width:100%; border-radius:14px; padding:16px; background:var(--panel2); color:var(--ink);
    font-size:15px; font-weight:800; display:flex; align-items:center; justify-content:center; gap:8px;
    border:1px solid var(--line); transition:background .2s; margin-bottom:10px;}
  .btn2.flash{background:var(--good); color:#0E1418; border-color:var(--good);}
  .btn2 svg{width:18px; height:18px;}
  .note{color:var(--faint); font-size:12px; margin-top:2px; text-align:center; line-height:1.5;}

  /* empty */
  .empty{padding:80px 32px; text-align:center; color:var(--sub);}
  .empty .icon{color:var(--faint); display:flex; justify-content:center; margin-bottom:16px;}
  .empty .icon svg{width:30px; height:30px;}
  .empty .t{color:var(--ink); font-size:17px; font-weight:700; margin-bottom:8px;}
  .empty .b{font-size:14px; line-height:1.5;}

  /* nav */
  nav{position:fixed; bottom:0; left:50%; transform:translateX(-50%);
    width:100%; max-width:480px; background:var(--panel); border-top:1px solid var(--line);
    display:flex; padding:8px 8px calc(8px + env(safe-area-inset-bottom));}
  nav button{flex:1; background:none; border:none; color:var(--faint); padding:8px 0;
    display:flex; flex-direction:column; align-items:center; gap:4px; font-size:11px; font-weight:700;}
  nav button.on{color:var(--accent);}
  nav svg{width:20px; height:20px;}
</style>
</head>
<body>
<header>
  <div class="ladder" id="ladder"></div>
  <span class="wordmark">CRUXLOG</span>
  <span class="goal mono" id="goalTag">&rarr; V8</span>
</header>
<main id="main"></main>
<nav id="nav"></nav>

<input type="file" id="importer" accept="application/json" style="display:none">

<script>
"use strict";
/* ============================ constants ============================ */
const KEY = "climb-tracker-v1";
const GRADE_COLORS = ["#5E8A96","#5E9689","#5F9C7E","#79A066","#A3A055","#C0983F",
  "#CE8B44","#D57947","#D0603F","#C24F45","#B04343"];
/* One lift day/week, every phase — see TRAINING_PLAN.md "Lift Day Protocol". */
const LIFT_DAY = [
  {key:"pullup",    name:"Weighted pull-up",         short:"Pull-up",    sets:4, repTarget:"3-5",  bw:true},
  {key:"ohp",       name:"Overhead press",           short:"OHP",        sets:3, repTarget:"5"},
  {key:"squat",     name:"Squat (or leg press)",     short:"Squat",      sets:3, repTarget:"8-10"},
  {key:"pullapart", name:"Band pull-apart / face pull", short:"Pull-apart", sets:3, repTarget:"15"},
  {key:"wristext",  name:"Wrist extensor curl",      short:"Wrist ext",  sets:3, repTarget:"12"},
  {key:"hlr",       name:"Hanging leg raise",        short:"Leg raise",  sets:3, repTarget:"8-10"},
];
function blankLiftEntries(){
  const o={}; LIFT_DAY.forEach(L=>{ o[L.key]=Array.from({length:L.sets},()=>({weight:"",reps:"",amrap:false})); });
  return o;
}
const FINGER = {
  good:{label:"Good",dot:"var(--good)"},
  tweaky:{label:"Tweaky",dot:"var(--tweaky)"},
  pain:{label:"Pain",dot:"var(--pain)"},
};
const EFFORT = [
  {key:"easy",label:"Easy",rpe:5},{key:"solid",label:"Solid",rpe:7},
  {key:"hard",label:"Hard",rpe:9},{key:"max",label:"Max",rpe:10},
];
const SLEEP = {
  poor:{label:"Poor",dot:"var(--pain)"},
  ok:{label:"OK",dot:"var(--tweaky)"},
  good:{label:"Good",dot:"var(--good)"},
};
const SORENESS = {
  fresh:{label:"Fresh",dot:"var(--good)"},
  tired:{label:"Tired",dot:"var(--tweaky)"},
  sore:{label:"Sore",dot:"var(--pain)"},
};
const DEFAULTS = {
  sessions:[],
  liftTargets:{chin:0,ohp:null,squat:null,row:null,bench:null,dl:null},
  lastLiftDay:null, dailyChecks:{},
  settings:{targetGrade:8, bodyweight:null, comfortableGrade:null},
  benchmarks:[], // {id,date,metric:'hang'|'pull',value}
  progress:{phaseIdx:0, weekInPhase:1, slot:0}, // advances only when a session is logged — never tied to the calendar
};

/* ---- program: phases + weekly templates, from TRAINING_PLAN.md ----
   Progress through this is driven entirely by logged sessions, not dates.
   Miss a day, take a week off, whatever — the plan just waits at the same slot. */
const PHASES = [
  {key:"recon",    name:"Reconditioning",          weeks:4,
    note:"Rebuild tendon tolerance & volume. No limit bouldering, no max hangs."},
  {key:"strength", name:"Strength Base",            weeks:8,
    note:"Max hangs + weighted pull-ups build the strength ceiling."},
  {key:"power",    name:"Power & Power-Endurance",  weeks:8,
    note:"Convert strength into hard moves and links."},
  {key:"perform",  name:"Performance / Send",       weeks:6,
    note:"Project V6–V8. Taper training volume, chase sends."},
];
const TOTAL_WEEKS = PHASES.reduce((a,p)=>a+p.weeks,0);

// ordered session slots per phase — exactly one lift slot/week in every phase (see TRAINING_PLAN.md).
// "full" is the longer coaching note shown when you tap the Up Next card for detail.
const LIFT_FULL = {
  recon:    "One session, all 5 lifts: weighted pull-up 4×3-5 (bodyweight or very light added weight), overhead press 3×5, band pull-apart 3×15, wrist extensor curl 3×12, hanging leg raise 3×8-10. Keep everything light-moderate — you're re-grooving patterns, not chasing numbers yet.",
  strength: "Same 5 lifts, same set/rep targets — but this is where you progressively add weight to the pull-up and OHP, session over session, as long as reps stay clean. Antagonist and wrist work stay at a steady, non-maxing effort; they're prehab, not the point of the session.",
  power:    "Maintain your current pull-up and OHP loads — don't chase new numbers this phase, your climbing sessions are the priority now. Keep antagonist/wrist work in every week without fail; it's what's protecting your elbows through the higher pulling intensity elsewhere.",
  perform:  "Light maintenance only. Enough load to keep the signal alive, nothing that leaves you sore for a project day. Antagonist and wrist work still count — skipping them is how overuse injuries creep in during a send phase.",
};
/* {{grade}} is resolved at render time from your logged send history (see gradeRangeFor). */
const WEEKLY_TEMPLATES = {
  recon:[
    {type:"climb",label:"Climb — volume",  detail:"{{grade}}, high volume, footwork focus", targetRpe:5, gradeRole:"volume",
      full:"Stay in the {{grade}} range even though it feels easy — the constraint here is volume and footwork precision, not difficulty. Slow, quiet feet, full extension between moves. This rebuilds general work capacity before you load fingers hard again."},
    {type:"hang", label:"Hangboard — repeaters", detail:"20mm edge, {{load}}, 7s/3s×6",protocol:"repeater", targetRpe:6,
      full:"~20mm edge, {{load}}. 7s hang / 3s rest × 6 reps, 3 min rest between sets, 2 sets per grip type (open + half-crimp). This is tendon reconditioning — moderate load, not max effort."},
    {type:"climb",label:"Climb — volume",  detail:"{{grade}}, high volume, footwork focus", targetRpe:5, gradeRole:"volume",
      full:"Same as your other volume day — mileage and footwork, not difficulty. If it feels too easy, that's the point right now."},
    {type:"hang", label:"Hangboard — repeaters", detail:"20mm edge, {{load}}, 7s/3s×6",protocol:"repeater", targetRpe:6,
      full:"Second repeater session of the week. Same protocol as before — this frequency is what rebuilds tendon tolerance without risking a flare-up."},
    {type:"lift", label:"Lift — light",  detail:"Full 5-lift session, light load", targetRpe:5,
      full:LIFT_FULL.recon},
    {type:"climb",label:"Climb — ARC / easy", detail:"{{grade}}, 20–30 min continuous easy movement", targetRpe:4, gradeRole:"arc",
      full:"20–30 minutes of continuous, easy movement in the {{grade}} range — traversing or repeating easy problems back to back with minimal rest. You should never get pumped. This builds aerobic capacity in the forearms, which speeds recovery between hard sessions later."},
  ],
  strength:[
    {type:"climb",label:"Climb — volume",  detail:"{{grade}} + footwork drills", targetRpe:6, gradeRole:"volume",
      full:"{{grade}}, moderate volume, with 2-3 problems where you deliberately drill footwork (quiet feet, no smearing scrambles). Warm up thoroughly before any harder attempts today."},
    {type:"hang", label:"Hangboard — max hangs", detail:"20mm, {{load}}, 10s/3min×5–6",protocol:"max", targetRpe:9,
      full:"20mm edge, {{load}} — near-max effort. 10s hang / 3min rest × 5-6 sets. The last 2-3 seconds of the hang should be genuinely hard — this is neural/max-strength work, not conditioning. Full 3-minute rests, no shortcuts."},
    {type:"climb",label:"Climb — limit",   detail:"{{grade}}, low volume, full rest between goes", targetRpe:9, gradeRole:"limit",
      full:"{{grade}}, low volume. Full rest (3-5 min) between attempts. Ugly movement is fine — you're exposing yourself to harder holds and steeper angles, not sending clean."},
    {type:"hang", label:"Hangboard — repeaters", detail:"Repeaters + core, {{load}}",protocol:"repeater", targetRpe:6,
      full:"Repeaters + core work at {{load}}. Keep this moderate — this session maintains tendon durability while your max-hang day does the heavy lifting."},
    {type:"lift", label:"Lift — build",  detail:"Full 5-lift session, add weight", targetRpe:7,
      full:LIFT_FULL.strength},
    {type:"climb",label:"Climb — volume / ARC", targetRpe:5, gradeRole:"volume",
      full:"Volume or ARC — whichever your body wants, in the {{grade}} range. Use this as an active recovery / mileage day."},
  ],
  power:[
    {type:"climb",label:"Climb — limit",   detail:"{{grade}}, low volume, full rest", targetRpe:9, gradeRole:"limit",
      full:"{{grade}}, low volume, full rest between attempts. This is where the strength you built converts into harder single moves."},
    {type:"hang", label:"Hangboard — maintenance", detail:"1×/week, {{load}}",protocol:"max", targetRpe:7,
      full:"1x/week is enough here — you're not trying to add new max-hang strength, just hold onto what you built. {{load}}, 3-4 sets is fine."},
    {type:"climb",label:"Climb — power-endurance", detail:"4x4s / linked circuits, {{grade}}", targetRpe:8, gradeRole:"powerEnd",
      full:"4x4s or linked boulder circuits at {{grade}}, minimal rest between attempts/problems. This trains your ability to link hard moves without falling apart — think 'crux move, 4 times in a row.'"},
    {type:"lift", label:"Lift — maintain",  detail:"Full 5-lift session, hold current weight", targetRpe:6,
      full:LIFT_FULL.power},
    {type:"climb",label:"Climb — volume / campus", targetRpe:5, gradeRole:"volume",
      full:"Volume day in the {{grade}} range, or light campus board work (basic ladders, matching moves only) if shoulders/elbows feel good."},
  ],
  perform:[
    {type:"climb",label:"Climb — project",  detail:"{{grade}} attempts", targetRpe:9, gradeRole:"project",
      full:"{{grade}} attempts. Full rest between burns. This is what everything else has been building toward — treat sends as data, not judgment."},
    {type:"hang", label:"Hangboard — maintenance", detail:"{{load}}, short session",protocol:"max", targetRpe:6,
      full:"Short max-hang session at {{load}}, just enough to keep the signal alive. Don't grind — this phase is about projecting, not building new strength."},
    {type:"climb",label:"Climb — project",  detail:"{{grade}} attempts", targetRpe:9, gradeRole:"project",
      full:"Second project session of the week — same approach, full rest between burns."},
    {type:"lift", label:"Lift — maintain",  detail:"Full 5-lift session, reduced volume", targetRpe:5,
      full:LIFT_FULL.perform},
    {type:"climb",label:"Climb — volume / technique", targetRpe:5, gradeRole:"volume",
      full:"Volume or technique-focused day in the {{grade}} range — film yourself, look at footwork and hip positioning on your project's crux."},
  ],
};
function slotsOf(phaseKey){ return WEEKLY_TEMPLATES[phaseKey]||WEEKLY_TEMPLATES.strength; }

/* ---- dynamic grade prescription ----
   "Comfortable grade" is the highest grade with 3+ logged sends — a real, evidence-based
   floor rather than a guess, and it ratchets up automatically as you log more climbs.
   Falls back to (targetGrade - 4) only when there's no send history yet to compute it. */
function computeComfortableGrade(){
  const counts={};
  store.sessions.forEach(s=>{ if(s.type==="climb") (s.grades||[]).forEach(g=>{ counts[g]=(counts[g]||0)+1; }); });
  let best=null;
  for(let g=0; g<=16; g++){ if((counts[g]||0)>=3) best=g; }
  return best;
}
function effectiveComfortableGrade(){
  const stored=store.settings.comfortableGrade;
  const computed=computeComfortableGrade();
  if(computed!=null && (stored==null || computed>stored)) return computed;
  return stored ?? Math.max(0,(store.settings.targetGrade??8)-4);
}
function gradeRangeFor(role){
  const cg=effectiveComfortableGrade();
  const target=store.settings.targetGrade??8;
  switch(role){
    case "volume": return [Math.max(0,cg-3), cg];
    case "arc": return [Math.max(0,cg-4), Math.max(0,cg-2)];
    case "limit": return [cg+1, cg+2];
    case "powerEnd": return [cg, cg+1];
    case "project": return [Math.max(cg+1,target-2), target];
    default: return [Math.max(0,cg-2), cg];
  }
}
function gradeRangeText(role){
  const [lo,hi]=gradeRangeFor(role);
  return lo>=hi ? `V${hi}` : `V${lo}–V${hi}`;
}
function resolveSlotText(slot){
  const grade = slot.gradeRole ? gradeRangeText(slot.gradeRole) : "";
  const load = slot.type==="hang" ? loadText(suggestHangLoad(slot.protocol)) : "";
  const sub=(s)=> s ? s.replace(/\{\{grade\}\}/g,grade).replace(/\{\{load\}\}/g,load) : s;
  return {...slot, detail:sub(slot.detail), full:sub(slot.full)};
}
/* Finds the plan slot (in the current phase) that best matches whatever the Log form is
   currently set to, so the Log tab can always show full protocol detail — not just when
   you arrived there via the Plan tab's "Log this session" button. */
function findMatchingSlot(f){
  const slots=currentProgress().slots;
  if(f.type==="hang") return slots.find(s=>s.type==="hang"&&s.protocol===f.protocol) || slots.find(s=>s.type==="hang");
  if(f.type==="climb") return slots.find(s=>s.type==="climb"&&s.gradeRole===(f.gradeRole||"volume")) || slots.find(s=>s.type==="climb");
  if(f.type==="lift") return slots.find(s=>s.type==="lift");
  return null;
}

/* ---- dynamic load prescription ----
   Autoregulated progressive overload: hold/deload after a hard or painful session, add load
   after an easy/solid one, halve suggested load outright during a deload week. */
function loadText(lb){ return lb>0?`+${lb}lb`:lb<0?`${lb}lb`:"bodyweight"; }
function suggestHangLoad(protocol){
  const hist=[...store.sessions].filter(s=>s.type==="hang"&&s.hang&&s.hang.protocol===protocol).sort((a,b)=>a.date<b.date?1:-1);
  const cur=currentProgress();
  if(!hist.length){
    if(protocol==="max"){ const bench=latestBenchmark("hang"); return bench?Math.round(bench.value):0; }
    return 0;
  }
  const last=hist[0];
  const base=last.hang.addedLb??0;
  if(cur.isDeload) return Math.round(base*0.5);
  if(last.finger==="pain") return base;
  if(last.rpe!=null && last.rpe<=7) return base+5;
  return base;
}
const PROGRESSABLE_LIFTS = new Set(["pullup","ohp","squat"]); // per plan doc — the other 3 are prehab/maintenance, not progressive-overload targets
function suggestLiftWeight(key){
  const hist=[...store.sessions].filter(s=>s.type==="lift"&&s.lift&&s.lift.entries&&s.lift.entries[key]&&s.lift.entries[key].length)
    .sort((a,b)=>a.date<b.date?1:-1);
  if(!hist.length) return null;
  const rows=hist[0].lift.entries[key];
  const topWeight=Math.max(...rows.map(r=>Number(r.weight)||0));
  const cur=currentProgress();
  if(cur.isDeload) return Math.round(topWeight*0.5);
  if(!PROGRESSABLE_LIFTS.has(key) || cur.phase.key!=="strength") return topWeight;
  const targetReps = key==="pullup" ? 3 : key==="squat" ? 8 : 5;
  const topSet=rows.find(r=>Number(r.weight)===topWeight);
  const repsHit = topSet && Number(topSet.reps)>=targetReps;
  const painFlag = hist[0].finger==="pain";
  if(painFlag) return topWeight;
  return repsHit ? topWeight+5 : topWeight;
}

/* Benchmark-gated phase exit. Reconditioning and Performance are intentionally NOT gated:
   tendon adaptation runs on a timeline strength numbers can't shortcut (recon), and Performance's
   "exit" is just plan completion, not a strength target. Strength Base and Power DO have a
   measurable exit signal, so those are held open past their nominal length (up to 1.5x) until met. */
function benchmarkGateStatus(phaseKey){
  if(phaseKey==="strength"){
    const bw=store.settings.bodyweight;
    if(!bw) return {applies:true, met:null, text:"Set your bodyweight on the Progress tab to enable benchmark-gated exit from Strength Base."};
    const hang=latestBenchmark("hang"), pull=latestBenchmark("pull");
    const hangPct = hang ? (hang.value/bw)*100 : 0;
    const pullPct = pull ? (pull.value/bw)*100 : 0;
    return {applies:true, met: hangPct>=20 && pullPct>=30,
      text:`Exit target: max hang ≥20% BW (now ${hangPct.toFixed(0)}%), weighted pull-up ≥30% BW (now ${pullPct.toFixed(0)}%).`};
  }
  if(phaseKey==="power"){
    const target=store.settings.targetGrade??8;
    let hardest=-1; store.sessions.forEach(s=>(s.grades||[]).forEach(g=>{ if(g>hardest) hardest=g; }));
    return {applies:true, met: hardest>=target-3,
      text:`Exit target: a send of V${Math.max(0,target-3)}+ this phase (hardest so far: ${hardest>=0?"V"+hardest:"none yet"}).`};
  }
  return {applies:false, met:true, text:""};
}
function currentProgress(){
  const p = store.progress || DEFAULTS.progress;
  const phaseIdx = Math.min(p.phaseIdx, PHASES.length-1);
  const phase = PHASES[phaseIdx];
  const slots = slotsOf(phase.key);
  const cap = Math.ceil(phase.weeks*1.5);
  const weekInPhase = Math.min(Math.max(p.weekInPhase,1), cap);
  const slot = Math.min(Math.max(p.slot,0), slots.length-1);
  const donePhaseWeeks = PHASES.slice(0,phaseIdx).reduce((a,ph)=>a+ph.weeks,0);
  const absWeek = donePhaseWeeks + Math.min(weekInPhase,phase.weeks);
  const gate = benchmarkGateStatus(phase.key);
  const held = gate.applies && gate.met===false && weekInPhase>phase.weeks;
  return {phaseIdx,phase,slots,weekInPhase,slot,absWeek,cap,gate,held,next:slots[slot],
    isDeload:(phase.key==="strength"||phase.key==="power") && weekInPhase%4===0};
}
function advanceProgress(){
  const cur=currentProgress();
  let {phaseIdx,weekInPhase,slot}=cur;
  const slots=cur.slots;
  slot++;
  if(slot>=slots.length){
    slot=0; weekInPhase++;
    if(weekInPhase>cur.phase.weeks){
      const gate=benchmarkGateStatus(cur.phase.key);
      const blocked = gate.applies && gate.met===false && weekInPhase<=cur.cap;
      if(!blocked){
        weekInPhase=1;
        if(phaseIdx<PHASES.length-1) phaseIdx++;
        else { store.progress={phaseIdx,weekInPhase:cur.phase.weeks,slot:slots.length-1,completedCycle:true}; return; }
      }
      // else: held — stay in this phase past its nominal length until the benchmark is met or the cap is hit
    }
  }
  store.progress={phaseIdx,weekInPhase,slot};
}

const FINGER_INTENSITY_TYPES = s => s.type==="hang" || (s.type==="climb" && (s.rpe>=9));
function computeGuardrails(store){
  const out=[];
  const sessions=[...store.sessions].sort((a,b)=>a.date<b.date?1:-1);
  const fingerSessions=sessions.filter(FINGER_INTENSITY_TYPES);

  if(fingerSessions.length>=2){
    const d0=dayDiff(fingerSessions[0].date, fingerSessions[1].date);
    if(Math.abs(d0)<=1){
      out.push({level:"bad",text:"Finger-intensity sessions on back-to-back days — rest 48h+ between max hangs / limit bouldering."});
    }
  }
  const rollingCutoff=dayDiff(todayStr(),"1970-01-01")-7;
  const last7dFinger=fingerSessions.filter(s=>dayDiff(s.date,"1970-01-01")>rollingCutoff);
  if(last7dFinger.length>3){
    out.push({level:"warn",text:`${last7dFinger.length} finger-intensity sessions in the last 7 days — plan caps this at 3/week.`});
  }
  const painTrail=sessions.filter(s=>s.finger).slice(0,2);
  if(painTrail.length===2 && painTrail.every(s=>s.finger==="pain")){
    out.push({level:"bad",text:"Pain flagged in back-to-back sessions — back off finger loading and consider a deload."});
  } else if(painTrail.length===2 && painTrail.every(s=>s.finger==="tweaky")){
    out.push({level:"warn",text:"Tweaky twice in a row — ease intensity on the next finger session."});
  }

  // acute:chronic workload ratio — overall session-count spike detection, not just finger sessions.
  // ACWR = last 7 days' session count / (last 28 days' average weekly count). >1.5 is the commonly
  // cited danger zone (Gabbett 2016) where sudden load jumps correlate with higher injury risk.
  const nowEpoch=dayDiff(todayStr(),"1970-01-01");
  const acuteCount=sessions.filter(s=>dayDiff(s.date,"1970-01-01")>nowEpoch-7).length;
  const chronicCount=sessions.filter(s=>dayDiff(s.date,"1970-01-01")>nowEpoch-28).length;
  const chronicWeekly=chronicCount/4;
  if(chronicWeekly>=1){
    const acwr=acuteCount/chronicWeekly;
    if(acwr>1.5){
      out.push({level:"warn",text:`Training load spiked to ~${acwr.toFixed(1)}× your recent average this week (${acuteCount} sessions vs a ~${chronicWeekly.toFixed(1)}/wk 4-week average) — sudden volume jumps are linked to higher injury risk. Consider easing up or taking an extra rest day.`});
    }
  }

  const cur=currentProgress();
  if(cur.isDeload){
    out.push({level:"info",text:"Deload week — halve hangboard/lift volume, keep climbing light."});
  }

  // progressive-overload plateau check — only meaningful where the plan expects steady load increases.
  if(cur.phase.key==="strength"){
    const hangP=plateauCheck("hang","Max hang load");
    if(hangP) out.push({level:"info",text:hangP});
    const pullP=plateauCheck("pull","Weighted pull-up load");
    if(pullP) out.push({level:"info",text:pullP});
  }

  // stalled-grade check — the plan doc's own rule: 3+ stuck project sessions means cycle back to strength work.
  if(cur.phase.key==="perform"){
    const stalled=stalledGradeCheck();
    if(stalled) out.push({level:"warn",text:stalled});
  }

  // RPE/intensity-mismatch — flags intensity creep: logging a much harder effort than the day called for.
  if(sessions[0] && sessions[0].intensityFlag){
    const {target,actual}=sessions[0].intensityFlag;
    out.push({level:"warn",text:`Last session was logged at RPE ${actual}, well above the ~RPE ${target} the plan called for — keeping easy/moderate days genuinely easy is what makes the hard days work. Intensity creep like this is a common precursor to overtraining.`});
  }

  // readiness caution — if the most recent readiness log was poor and the next session is high-intensity.
  const lastReadiness=sessions.find(s=>s.sleep||s.soreness);
  if(lastReadiness && (lastReadiness.sleep==="poor" || lastReadiness.soreness==="sore") && (cur.next?.targetRpe??0)>=8){
    out.push({level:"warn",text:`Your last logged readiness was ${lastReadiness.sleep==="poor"?"poor sleep":"sore"}, and the next session is high-intensity (${cur.next.label}). Consider swapping in a lighter session or an extra rest day first.`});
  }

  return out;
}
function plateauCheck(metric,label){
  const vals=benchTrend(metric);
  if(vals.length<3) return null;
  const last3=vals.slice(-3);
  if(last3[1]<=last3[0] && last3[2]<=last3[1]){
    return `${label} hasn't increased over your last 3 logs (${last3.join("→")}lb) — Strength Base expects steady load increases. Check dead-hang/pull-up form, recovery, sleep, or nutrition before assuming this is a real ceiling.`;
  }
  return null;
}
function stalledGradeCheck(){
  const climbs=[...store.sessions].filter(s=>s.type==="climb"&&(s.grades||[]).length).sort((a,b)=>a.date<b.date?1:-1);
  if(climbs.length<3) return null;
  let hardestEver=-1; store.sessions.forEach(s=>(s.grades||[]).forEach(g=>{ if(g>hardestEver) hardestEver=g; }));
  const last3=climbs.slice(0,3);
  const noPR=last3.every(s=>Math.max(...s.grades)<hardestEver);
  if(noPR){
    return `Stalled at V${hardestEver} for your last 3 climbing sessions — the plan's own rule is that this means cycle back into a 6-8 session-week strength block targeting your specific limiter before resuming projecting.`;
  }
  return null;
}

/* ============================ helpers ============================ */
const pad = n => String(n).padStart(2,"0");
const todayStr = () => { const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; };
const dayDiff = (a,b) => Math.floor((new Date(a+"T12:00:00")-new Date(b+"T12:00:00"))/86400000);
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const esc = s => String(s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function prettyDate(s){ return new Date(s+"T12:00:00").toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric"}); }
function gradeCounts(arr){ const c={}; (arr||[]).forEach(g=>c[g]=(c[g]||0)+1); return c; }

function detailOf(s){
  if(s.type==="climb"){
    const c=gradeCounts(s.grades);
    return Object.keys(c).sort((a,b)=>b-a).map(g=>`V${g}×${c[g]}`).join("  ")||"—";
  }
  if(s.type==="hang"){
    const h=s.hang||{}; const load=h.addedLb>0?`+${h.addedLb}lb`:h.addedLb<0?`${h.addedLb}lb`:"BW";
    const grip=h.grip==="open"?"open":"half-crimp";
    return `${h.protocol==="max"?"Max hang":"Repeaters"} · ${grip} · ${h.edge}mm · ${load} · ${h.sets}×`;
  }
  if(s.type==="lift"){
    const l=s.lift||{};
    const parts=LIFT_DAY.map(L=>{
      const rows=(l.entries||{})[L.key]; if(!rows||!rows.length) return null;
      const setsStr=rows.map(r=>{
        const w=L.bw?(Number(r.weight)?`+${r.weight}`:"BW"):r.weight;
        return `${w}×${r.reps||"?"}${r.amrap?"+":""}`;
      }).join(",");
      return `${L.short} ${setsStr}`;
    }).filter(Boolean);
    return `Lift · ${parts.join("  ")||"—"}`;
  }
  return"—";
}

function blankForm(){
  return { type:"climb", date:todayStr(), grades:[], protocol:"repeater", edge:20, grip:"half",
    addedLb:0, sets:5, entries:blankLiftEntries(), finger:null, effort:null, notes:"",
    sleep:null, soreness:null, warmedUp:false, gradeRole:null };
}
/* Applies data-driven suggestions to a form — only safe to call once `store` is loaded. */
function applySuggestions(f){
  if(f.type==="hang") f.addedLb=suggestHangLoad(f.protocol);
  if(f.type==="lift"){
    LIFT_DAY.forEach(L=>{
      const sug=suggestLiftWeight(L.key);
      if(sug!=null) f.entries[L.key]=f.entries[L.key].map(r=>({...r,weight:String(sug)}));
    });
  }
  if(f.type==="climb" && !f.gradeRole) f.gradeRole="volume";
  return f;
}
function freshForm(type,protocol,gradeRole){
  const f=blankForm();
  if(type) f.type=type;
  if(protocol) f.protocol=protocol;
  if(gradeRole) f.gradeRole=gradeRole;
  return applySuggestions(f);
}
function load(){
  try{ const raw=localStorage.getItem(KEY); store={...DEFAULTS,...(raw?JSON.parse(raw):{})}; }
  catch{ store={...DEFAULTS}; }
}
function save(){
  try{ localStorage.setItem(KEY, JSON.stringify(store)); saveError=false; }
  catch{ saveError=true; }
}

          const border=i<slots.length-1?"border-bottom:1px solid var(--line);":"";
          const color = state==="next"?"var(--accent)":state==="done"?"var(--sub)":"var(--faint)";
          return `<div data-setslot="${i}" style="display:flex;align-items:center;gap:10px;padding:8px 0;cursor:pointer;${border}">
            <span style="width:22px;color:${color}">${state==="done"?I.check:""}</span>
            <span style="flex:1;font-size:13px;color:${state==="upcoming"?"var(--faint)":"var(--ink)"}">${esc(s.label)}</span>
            ${state==="next"?`<span class="hint" style="color:var(--accent)">next</span>`:""}
          </div>`;
        }).join("")}
      </div>
      <div class="hint" style="margin-top:8px">This cycles once per week's worth of sessions — no calendar deadlines. Log whatever you did and the plan moves forward; miss a day, rest an extra one, whatever. Tap any session above to skip to it or go back and redo one.</div>
    </div>`;
}

function renderLog(){
  const f=ui.form;
  const gc=gradeCounts(f.grades);

  let body="";
  if(f.type==="climb"){
    const role=f.gradeRole||"volume";
    const [lo,hi]=gradeRangeFor(role);
    body=`<div class="field"><div class="flabel">Sends by grade</div>
      <div class="hint" style="margin-bottom:8px">Suggested for this session: <strong style="color:var(--accent)">${gradeRangeText(role)}</strong> (from your logged send history)</div>
      <div class="grades">${GRADE_COLORS.map((col,g)=>{
        const n=gc[g]||0;
        const suggested = g>=lo && g<=hi;
        return `<button class="grade" data-grade="${g}"
          style="border-color:${n?col:suggested?"var(--accent)":"var(--line)"};background:${n?col+"26":suggested?"rgba(111,179,201,.10)":"var(--panel)"};color:${n?"var(--ink)":"var(--sub)"}">
          V${g}${n?`<span class="badge" data-graderemove="${g}" style="background:${col}">${n}</span>`:""}</button>`;
      }).join("")}</div>
      <div class="hint">Tap a grade to add a send · tap the count badge to remove one</div></div>`;
  } else if(f.type==="hang"){
    const sugLb=suggestHangLoad(f.protocol);
    body=`<div class="field"><div class="flabel">Hangboard</div>
      <div class="seg" style="margin-bottom:10px" data-seg="protocol">
        <button data-val="repeater" class="${f.protocol==="repeater"?"on":""}">Repeaters</button>
        <button data-val="max" class="${f.protocol==="max"?"on":""}">Max hang</button></div>
      <div class="seg" style="margin-bottom:16px" data-seg="grip">
        <button data-val="half" class="${f.grip==="half"?"on":""}">Half-crimp</button>
        <button data-val="open" class="${f.grip==="open"?"on":""}">Open hand</button></div>
      <div class="hint" style="margin-bottom:10px">Suggested load: <strong style="color:var(--accent)">${loadText(sugLb)}</strong> ${f.addedLb!==sugLb?`— you've changed this below`:`(auto-filled from your last ${f.protocol==="max"?"max hang":"repeater"} session)`}</div>
      <div class="stack">
        ${stepper("Edge","edge",f.edge,"mm")}
        ${stepper("Added load","addedLb",f.addedLb,"lb")}
        ${stepper("Sets","sets",f.sets,"")}
      </div></div>`;
  } else {
    body=LIFT_DAY.map(L=>liftBlock(L,f.entries[L.key]||[])).join("");
  }

  const finger = f.type!=="lift" ? `<div class="field"><div class="flabel">Finger status</div>
    <div class="row3">${Object.entries(FINGER).map(([k,x])=>{
      const on=f.finger===k;
      return `<button class="chip" data-finger="${k}"
        style="border-color:${on?x.dot:"var(--line)"};background:${on?"rgba(255,255,255,.05)":"var(--panel)"};color:${on?"var(--ink)":"var(--sub)"}">
        <span class="dot" style="background:${x.dot}"></span>${x.label}</button>`;
    }).join("")}</div></div>` : "";

  const effort = `<div class="field"><div class="flabel">Effort (optional)</div>
    <div class="row3">${EFFORT.map(e=>
      `<button class="effortchip ${f.effort===e.key?"on":""}" data-effort="${e.key}">${e.label}</button>`).join("")}</div></div>`;

  const readiness = `<div class="field"><div class="flabel">Readiness (optional)</div>
    <div class="row3" style="margin-bottom:8px">${Object.entries(SLEEP).map(([k,x])=>{
      const on=f.sleep===k;
      return `<button class="chip" data-sleep="${k}"
        style="border-color:${on?x.dot:"var(--line)"};background:${on?"rgba(255,255,255,.05)":"var(--panel)"};color:${on?"var(--ink)":"var(--sub)"}">
        <span class="dot" style="background:${x.dot}"></span>${x.label} sleep</button>`;
    }).join("")}</div>
    <div class="row3">${Object.entries(SORENESS).map(([k,x])=>{
      const on=f.soreness===k;
      return `<button class="chip" data-soreness="${k}"
        style="border-color:${on?x.dot:"var(--line)"};background:${on?"rgba(255,255,255,.05)":"var(--panel)"};color:${on?"var(--ink)":"var(--sub)"}">
        <span class="dot" style="background:${x.dot}"></span>${x.label}</button>`;
    }).join("")}</div></div>`;

  const notes = `<div class="field"><div class="flabel">Notes (optional)</div>
    <textarea class="notes" id="notes" rows="2" placeholder="beta, conditions, how it felt…">${esc(f.notes)}</textarea></div>`;

  const ok=valid();
  const editing=!!ui.editingId;
  const saveBtn=`<button class="save ${ui.flash?"flash":ok?"ready":""}" id="save">
    ${ui.flash?I.check+(editing?"Updated":"Logged"):(editing?"Update session":"Save session")}</button>
    ${editing?`<div class="hint" style="text-align:center;margin-top:10px"><span id="cancelEdit" style="text-decoration:underline;cursor:pointer">Cancel edit</span></div>`:""}`;

  const highIntensity = (f.type==="hang"&&f.protocol==="max") || f.effort==="hard" || f.effort==="max";
  const warmup = highIntensity ? `<div class="field">
      <div style="background:#22303A;border-radius:12px;padding:12px 14px;">
        <div style="font-size:13px;color:var(--ink);font-weight:700;margin-bottom:6px">High-intensity session — warm up first</div>
        <div class="hint" style="line-height:1.5">10-15 min easy climbing/traversing, then progressively harder holds building to working intensity (e.g. ~50%→70%→90% of target load) before your first real attempt. Cold-tissue max effort is a common cause of pulley/tendon injury.</div>
        <button class="effortchip ${f.warmedUp?"on":""}" data-warmedup="1" style="margin-top:10px;width:100%">${f.warmedUp?I.check+"Warmed up":"Mark as warmed up"}</button>
      </div></div>` : "";

  const matchSlot=findMatchingSlot(f);
  const info=matchSlot?resolveSlotText(matchSlot):null;
  const infoCard=info?`<div class="field"><div style="background:var(--panel2);border-radius:12px;padding:12px 14px;">
      <div style="font-size:13px;color:var(--ink);font-weight:700;margin-bottom:6px">${esc(info.label)} — ${esc(currentProgress().phase.name)}</div>
      <div class="hint" style="line-height:1.5">${esc(info.full||info.detail||"")}</div>
    </div></div>`:"";

  return errBanner()+`
    ${editing?`<div class="hint" style="margin-bottom:10px">Editing a past session — saving will overwrite it instead of logging a new one.</div>`:""}
    <div class="seg" data-seg="type">
      <button data-val="climb" class="${f.type==="climb"?"on":""}">${I.climb}Climb</button>
      <button data-val="hang" class="${f.type==="hang"?"on":""}">${I.hang}Hang</button>
      <button data-val="lift" class="${f.type==="lift"?"on":""}">${I.lift}Lift</button>
    </div>
    <div class="daterow">
      <input type="date" id="date" value="${f.date}">
    </div>
    <div class="rule"></div>
    ${infoCard}${warmup}${body}${finger}${effort}${readiness}${notes}${saveBtn}`;
}

function stepper(lab,key,val,suf){
  return `<div class="stepper"><span class="lab">${lab}</span>
    <div class="ctl">
      <button class="stepbtn" data-step="${key}" data-dir="-1">${I.minus}</button>
      <span class="val">${val}${suf}</span>
      <button class="stepbtn" data-step="${key}" data-dir="1">${I.plus}</button>
    </div></div>`;
}
function liftBlock(L,rows){
  const sug=suggestLiftWeight(L.key);
  const sugText = sug==null ? "no data yet — log a set to start tracking"
    : PROGRESSABLE_LIFTS.has(L.key) ? `${loadText(sug)}` : `${loadText(sug)} (maintenance, not a progression target)`;
  return `<div class="field"><div class="flabel" style="display:flex;justify-content:space-between;align-items:center">
      <span>${esc(L.name)}</span>
      <span style="color:var(--faint);text-transform:none;font-weight:600;letter-spacing:0">${L.sets}×${L.repTarget}${L.bw?" (+lb)":""}</span>
    </div>
    <div class="hint" style="margin-bottom:8px">Suggested: <strong style="color:var(--accent)">${sugText}</strong></div>
    <div style="display:flex;flex-direction:column;gap:8px">
      ${rows.map((r,i)=>liftSetRow(L,i,r)).join("")}
    </div></div>`;
}
function liftSetRow(L,i,r){
  return `<div class="liftrow"><div class="name">Set ${i+1}</div>
    <input class="numin" style="width:64px" inputmode="decimal" data-lift="${L.key}" data-idx="${i}" data-fld="weight"
      value="${r.weight??""}" placeholder="${L.bw?"+lb":"lb"}">
    <span class="x">×</span>
    <input class="numin" style="width:56px" inputmode="decimal" data-lift="${L.key}" data-idx="${i}" data-fld="reps"
      value="${r.reps??""}" placeholder="reps">
    <button class="amrap ${r.amrap?"on":""}" data-amrap-lift="${L.key}" data-amrap-idx="${i}" title="AMRAP">+</button></div>`;
}

  const wknum=`Plan wk ${cur.absWeek}/${TOTAL_WEEKS}`;

    <div class="note">Export copies a compact CSV to paste into a chat for check-ins. Backup saves a full copy of your log to Files — keep one now and then, since app data lives only on this device.</div>`;

/* ---- small inline charts (no deps) ---- */
function sparkline(values,opts={}){
  if(!values||values.length<2) return "";
  const w=opts.width||90, h=opts.height||28;
  const min=opts.min??Math.min(...values), max=opts.max??Math.max(...values);
  const range=(max-min)||1;
  const stepX=w/(values.length-1);
  const pts=values.map((v,i)=>[+(i*stepX).toFixed(1), +(h-((v-min)/range)*h).toFixed(1)]);
  const d="M"+pts.map(p=>p.join(",")).join(" L");
  const last=pts[pts.length-1];
  return `<svg viewBox="0 0 ${w} ${h}" style="width:${w}px;height:${h}px;overflow:visible;flex-shrink:0">
    <path d="${d}" fill="none" stroke="${opts.color||"var(--accent)"}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${last[0]}" cy="${last[1]}" r="2.5" fill="${opts.color||"var(--accent)"}"/>
  </svg>`;
}
function gradeHistory(){
  const climbs=[...store.sessions].filter(s=>s.type==="climb"&&(s.grades||[]).length)
    .sort((a,b)=>a.date<b.date?-1:1);
  let running=-1; const pts=[];
  climbs.forEach(s=>{
    const mx=Math.max(...s.grades);
    if(mx>running) running=mx;
    pts.push({date:s.date, grade:running});
  });
  return pts;
}
function renderGradeChart(){
  const pts=gradeHistory();
  const target=store.settings.targetGrade??8;
  if(pts.length<2) return `<div class="field"><div class="flabel">Progress toward V${target}</div>
    <div class="stack"><div class="hint">Log a few more climbing sessions with grades to see your progression here.</div></div></div>`;
  const w=300,h=120,padL=22,padR=10,padT=10,padB=18;
  const plotW=w-padL-padR, plotH=h-padT-padB;
  const domainMax=Math.max(10,target);
  const y=v=> padT + (domainMax-v)/domainMax*plotH;
  const x=i=> padL + i*(plotW/(pts.length-1));
  let d=`M ${x(0).toFixed(1)} ${y(pts[0].grade).toFixed(1)}`;
  for(let i=1;i<pts.length;i++){ d+=` H ${x(i).toFixed(1)} V ${y(pts[i].grade).toFixed(1)}`; }
  const grid=[0,2,4,6,8,10].filter(v=>v<=domainMax).map(v=>
    `<line x1="${padL}" x2="${w-padR}" y1="${y(v).toFixed(1)}" y2="${y(v).toFixed(1)}" stroke="var(--line)" stroke-width="1"/>
     <text x="2" y="${(y(v)+3).toFixed(1)}" font-size="8" fill="var(--faint)">V${v}</text>`).join("");
  const targetY=y(target);
  const last=pts[pts.length-1];
  const tapCircles=pts.map((p,i)=>
    `<circle cx="${x(i).toFixed(1)}" cy="${y(p.grade).toFixed(1)}" r="9" fill="transparent" data-chartpt="${i}" style="cursor:pointer"/>`).join("");
  const tapInfo = (ui.chartTap!=null && pts[ui.chartTap])
    ? `<div class="hint" style="margin-top:6px">${prettyDate(pts[ui.chartTap].date)} · hardest so far V${pts[ui.chartTap].grade}</div>` : "";
  return `<div class="field"><div class="flabel">Progress toward V${target} · tap a point</div>
    <div class="stack">
      <svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto;display:block">
        ${grid}
        <line x1="${padL}" x2="${w-padR}" y1="${targetY.toFixed(1)}" y2="${targetY.toFixed(1)}" stroke="var(--faint)" stroke-width="1" stroke-dasharray="3,3"/>
        <text x="${w-padR}" y="${(targetY-4).toFixed(1)}" font-size="8" fill="var(--faint)" text-anchor="end">Target V${target}</text>
        <path d="${d}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="${x(pts.length-1).toFixed(1)}" cy="${y(last.grade).toFixed(1)}" r="3" fill="var(--accent)"/>
        <text x="${x(pts.length-1).toFixed(1)}" y="${(y(last.grade)-8).toFixed(1)}" font-size="10" font-weight="800" fill="var(--ink)" text-anchor="end">V${last.grade}</text>
        ${tapCircles}
      </svg>
      <div class="hint" style="display:flex;justify-content:space-between">
        <span>${prettyDate(pts[0].date)}</span><span>${prettyDate(last.date)}</span>
      </div>
      ${tapInfo}
    </div></div>`;
}

/* ---- benchmarks: grip strength / pull-up ratios vs plan targets ---- */
const BENCH_TARGETS = {
  hang:[["V3–V4","0–10%"],["V6","20–30%"],["V8","40–50%+"]],
  pull:[["V3–V4","10–20%"],["V6","30–40%"],["V8","50%+"]],
};
function latestBenchmark(metric){
  const list=(store.benchmarks||[]).filter(b=>b.metric===metric).sort((a,b)=>a.date<b.date?1:-1);
  return list[0]||null;
}
function benchTrend(metric){
  return [...(store.benchmarks||[])].filter(b=>b.metric===metric).sort((a,b)=>a.date<b.date?-1:1).map(b=>b.value);
}
function renderBenchmarks(){
  const bw=store.settings.bodyweight;
  const hang=latestBenchmark("hang"), pull=latestBenchmark("pull");
  const ratio=(v)=> bw&&v!=null ? Math.round((v/bw)*100)+"%" : "—";
  return `<div class="field"><div class="flabel">Benchmarks</div>
    <div class="stack" style="margin-bottom:10px">
      <div class="stepper"><span class="lab">Bodyweight (lb)</span>
        <div class="ctl">${sparkline(benchTrend("bodyweight"))}<input class="numin" id="bw" style="width:70px" inputmode="decimal" value="${bw??""}" placeholder="lb"></div></div>
      <div class="stepper"><span class="lab">Max hang add (20mm,10s)</span>
        <div class="ctl">${sparkline(benchTrend("hang"))}<input class="numin" id="benchHang" style="width:70px" inputmode="decimal"
          placeholder="lb" value="${hang?hang.value:""}"><span class="val" style="min-width:40px">${ratio(hang?.value)}</span></div></div>
      <div class="stepper"><span class="lab">Max weighted pull-up</span>
        <div class="ctl">${sparkline(benchTrend("pull"))}<input class="numin" id="benchPull" style="width:70px" inputmode="decimal"
          placeholder="lb" value="${pull?pull.value:""}"><span class="val" style="min-width:40px">${ratio(pull?.value)}</span></div></div>
      <button class="btn2" id="logBench" style="margin:4px 0 0">Log today's numbers</button>
    </div>
    <div class="hint">Target ranges (% bodyweight): hang V3-4 ${BENCH_TARGETS.hang[0][1]} · V6 ${BENCH_TARGETS.hang[1][1]} · V8 ${BENCH_TARGETS.hang[2][1]}. Pull-up V3-4 ${BENCH_TARGETS.pull[0][1]} · V6 ${BENCH_TARGETS.pull[1][1]} · V8 ${BENCH_TARGETS.pull[2][1]}. Approximate, from Lattice/Bechtel norms — not a hard gate.</div>
    ${renderBenchmarkList()}
  </div>`;
}
function renderBenchmarkList(){
  const list=[...(store.benchmarks||[])].sort((a,b)=>a.date<b.date?1:-1).slice(0,10);
  if(!list.length) return "";
  const metricLabel={bodyweight:"Bodyweight",hang:"Max hang",pull:"Max pull-up"};
  return `<div class="hint" style="margin:12px 0 6px">Recent entries · delete a mistyped one, then re-enter it above</div>
    <div class="stack" style="gap:0;padding:4px 14px">
      ${list.map((b,i)=>{
        const border=i<list.length-1?"border-bottom:1px solid var(--line);":"";
        return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;${border}">
          <span style="flex:1;font-size:13px;color:var(--ink)">${metricLabel[b.metric]||b.metric}: ${b.value}lb <span style="color:var(--faint)">· ${prettyDate(b.date)}</span></span>
          ${ui.confirmDel===b.id
            ? `<button class="del confirm" data-delbench="${b.id}">${I.trash}Confirm?</button>`
            : `<button class="del" data-delbench="${b.id}">${I.trash}Delete</button>`}
        </div>`;
      }).join("")}
    </div>`;
}
function stat(lab,v,color){
  return `<div class="stat"><div class="lab">${lab}</div>
    <div class="v" style="${color?`color:${color}`:""}">${v}</div></div>`;
}

/* ============================ interactions ============================ */
function valid(){
  const f=ui.form;
  if(f.type==="climb") return f.grades.length>0 && !!f.finger;
  if(f.type==="hang") return !!f.finger;
  if(f.type==="lift") return LIFT_DAY.some(L=>(f.entries[L.key]||[]).some(r=>(r.weight??"")!==""));
  return false;
}
function bumpGrade(g,d){
  const f=ui.form, c=gradeCounts(f.grades);
  c[g]=Math.max(0,(c[g]||0)+d);
  const out=[]; Object.keys(c).forEach(k=>{ for(let i=0;i<c[k];i++)out.push(Number(k)); });
  f.grades=out;
}
function loadSessionIntoForm(sess){
  const f=blankForm();
  f.type=sess.type; f.date=sess.date; f.notes=sess.notes||"";
  f.finger=sess.finger||null;
  f.sleep=sess.sleep||null; f.soreness=sess.soreness||null; f.warmedUp=!!sess.warmedUp;
  f.effort=EFFORT.find(e=>e.rpe===sess.rpe)?.key || null;
  if(sess.type==="climb") f.grades=[...(sess.grades||[])];
  if(sess.type==="hang"){
    const h=sess.hang||{};
    f.protocol=h.protocol||"repeater"; f.edge=h.edge??20; f.addedLb=h.addedLb??0; f.sets=h.sets??5; f.grip=h.grip||"half";
  }
  if(sess.type==="lift"){
    const saved=(sess.lift||{}).entries||{};
    LIFT_DAY.forEach(L=>{
      const rows=saved[L.key]||[];
      f.entries[L.key]=Array.from({length:L.sets},(_,i)=>rows[i]?{weight:rows[i].weight,reps:rows[i].reps,amrap:!!rows[i].amrap}:{weight:"",reps:"",amrap:false});
    });
  }
  return f;
}
function commitSave(){
  if(!valid())return;
  const f=ui.form;
  const s={id:ui.editingId||uid(),date:f.date,type:f.type,notes:f.notes.trim()};
  if(f.effort) s.rpe=EFFORT.find(e=>e.key===f.effort)?.rpe;
  if(f.type!=="lift") s.finger=f.finger;
  if(f.sleep) s.sleep=f.sleep;
  if(f.soreness) s.soreness=f.soreness;
  if(f.warmedUp) s.warmedUp=true;
  if(f.type==="climb") s.grades=[...f.grades];
  if(f.type==="hang") s.hang={protocol:f.protocol,edge:f.edge,addedLb:f.addedLb,sets:f.sets,grip:f.grip};
  if(f.type==="lift"){
    const entries={};
    LIFT_DAY.forEach(L=>{
      const rows=(f.entries[L.key]||[]).filter(r=>(r.weight??"")!=="");
      if(rows.length) entries[L.key]=rows.map(r=>({weight:r.weight,reps:r.reps??"",amrap:!!r.amrap}));
    });
    s.lift={entries};
  }
  const editing=!!ui.editingId;
  if(editing){
    const idx=store.sessions.findIndex(x=>x.id===ui.editingId);
    if(idx>=0) store.sessions[idx]=s; else store.sessions.push(s);
  } else {
    const plannedTarget=currentProgress().next?.targetRpe;
    if(plannedTarget!=null && s.rpe!=null && s.rpe-plannedTarget>=2){
      s.intensityFlag={target:plannedTarget, actual:s.rpe};
    }
    store.sessions.push(s); advanceProgress();
  }
  save();
  const keepType=f.type, keepDate=f.date;
  ui.editingId=null;
  ui.form=freshForm(keepType); ui.form.date=keepDate;
  ui.flash=true; render();
  setTimeout(()=>{ ui.flash=false; render(); },1400);
}

function wire(){
  // nav
  $nav.querySelectorAll("[data-tab]").forEach(b=>b.onclick=()=>{
    const t=b.dataset.tab;
    if(t==="log" && ui.editingId){ ui.editingId=null; ui.form=freshForm(); }
    ui.tab=t; render();
  });

  // segmented (type / protocol / day)
  $main.querySelectorAll("[data-seg]").forEach(seg=>{
    seg.querySelectorAll("button").forEach(b=>b.onclick=()=>{
      const key=seg.dataset.seg, val=b.dataset.val;
      if(key==="type"){ ui.form.type=val; if(!ui.editingId) applySuggestions(ui.form); }
      else { ui.form[key]=val; if(key==="protocol" && !ui.editingId) ui.form.addedLb=suggestHangLoad(val); }
      render();
    });
  });
  // date
  const d=$main.querySelector("#date"); if(d) d.onchange=e=>{ ui.form.date=e.target.value; render(); };
  // grades
  $main.querySelectorAll("[data-grade]").forEach(b=>{
    const g=+b.dataset.grade;
    b.onclick=()=>{ bumpGrade(g,1); render(); };
    b.oncontextmenu=e=>{ e.preventDefault(); bumpGrade(g,-1); render(); };
  });
  // remove-a-send: a direct tap target on the count badge, since iOS Safari's long-press
  // callout (text-selection popup) unreliably intercepts custom long-press gestures.
  $main.querySelectorAll("[data-graderemove]").forEach(b=>b.onclick=(e)=>{
    e.stopPropagation();
    bumpGrade(+b.dataset.graderemove,-1); render();
  });
  // steppers
  $main.querySelectorAll("[data-step]").forEach(b=>b.onclick=()=>{
    const key=b.dataset.step, dir=+b.dataset.dir; const f=ui.form;
    if(key==="edge") f.edge=Math.max(4,f.edge+2*dir);
    else if(key==="addedLb") f.addedLb=f.addedLb+5*dir;
    else if(key==="sets") f.sets=Math.max(1,f.sets+dir);
    render();
  });
  // lift inputs (no re-render — preserve focus)
  $main.querySelectorAll("[data-lift]").forEach(inp=>{
    inp.oninput=e=>{
      const k=inp.dataset.lift, idx=+inp.dataset.idx, fld=inp.dataset.fld;
      const v=e.target.value.replace(/[^0-9.]/g,""); e.target.value=v;
      const arr=[...(ui.form.entries[k]||[])]; arr[idx]={...arr[idx],[fld]:v};
      ui.form.entries[k]=arr;
      updateSaveBtn();
    };
  });
  $main.querySelectorAll("[data-amrap-lift]").forEach(b=>b.onclick=()=>{
    const k=b.dataset.amrapLift, idx=+b.dataset.amrapIdx;
    const arr=[...(ui.form.entries[k]||[])]; arr[idx]={...arr[idx],amrap:!arr[idx]?.amrap};
    ui.form.entries[k]=arr; render();
  });
  // finger / effort
  $main.querySelectorAll("[data-finger]").forEach(b=>b.onclick=()=>{ ui.form.finger=b.dataset.finger; render(); });
  $main.querySelectorAll("[data-effort]").forEach(b=>b.onclick=()=>{
    const v=b.dataset.effort; ui.form.effort=ui.form.effort===v?null:v; render(); });
  $main.querySelectorAll("[data-sleep]").forEach(b=>b.onclick=()=>{
    const v=b.dataset.sleep; ui.form.sleep=ui.form.sleep===v?null:v; render(); });
  $main.querySelectorAll("[data-soreness]").forEach(b=>b.onclick=()=>{
    const v=b.dataset.soreness; ui.form.soreness=ui.form.soreness===v?null:v; render(); });
  const wu=$main.querySelector("[data-warmedup]"); if(wu) wu.onclick=()=>{ ui.form.warmedUp=!ui.form.warmedUp; render(); };
  // notes (no re-render)
  const nt=$main.querySelector("#notes"); if(nt) nt.oninput=e=>{ ui.form.notes=e.target.value; };
  // save
  const sv=$main.querySelector("#save"); if(sv) sv.onclick=commitSave;
  const ce=$main.querySelector("#cancelEdit"); if(ce) ce.onclick=()=>{ ui.editingId=null; ui.form=freshForm(); render(); };
  // history delete — two-tap confirm (iOS standalone PWAs suppress window.confirm)
  $main.querySelectorAll("[data-del]").forEach(b=>b.onclick=(e)=>{
    e.stopPropagation();
    const id=b.dataset.del;
    if(ui.confirmDel===id){
      store.sessions=store.sessions.filter(x=>x.id!==id); ui.confirmDel=null; save(); render();
    } else {
      ui.confirmDel=id; render();
      clearTimeout(ui._delTimer);
      ui._delTimer=setTimeout(()=>{ if(ui.confirmDel===id){ ui.confirmDel=null; render(); } },4000);
    }
  });
  $main.querySelectorAll("[data-delbench]").forEach(b=>b.onclick=()=>{
    const id=b.dataset.delbench;
    if(ui.confirmDel===id){
      store.benchmarks=(store.benchmarks||[]).filter(x=>x.id!==id); ui.confirmDel=null; save(); render();
    } else {
      ui.confirmDel=id; render();
      clearTimeout(ui._delTimer);
      ui._delTimer=setTimeout(()=>{ if(ui.confirmDel===id){ ui.confirmDel=null; render(); } },4000);
    }
  });
  // history card tap -> edit
  $main.querySelectorAll("[data-edit]").forEach(card=>card.onclick=()=>{
    const s=store.sessions.find(x=>x.id===card.dataset.edit); if(!s)return;
    ui.editingId=s.id; ui.form=loadSessionIntoForm(s); ui.tab="log"; render();
  });
  // plan tab
  const lt=$main.querySelector("#logToday"); if(lt) lt.onclick=()=>{
    const next=currentProgress().next;
    ui.editingId=null;
    ui.form=freshForm(next.type, next.protocol, next.gradeRole);
    ui.tab="log"; render();
  };
  const ut=$main.querySelector("#upNextTap"); if(ut) ut.onclick=()=>{ ui.planDetailOpen=!ui.planDetailOpen; render(); };
  $main.querySelectorAll("[data-setslot]").forEach(row=>row.onclick=()=>{
    const i=+row.dataset.setslot, cur=currentProgress();
    store.progress={phaseIdx:cur.phaseIdx, weekInPhase:cur.weekInPhase, slot:i};
    ui.planDetailOpen=false; save(); render();
  });
  // manual phase/week override
  const pp=$main.querySelector('[data-planpos="toggle"]'); if(pp) pp.onclick=()=>{ ui.planPosOpen=true; render(); };
  const ppc=$main.querySelector('[data-planpos="close"]'); if(ppc) ppc.onclick=()=>{ ui.planPosOpen=false; render(); };
  $main.querySelectorAll("[data-phasestep]").forEach(b=>b.onclick=()=>{
    const dir=+b.dataset.phasestep, cur=currentProgress();
    const newIdx=Math.max(0,Math.min(PHASES.length-1,cur.phaseIdx+dir));
    store.progress={phaseIdx:newIdx, weekInPhase:1, slot:0}; save(); render();
  });
  $main.querySelectorAll("[data-weekstep]").forEach(b=>b.onclick=()=>{
    const dir=+b.dataset.weekstep, cur=currentProgress();
    const newWk=Math.max(1,Math.min(cur.phase.weeks,cur.weekInPhase+dir));
    store.progress={phaseIdx:cur.phaseIdx, weekInPhase:newWk, slot:0}; save(); render();
  });
  // progress buttons
  const ex=$main.querySelector("#export"); if(ex) ex.onclick=doExport;
  const bk=$main.querySelector("#backup"); if(bk) bk.onclick=doBackup;
  const rs=$main.querySelector("#restore"); if(rs) rs.onclick=()=>document.getElementById("importer").click();
  const ci=$main.querySelector("#confirmImport"); if(ci) ci.onclick=()=>{
    store={...DEFAULTS,...ui.pendingImport.data}; ui.pendingImport=null; save(); render();
  };
  const xi=$main.querySelector("#cancelImport"); if(xi) xi.onclick=()=>{ ui.pendingImport=null; render(); };
  // benchmarks
  const bw=$main.querySelector("#bw"); if(bw) bw.onchange=e=>{
    const v=e.target.value===""?null:Number(e.target.value);
    store.settings.bodyweight=v;
    if(v!=null){ store.benchmarks=store.benchmarks||[]; store.benchmarks.push({id:uid(),date:todayStr(),metric:"bodyweight",value:v}); }
    save(); render();
  };
  const lb=$main.querySelector("#logBench"); if(lb) lb.onclick=()=>{
    const hv=$main.querySelector("#benchHang").value, pv=$main.querySelector("#benchPull").value;
    store.benchmarks=store.benchmarks||[];
    const d=todayStr();
    if(hv!=="") store.benchmarks.push({id:uid(),date:d,metric:"hang",value:Number(hv)});
    if(pv!=="") store.benchmarks.push({id:uid(),date:d,metric:"pull",value:Number(pv)});
    save(); render();
  };
  // target grade
  $main.querySelectorAll("[data-tstep]").forEach(b=>b.onclick=()=>{
    const dir=+b.dataset.tstep;
    store.settings.targetGrade=Math.max(4,Math.min(14,(store.settings.targetGrade??8)+dir));
    save(); render();
  });
  $main.querySelectorAll("[data-cstep]").forEach(b=>b.onclick=()=>{
    const dir=+b.dataset.cstep;
    store.settings.comfortableGrade=Math.max(0,Math.min(16,effectiveComfortableGrade()+dir));
    save(); render();
  });
  // grade chart tap
  $main.querySelectorAll("[data-chartpt]").forEach(c=>c.onclick=()=>{ ui.chartTap=+c.dataset.chartpt; render(); });
}

function updateSaveBtn(){
  const sv=$main.querySelector("#save"); if(!sv)return;
  const ok=valid();
  sv.className="save"+(ok?" ready":"");
}

/* ---- export / backup / restore ---- */
function doExport(){
  const cur=currentProgress();
  const rows=[["date","type","detail","finger","rpe","notes"]];
  [...store.sessions].sort((a,b)=>a.date<b.date?-1:1).forEach(s=>{
    rows.push([s.date,s.type,detailOf(s).replace(/\s+/g," "),s.finger||"",s.rpe??"",(s.notes||"").replace(/[\n,]/g," ")]);
  });
  const csv=rows.map(r=>r.map(c=>/[",]/.test(String(c))?`"${c}"`:c).join(",")).join("\n");
  const text=`CruxLog export · today ${todayStr()} (Plan wk ${cur.absWeek}/${TOTAL_WEEKS}, ${cur.phase.name})\n${csv}`;
  const done=()=>{ ui.copied=true; render(); setTimeout(()=>{ ui.copied=false; render(); },1800); };
  if(navigator.clipboard?.writeText){ navigator.clipboard.writeText(text).then(done).catch(()=>fallbackCopy(text,done)); }
  else fallbackCopy(text,done);
}
function fallbackCopy(text,done){
  const ta=document.createElement("textarea"); ta.value=text; ta.style.position="fixed"; ta.style.opacity="0";
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand("copy"); }catch{}
  document.body.removeChild(ta); done();
}
function doBackup(){
  const blob=new Blob([JSON.stringify(store,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download=`cruxlog-backup-${todayStr()}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  ui.backed=true; render(); setTimeout(()=>{ ui.backed=false; render(); },1800);
}
document.getElementById("importer").onchange=e=>{
  const file=e.target.files[0]; if(!file)return;
  const r=new FileReader();
  r.onload=()=>{ try{
      const data=JSON.parse(r.result);
      if(!data||!Array.isArray(data.sessions)) throw 0;
      ui.pendingImport={count:data.sessions.length,data}; ui.importError=null; render();
    }catch{ ui.importError="That doesn't look like a CruxLog backup file."; render();
      setTimeout(()=>{ ui.importError=null; render(); },3000); } };
  r.readAsText(file); e.target.value="";
};

/* ============================ boot ============================ */
load(); render();
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));
}
</script>
